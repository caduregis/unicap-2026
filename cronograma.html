<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma — UNICAP 2026.2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#0a0e1a;color:#e8eaf0;
  padding:24px 20px 48px;
  min-height:100vh;
}
.max{max-width:1100px;margin:0 auto;}

header{margin-bottom:28px;}
header h1{font-size:clamp(20px,4vw,30px);font-weight:900;}
header h1 span{color:#00d4ff;}
.sub{font-size:13px;color:#8a93a8;margin-top:6px;}
.back{
  display:inline-flex;align-items:center;gap:6px;
  color:#8a93a8;font-size:13px;text-decoration:none;
  margin-bottom:16px;
  transition:color 200ms;
}
.back:hover{color:#00d4ff;}

/* Contador */
.contador{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(19,24,41,0.8);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:14px;padding:18px 24px;
  margin-bottom:24px;gap:16px;flex-wrap:wrap;
}
.contador-dias{
  font-family:'JetBrains Mono',monospace;
  font-size:48px;font-weight:700;
  background:linear-gradient(135deg,#00d4ff,#ffb800);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;
}
.contador-info{font-size:13px;color:#8a93a8;margin-top:4px;}
.contador-prova{font-size:13px;color:#ffb800;font-weight:600;}

/* Legenda */
.legenda{
  display:flex;gap:16px;flex-wrap:wrap;
  margin-bottom:24px;font-size:12px;
}
.leg{display:flex;align-items:center;gap:6px;}
.dot{width:12px;height:12px;border-radius:3px;}
.dot-e{background:#2d6cdf;}
.dot-r{background:#ffb800;}
.dot-s{background:#ef4444;}
.dot-ev{background:#8b5cf6;}
.dot-p{background:#10b981;}

/* Semana */
.semana{margin-bottom:28px;}
.semana-title{
  font-size:14px;font-weight:700;color:#00d4ff;
  margin-bottom:12px;padding:0 0 8px 12px;
  border-left:3px solid #00d4ff;
  border-bottom:1px solid rgba(0,212,255,0.1);
}

/* Grid de dias */
.dias{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
}

/* Card de dia */
.dia{
  background:rgba(19,24,41,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-top:3px solid #2d6cdf;
  border-radius:12px;
  padding:14px;
  transition:border-color 200ms,transform 200ms;
  position:relative;
}
.dia:hover{transform:translateY(-2px);border-color:rgba(0,212,255,0.3);}
.dia.passado{opacity:0.45;}
.dia.hoje{
  border-top-color:#00d4ff !important;
  border-color:rgba(0,212,255,0.5) !important;
  background:rgba(0,212,255,0.06);
  box-shadow:0 0 24px rgba(0,212,255,0.12);
}
.dia.redacao{border-top-color:#ffb800;}
.dia.simulado{border-top-color:#ef4444;}
.dia.evento{border-top-color:#8b5cf6;}
.dia.prova{border-top-color:#10b981;background:rgba(16,185,129,0.08);}

.hoje-badge{
  position:absolute;top:10px;right:10px;
  background:#00d4ff;color:#0a0e1a;
  font-size:9px;font-weight:800;
  padding:2px 7px;border-radius:10px;
  text-transform:uppercase;letter-spacing:1px;
}

.dia-data{font-size:11px;color:#8a93a8;font-family:'JetBrains Mono',monospace;}
.dia-num{font-size:13px;font-weight:700;color:#fff;margin:3px 0 8px;}
.dia-foco{font-size:12px;line-height:1.55;color:#ccd0dc;}
.dia-tag{
  display:inline-block;font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:20px;margin-top:8px;
}
.tag-r{background:rgba(255,184,0,0.2);color:#ffb800;}
.tag-s{background:rgba(239,68,68,0.2);color:#f87171;}
.tag-ev{background:rgba(139,92,246,0.2);color:#a78bfa;}
.tag-p{background:rgba(16,185,129,0.2);color:#34d399;}
.dia.miss{border-top-color:#ef4444;}
.tag-miss{background:rgba(239,68,68,0.2);color:#f87171;}
</style>
</head>
<body>
<div class="max">

  <a class="back" href="dashboard.html">← Voltar ao Dashboard</a>

  <header>
    <h1>Cronograma — UNICAP 2026.2 · <span>Direito</span></h1>
    <div class="sub">Início real: 24/05 · Sprint até 14/06/2026 · Carlos Régis</div>
  </header>

  <div class="contador">
    <div>
      <div class="contador-dias" id="ctDias">--</div>
      <div class="contador-info" id="ctInfo">calculando...</div>
    </div>
    <div style="text-align:right;">
      <div class="contador-prova">☑️ 14 de junho de 2026</div>
      <div style="font-size:12px;color:#8a93a8;margin-top:4px;">8h15 · UNICAP · Boa Vista · Recife/PE</div>
    </div>
  </div>

  <div class="legenda">
    <div class="leg"><div class="dot dot-e"></div> Estudo</div>
    <div class="leg"><div class="dot dot-r"></div> Redação</div>
    <div class="leg"><div class="dot dot-s"></div> Simulado interno</div>
    <div class="leg"><div class="dot dot-ev"></div> Evento externo</div>
    <div class="leg"><div class="dot dot-p"></div> Prova</div>
  </div>

  <div id="grade"></div>

</div>

<script>
const PROVA = new Date('2026-06-14T08:15:00');
const HOJE_KEY = new Date().toISOString().slice(0,10);

// Cronograma atualizado — inicio real 24/05 (dom)
const DIAS = [
  // DESCANSO (21-23/05) — RED #1 feita, sprint começa domingo
  {s:0, dt:'21/05 qui', k:'2026-05-21', f:'🛑 Dia livre — RED #1 feita ✅. Descanso antes do sprint.', t:'ev'},
  {s:0, dt:'22/05 sex', k:'2026-05-22', f:'🛑 Dia livre — Olimpíada de Português (sem pressão). Descanso.', t:'ev'},
  {s:0, dt:'23/05 sáb', k:'2026-05-23', f:'SIMULADO ENEM 3 — 1° dia (evento externo)', t:'ev'},
  // SEMANA 1 — Base completa (24/05 a 01/06)
  {s:1, dt:'24/05 dom', k:'2026-05-24', f:'🔴 Não estudado · conteúdo reposto em 26/05', t:'miss'},
  {s:1, dt:'25/05 seg', k:'2026-05-25', f:'🔴 Não estudado · conteúdo reposto em 26/05', t:'miss'},
  {s:1, dt:'26/05 ter', k:'2026-05-26', f:'⚡ REPOSIÇÃO (dom+seg+ter) · Humanas: História Antiga (Grécia/Roma) + Brasil Colonial/Império + República + Filosofia Antiga + Sociologia (Marx/Weber/Durkheim) + Geografia · Linguagens intro: Português tipologia', t:''},
  {s:1, dt:'27/05 qua', k:'2026-05-27', f:'Linguagens COMPLETO: Português (gramática + figuras) + Literatura (Romantismo/Realismo/Modernismo) + Inglês · ✍️ REDAÇÃO #2 — Desigualdade Social', t:'r'},
  {s:1, dt:'28/05 qui', k:'2026-05-28', f:'Flashcards somente — sessão leve (após 20h)', t:''},
  {s:1, dt:'29/05 sex', k:'2026-05-29', f:'Matemática: %, juros, regra de 3, funções 1°/2° grau · Biologia: célula, ecologia, genética', t:''},
  {s:1, dt:'30/05 sáb', k:'2026-05-30', f:'SIMULADO ENEM 3 — 2° dia (evento externo)', t:'ev'},
  {s:1, dt:'31/05 dom', k:'2026-05-31', f:'Revisão Simulado ENEM 3 completo (D1+D2) · ✍️ REDAÇÃO #3 rascunho + correção', t:'r'},
  {s:1, dt:'01/06 seg', k:'2026-06-01', f:'PM2 (escola) — descanso ativo, só flashcards (1h máx)', t:'ev'},
  // SEMANA 2 — Consolidação + Simulado UNICAP (02 a 08/06)
  {s:2, dt:'02/06 ter', k:'2026-06-02', f:'Humanas revisão: Filosofia + Sociologia (lacunas) · Atualidades', t:''},
  {s:2, dt:'03/06 qua', k:'2026-06-03', f:'Linguagens: Inglês + Português (figuras de linguagem) · ✍️ REDAÇÃO #4 — Saúde Mental (versão final)', t:'r'},
  {s:2, dt:'04/06 qui', k:'2026-06-04', f:'Flashcards somente — sessão leve (após 20h)', t:''},
  {s:2, dt:'05/06 sex', k:'2026-06-05', f:'Matemática: geometria plana, probabilidade, estatística · Química: tabela periódica, ligações', t:''},
  {s:2, dt:'06/06 sáb', k:'2026-06-06', f:'🎯 SIMULADO UNICAP INTERNO — 8h15 às 13h15 · Tarde: correção completa por área', t:'s'},
  {s:2, dt:'07/06 dom', k:'2026-06-07', f:'Revisão Simulado UNICAP — só os erros · História: linha do tempo república', t:''},
  {s:2, dt:'08/06 seg', k:'2026-06-08', f:'Revisão áreas fracas do simulado · Flashcards intensivo', t:''},
  // SEMANA 3 — Sprint Final (09 a 14/06)
  {s:3, dt:'09/06 ter', k:'2026-06-09', f:'🏆 OBMEP — Descanso após. Nada de UNICAP hoje.', t:'ev'},
  {s:3, dt:'10/06 qua', k:'2026-06-10', f:'REVISÃO GERAL: Humanas + Linguagens — sem conteúdo novo', t:''},
  {s:3, dt:'11/06 qui', k:'2026-06-11', f:'Reler todas as redações escritas (RED #1 a #4) — não escrever nova · Flashcards', t:''},
  {s:3, dt:'12/06 sex', k:'2026-06-12', f:'REVISÃO LEVE: mapas, flashcards, fórmulas Mat/Natureza · Preparar mochila da prova', t:''},
  {s:3, dt:'13/06 sáb', k:'2026-06-13', f:'🛌 Descanso total — sem simulado externo. Revisão leve máx 30min. Dormir às 22h.', t:''},
  {s:3, dt:'14/06 dom', k:'2026-06-14', f:'🏆 PROVA UNICAP · 8h15 às 13h15 · Acordar 6h30 · Chegar ao local 7h00', t:'p'},
];

const SEMANAS = {
  0:'Descanso pré-sprint (21–23/05)',
  1:'Semana 1 — Base completa (24/05 a 01/06)',
  2:'Semana 2 — Consolidação + Simulado UNICAP (02 a 08/06)',
  3:'Semana 3 — Sprint Final (09 a 14/06)',
};

function renderGrade() {
  const grade = document.getElementById('grade');
  for (let s = 0; s <= 3; s++) {
    const sec = document.createElement('div');
    sec.className = 'semana';
    sec.innerHTML = `<div class="semana-title">${SEMANAS[s]}</div><div class="dias" id="sem${s}"></div>`;
    grade.appendChild(sec);
    const cont = sec.querySelector('.dias');

    DIAS.filter(d => d.s === s).forEach(d => {
      const isHoje = d.k === HOJE_KEY;
      const isPassado = d.k < HOJE_KEY;
      const tipoCls = {r:'redacao', s:'simulado', ev:'evento', p:'prova', miss:'miss'}[d.t] || '';
      const tagHtml = {
        r:'<span class="dia-tag tag-r">Redação</span>',
        s:'<span class="dia-tag tag-s">Simulado UNICAP</span>',
        ev:'<span class="dia-tag tag-ev">Evento externo</span>',
        p:'<span class="dia-tag tag-p">PROVA</span>',
        miss:'<span class="dia-tag tag-miss">Não estudou</span>',
      }[d.t] || '';
      const el = document.createElement('div');
      el.className = ['dia', tipoCls, isHoje ? 'hoje' : '', isPassado && !isHoje ? 'passado' : ''].join(' ').trim();
      el.innerHTML = `
        ${isHoje ? '<div class="hoje-badge">hoje</div>' : ''}
        <div class="dia-data">${d.dt}</div>
        <div class="dia-num">${d.k.slice(8,10)}/${d.k.slice(5,7)}</div>
        <div class="dia-foco">${d.f}</div>
        ${tagHtml}`;
      cont.appendChild(el);
    });
  }
}

function renderContador() {
  const ms = PROVA - new Date();
  const dias = Math.floor(ms / 86400000);
  const horas = Math.floor((ms % 86400000) / 3600000);
  document.getElementById('ctDias').textContent = dias > 0 ? dias : (dias === 0 ? 'HOJE' : '—');
  document.getElementById('ctInfo').textContent = dias > 0
    ? `${horas}h restantes · prova no domingo`
    : (dias === 0 ? 'É hoje! Vai arrasar! 💪' : 'Prova concluída.');
}

renderGrade();
renderContador();
setInterval(renderContador, 60000);
</script>
</body>
</html>
