<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1428"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
  </defs>
  <rect width="980" height="720" fill="url(#bg2)"/>
  <text x="490" y="44" fill="#ffffff" font-size="26" font-weight="bold" text-anchor="middle">Filosofia — Mapa dos Pensadores</text>
  <text x="490" y="68" fill="#8a93a8" font-size="13" text-anchor="middle">UNICAP 2026.2 · cobra aplicar o conceito a um caso concreto</text>

  <!-- nó central -->
  <ellipse cx="490" cy="370" rx="92" ry="52" fill="#2d6cdf"/>
  <text x="490" y="365" fill="#ffffff" font-size="17" font-weight="bold" text-anchor="middle">FILOSOFIA</text>
  <text x="490" y="386" fill="#cfe0ff" font-size="12" text-anchor="middle">4 períodos</text>

  <!-- conexões -->
  <line x1="430" y1="335" x2="240" y2="170" stroke="#5b9dff" stroke-width="2"/>
  <line x1="550" y1="335" x2="745" y2="170" stroke="#5b9dff" stroke-width="2"/>
  <line x1="430" y1="405" x2="240" y2="565" stroke="#5b9dff" stroke-width="2"/>
  <line x1="550" y1="405" x2="745" y2="565" stroke="#5b9dff" stroke-width="2"/>

  <!-- ANTIGA -->
  <rect x="60" y="110" width="360" height="135" rx="10" fill="#16203c" stroke="#ff6b5b" stroke-width="2"/>
  <text x="80" y="138" fill="#ff6b5b" font-size="16" font-weight="bold">1 · ANTIGA</text>
  <text x="80" y="162" fill="#cfd4e0" font-size="12.5">Sócrates — maiêutica, "só sei que nada sei"</text>
  <text x="80" y="184" fill="#cfd4e0" font-size="12.5">Platão — Mundo das Ideias, Mito da Caverna</text>
  <text x="80" y="206" fill="#cfd4e0" font-size="12.5">Aristóteles — "animal político" (zoon politikon)</text>
  <text x="80" y="228" fill="#8a93a8" font-size="11.5">Verdade imutável no mundo das Ideias</text>

  <!-- MEDIEVAL -->
  <rect x="560" y="110" width="360" height="135" rx="10" fill="#16203c" stroke="#9b7bff" stroke-width="2"/>
  <text x="580" y="138" fill="#9b7bff" font-size="16" font-weight="bold">2 · MEDIEVAL</text>
  <text x="580" y="162" fill="#cfd4e0" font-size="12.5">Santo Agostinho — cristianiza Platão:</text>
  <text x="580" y="184" fill="#cfd4e0" font-size="12.5">a Verdade é imutável e está em Deus</text>
  <text x="580" y="206" fill="#cfd4e0" font-size="12.5">São Tomás de Aquino — fé + razão (Aristóteles)</text>
  <text x="580" y="228" fill="#8a93a8" font-size="11.5">Teocentrismo</text>

  <!-- MODERNA -->
  <rect x="60" y="495" width="360" height="150" rx="10" fill="#16203c" stroke="#4ade80" stroke-width="2"/>
  <text x="80" y="523" fill="#4ade80" font-size="16" font-weight="bold">3 · MODERNA</text>
  <text x="80" y="547" fill="#cfd4e0" font-size="12.5">Descartes — racionalismo, "penso, logo existo"</text>
  <text x="80" y="569" fill="#cfd4e0" font-size="12.5">Iluminismo — razão contra o dogma</text>
  <text x="80" y="591" fill="#cfd4e0" font-size="12.5">Montesquieu — separação dos 3 poderes</text>
  <text x="80" y="613" fill="#ffd24a" font-size="12.5" font-weight="bold">Kant — pessoa é fim, nunca só meio</text>
  <text x="80" y="633" fill="#8a93a8" font-size="11.5">Kant = repertório de ouro p/ redação</text>

  <!-- CONTEMPORÂNEA -->
  <rect x="560" y="495" width="360" height="150" rx="10" fill="#16203c" stroke="#ffd24a" stroke-width="2"/>
  <text x="580" y="523" fill="#ffd24a" font-size="16" font-weight="bold">4 · CONTEMPORÂNEA</text>
  <text x="580" y="547" fill="#cfd4e0" font-size="12.5">Marx — luta de classes, alienação</text>
  <text x="580" y="569" fill="#cfd4e0" font-size="12.5">Nietzsche — crítica da moral</text>
  <text x="580" y="591" fill="#cfd4e0" font-size="12.5">Arendt — banalidade do mal</text>
  <text x="580" y="613" fill="#cfd4e0" font-size="12.5">Adorno — Indústria Cultural · Foucault — poder</text>
  <text x="580" y="633" fill="#8a93a8" font-size="11.5">Adorno e Weber caem muito (ver Sociologia)</text>
</svg>
