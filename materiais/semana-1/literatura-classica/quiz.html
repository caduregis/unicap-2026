<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Literatura · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif}body{background:linear-gradient(135deg,#0a0e1a 0%,#131829 50%,#0a0e1a 100%);min-height:100vh;color:#e8eaf0}.glass{background:rgba(19,24,41,0.7);backdrop-filter:blur(12px);border:1px solid rgba(167,139,250,0.2)}.cyan{color:#00d4ff}.amber{color:#ffb800}.alt{transition:all 200ms;cursor:pointer;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}.alt:hover{background:rgba(167,139,250,0.08);border-color:#a78bfa}.alt.acerto{background:rgba(16,185,129,0.18);border-color:#10b981}.alt.erro{background:rgba(239,68,68,0.18);border-color:#ef4444}.alt.disabled{cursor:not-allowed;pointer-events:none}</style></head>
<body class="p-4 sm:p-8">
<header class="max-w-3xl mx-auto mb-6"><a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a><div class="flex items-baseline justify-between mt-3"><h1 class="text-2xl font-bold">❓ Quiz · <span class="text-purple-400">Literatura</span></h1><p class="text-xs text-slate-500" id="timer">15:00</p></div></header>
<section id="quizArea" class="max-w-3xl mx-auto"></section>
<section id="resultadoArea" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center"><p class="text-6xl mb-4">🎯</p><p class="text-2xl font-bold mb-2">Quiz finalizado!</p><p class="text-4xl font-bold cyan mb-2"><span id="acertos">0</span>/15</p><p class="text-slate-400 mb-6" id="diagnostico"></p><div class="flex gap-3 justify-center"><button onclick="reiniciar()" class="bg-purple-500 hover:bg-purple-400 text-slate-900 font-bold px-6 py-3 rounded-lg">🔄 Refazer</button><a href="../index.html" class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-lg">← Voltar</a></div></section>
<script>
const Q=[
  {e:'Camões é representante de qual escola literária?',a:['Trovadorismo','Humanismo','Classicismo','Barroco','Arcadismo'],c:2,exp:'Camões (1524-1580) é o maior expoente do CLASSICISMO português. Os Lusíadas (1572) é o épico-síntese do movimento. Pegadinha clássica: confundir com Barroco.'},
  {e:'A Carta de Pero Vaz de Caminha pertence ao:',a:['Trovadorismo','Quinhentismo','Barroco','Romantismo','Modernismo'],c:1,exp:'QUINHENTISMO — produção dos 100 primeiros anos do Brasil colonial (séc. XVI). A Carta (1500) é documento fundador da literatura informativa brasileira.'},
  {e:'Quem é conhecido como "Boca do Inferno"?',a:['Pe. Antônio Vieira','Gregório de Matos','Camões','Tomás Antônio Gonzaga','Cláudio Manuel'],c:1,exp:'GREGÓRIO DE MATOS GUERRA, poeta barroco brasileiro, famoso por sátiras agressivas à hipocrisia colonial. Apelido "Boca do Inferno" pela mordacidade.'},
  {e:'A diferença entre cantiga de AMOR e cantiga de AMIGO é:',a:['Tema (amor × amizade)','Voz lírica (homem × eu feminino)','Idioma (português × provençal)','Forma (verso × prosa)','Religião (cristã × pagã)'],c:1,exp:'CANTIGA DE AMOR = eu lírico masculino. CANTIGA DE AMIGO = eu lírico feminino (criado por trovador homem, mas em voz feminina, lamentando ausência do amado).'},
  {e:'Tomás Antônio Gonzaga ficou famoso por "Marília de Dirceu". A qual escola pertence?',a:['Trovadorismo','Quinhentismo','Barroco','Arcadismo','Romantismo'],c:3,exp:'ARCADISMO brasileiro (séc. XVIII). Marília de Dirceu (1792) é lirismo pastoral. Dirceu = pseudônimo do autor. Gonzaga participou da Inconfidência Mineira e foi exilado.'},
  {e:'O termo CULTISMO no Barroco refere-se a:',a:['Cultivo da terra','Jogo de palavras e metáforas elaboradas','Religião católica','Música sacra','Filosofia helenista'],c:1,exp:'CULTISMO (de Góngora, espanhol) = jogos de PALAVRAS, metáforas elaboradas. Oposto: CONCEPTISMO = jogos de IDEIAS (Quevedo, Vieira).'},
  {e:'Qual obra inaugura formalmente o Arcadismo brasileiro?',a:['Os Lusíadas (Camões)','Carta de Caminha','Obras Poéticas de Cláudio Manuel da Costa (1768)','O Cortiço (Aluísio Azevedo)','Memórias Póstumas (Machado)'],c:2,exp:'"Obras Poéticas" de CLÁUDIO MANUEL DA COSTA, 1768. Marco formal do Arcadismo brasileiro. Pseudônimo árcade: Glauceste Satúrnio.'},
  {e:'O termo FUGERE URBEM é típico de qual escola?',a:['Trovadorismo','Humanismo','Classicismo','Barroco','Arcadismo'],c:4,exp:'ARCADISMO. Significa "fugir da cidade" — celebração da vida campestre simples, em oposição à cidade corrupta. Outros termos árcades: locus amoenus, aurea mediocritas, carpe diem.'},
  {e:'Quantos cantos tem Os Lusíadas?',a:['5','8','10','12','20'],c:2,exp:'10 CANTOS, em decassílabos (ottava rima — estrofes de 8 versos). Estrutura: Proposição, Invocação, Dedicatória, Narração, Epílogo.'},
  {e:'Pe. Antônio Vieira é célebre por:',a:['Romances de aventura','Sermões e ensaios doutrinários','Poesia lírica','Crônicas históricas','Peças teatrais'],c:1,exp:'Sermões e ensaios. BARROCO brasileiro. Maior sermonista da língua portuguesa. Obras: Sermão da Sexagésima, Sermão de Santo Antônio aos Peixes. Defendeu indígenas e cristãos-novos.'},
  {e:'Qual destes é AUTOR HUMANISTA?',a:['Camões','Gregório de Matos','Gil Vicente','Tomás Antônio Gonzaga','Pero Vaz de Caminha'],c:2,exp:'GIL VICENTE — pai do teatro português, transição da Idade Média para o Renascimento. Auto da Barca do Inferno, Farsa de Inês Pereira. HUMANISMO (séc. XV-XVI).'},
  {e:'No Barroco, a CARACTERÍSTICA mais marcante do estilo é:',a:['Simplicidade lírica','Dualidade conflituosa (corpo × alma, terra × céu)','Realismo cotidiano','Métrica livre','Linguagem coloquial'],c:1,exp:'DUALIDADE. O Barroco é a estética do conflito interno: prazer × culpa, vida × morte, sagrado × profano. Sentimento de instabilidade, fugacidade.'},
  {e:'Pe. José de Anchieta atuou no Brasil. Em qual contexto?',a:['Independência','Romantismo','Catequese jesuítica (Quinhentismo)','Modernismo','Vanguarda'],c:2,exp:'QUINHENTISMO. Pe. José de Anchieta (séc. XVI) atuou na catequese indígena. Escreveu sermões, poesias bilíngues (português/tupi) e o Auto de São Lourenço.'},
  {e:'Qual escola é antiClassicista por excelência, marcada pelo CONFLITO interno?',a:['Trovadorismo','Humanismo','Arcadismo','Barroco','Quinhentismo'],c:3,exp:'BARROCO (séc. XVII). Surge como reação à Reforma Protestante (Contrarreforma católica). Estética do conflito, da tensão, da dualidade. Antecede o Arcadismo (séc. XVIII), que volta ao equilíbrio classicista.'},
  {e:'O autor de "O Uraguai" (épico árcade brasileiro sobre a Guerra das Missões) é:',a:['Tomás Antônio Gonzaga','Cláudio Manuel da Costa','José Basílio da Gama','Pe. Vieira','Santa Rita Durão'],c:2,exp:'JOSÉ BASÍLIO DA GAMA, "O Uraguai" (1769). Junto a "Caramuru" (Santa Rita Durão, 1781), formam os dois épicos árcades brasileiros.'}
];
let r=new Array(Q.length).fill(null),ts=15*60,tid=null;
function render(){const a=document.getElementById('quizArea');a.innerHTML=Q.map((q,i)=>`<div class="glass rounded-xl p-5 mb-4"><p class="text-xs text-purple-400 font-bold mb-2">Questão ${i+1}</p><p class="mb-4 leading-relaxed">${q.e}</p><div class="space-y-2">${q.a.map((alt,j)=>{let cls='alt';if(r[i]!==null){cls+=' disabled';if(j===q.c)cls+=' acerto';else if(j===r[i])cls+=' erro'}return`<div class="${cls} rounded-lg p-3 flex gap-3" onclick="resp(${i},${j})"><span class="font-bold text-purple-400">${String.fromCharCode(65+j)})</span><span>${alt}</span></div>`}).join('')}</div>${r[i]!==null?`<p class="text-xs mt-3 ${r[i]===q.c?'text-emerald-300':'text-amber-300'}"><strong>${r[i]===q.c?'✓':'✗ Correta: '+String.fromCharCode(65+q.c)+'.'}</strong> ${q.exp}</p>`:''}</div>`).join('')+`<button onclick="fim()" class="w-full bg-purple-500 hover:bg-purple-400 text-slate-900 font-bold py-3 rounded-lg mt-4">Finalizar</button>`}
function resp(i,j){if(r[i]!==null)return;r[i]=j;render()}
function fim(){clearInterval(tid);const a=r.reduce((ac,rr,i)=>ac+(rr===Q[i].c?1:0),0);document.getElementById('quizArea').classList.add('hidden');document.getElementById('resultadoArea').classList.remove('hidden');document.getElementById('acertos').textContent=a;const p=(a/15)*100;let d='';if(p>=80)d='🔥 Domínio sólido.';else if(p>=60)d='👍 Base boa.';else if(p>=40)d='⚠️ Releia o resumo.';else d='🚨 Estude com mais profundidade.';document.getElementById('diagnostico').textContent=d}
function reiniciar(){r=new Array(Q.length).fill(null);document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultadoArea').classList.add('hidden');render();ts=15*60;startTimer()}
function startTimer(){tid=setInterval(()=>{ts--;const m=Math.floor(ts/60),s=ts%60;document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;if(ts<=0){clearInterval(tid);fim()}},1000)}
render();startTimer();
</script></body></html>
