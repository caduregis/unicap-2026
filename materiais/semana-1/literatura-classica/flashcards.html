<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Literatura · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif}body{background:linear-gradient(135deg,#0a0e1a 0%,#131829 50%,#0a0e1a 100%);min-height:100vh;color:#e8eaf0}.glass{background:rgba(19,24,41,0.7);backdrop-filter:blur(12px);border:1px solid rgba(167,139,250,0.2)}.cyan{color:#00d4ff}.amber{color:#ffb800}.card-3d-container{perspective:1500px}.card-3d{position:relative;width:100%;height:400px;transform-style:preserve-3d;transition:transform 700ms cubic-bezier(0.22,1,0.36,1);cursor:pointer}.card-3d.flipped{transform:rotateY(180deg)}.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid rgba(167,139,250,0.3);box-shadow:0 16px 48px rgba(0,0,0,0.4)}.card-front{background:linear-gradient(135deg,rgba(19,24,41,0.95) 0%,rgba(10,14,26,0.95) 100%)}.card-back{background:linear-gradient(135deg,rgba(167,139,250,0.08) 0%,rgba(19,24,41,0.95) 100%);transform:rotateY(180deg)}.btn-action{transition:all 200ms ease-out;border:1px solid;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}.btn-action:hover{transform:translateY(-2px)}.btn-errei{color:#ef4444;border-color:#ef4444}.btn-dificil{color:#ffb800;border-color:#ffb800}.btn-bom{color:#00d4ff;border-color:#00d4ff}.btn-facil{color:#10b981;border-color:#10b981}</style></head>
<body class="p-4 sm:p-8">
<header class="max-w-3xl mx-auto mb-6"><a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a><h1 class="text-2xl font-bold mt-3">🗂️ Flashcards · <span class="text-purple-400">Literatura</span></h1></header>
<section class="max-w-3xl mx-auto mb-4 glass rounded-xl p-4"><div class="grid grid-cols-4 text-center gap-2 text-xs"><div><p class="text-2xl font-bold cyan" id="statTotal">0</p><p class="text-slate-400">Total</p></div><div><p class="text-2xl font-bold amber" id="statHoje">0</p><p class="text-slate-400">Hoje</p></div><div><p class="text-2xl font-bold text-emerald-400" id="statDominadas">0</p><p class="text-slate-400">Dominadas</p></div><div><p class="text-2xl font-bold text-red-400" id="statRevisar">0</p><p class="text-slate-400">A revisar</p></div></div></section>
<section class="max-w-3xl mx-auto card-3d-container mb-6"><div id="card" class="card-3d" onclick="virarCarta()"><div class="card-face card-front"><p class="text-xs uppercase tracking-widest text-slate-400 mb-4">Pergunta</p><p id="frente" class="text-xl sm:text-2xl font-medium leading-relaxed"></p><p class="text-xs text-slate-500 mt-6">Clique para revelar</p></div><div class="card-face card-back"><p class="text-xs uppercase tracking-widest text-purple-400 mb-4">Resposta</p><p id="verso" class="text-sm sm:text-base leading-relaxed"></p></div></div></section>
<section id="acoesRevisao" class="max-w-3xl mx-auto hidden"><div class="glass rounded-xl p-4"><p class="text-center text-xs text-slate-400 mb-3 uppercase tracking-widest">Como foi sua recordação?</p><div class="grid grid-cols-2 sm:grid-cols-4 gap-3"><button onclick="responder('errei')" class="btn-action btn-errei">😵 Errei</button><button onclick="responder('dificil')" class="btn-action btn-dificil">🤔 Difícil</button><button onclick="responder('bom')" class="btn-action btn-bom">😊 Bom</button><button onclick="responder('facil')" class="btn-action btn-facil">⚡ Fácil</button></div></div></section>
<section id="conclusao" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center"><p class="text-6xl mb-4">🎉</p><p class="text-2xl font-bold mb-2">Sessão concluída!</p><a href="../index.html" class="inline-block bg-purple-500 hover:bg-purple-400 text-slate-900 font-bold px-6 py-3 rounded-lg">← Voltar</a></section>
<script>
const STORAGE_KEY='unicap-flashcards-lit';
const CARTAS_BASE=[
  {f:'Qual a diferença ESSENCIAL entre cantiga de amor e cantiga de amigo no Trovadorismo?',v:'AMOR = eu lírico MASCULINO (homem sofrendo por mulher idealizada); AMIGO = eu lírico FEMININO (mulher saudosa do amado), criado por trovador homem. Pegadinha clássica.'},
  {f:'Quem escreveu Os Lusíadas e em que ano?',v:'Luís Vaz de CAMÕES, publicado em 1572. Épico em 10 cantos, decassílabos, narra a viagem de Vasco da Gama às Índias. Marco do CLASSICISMO português.'},
  {f:'O que é "Carta de Pero Vaz de Caminha"?',v:'Carta enviada a el-Rei D. Manuel I em 1500 descrevendo a chegada portuguesa ao Brasil. Marco do QUINHENTISMO. Literatura de informação. Documento fundador da história escrita brasileira.'},
  {f:'Quem é o "Boca do Inferno" e a qual escola pertence?',v:'GREGÓRIO DE MATOS GUERRA (1636-1696), poeta brasileiro do BARROCO. Cultivava lírica amorosa, religiosa e principalmente SATÍRICA — criticava a colônia da Bahia.'},
  {f:'O que é Cultismo vs Conceptismo no Barroco?',v:'CULTISMO = jogo de PALAVRAS, metáforas elaboradas (origem em Góngora, espanhol). CONCEPTISMO = jogo de IDEIAS, argumentação rigorosa (de Quevedo). Vieira é mais conceptista.'},
  {f:'Quem é Padre Antônio Vieira e qual sua obra mais notável?',v:'PE. ANTÔNIO VIEIRA (1608-1697), maior sermonista da língua portuguesa. Obras: Sermão da Sexagésima, Sermão de Santo Antônio aos Peixes. BARROCO brasileiro, defendeu indígenas e cristãos-novos.'},
  {f:'Qual obra de Tomás Antônio Gonzaga é mais famosa?',v:'"Marília de Dirceu" (1792). ARCADISMO brasileiro. Lírica amorosa pastoral. Dirceu (pseudônimo dele) ama Marília (Maria Doroteia, sua noiva real). Foi exilado em Moçambique pela Inconfidência Mineira.'},
  {f:'Cite 3 termos latinos do ARCADISMO.',v:'(1) FUGERE URBEM = fugir da cidade; (2) LOCUS AMOENUS = lugar ameno (campestre, ideal); (3) AUREA MEDIOCRITAS = mediania dourada (vida simples). Outros: CARPE DIEM (aproveite o dia), INUTILIA TRUNCAT (corte o inútil).'},
  {f:'Qual o pseudônimo árcade de Cláudio Manuel da Costa?',v:'GLAUCESTE SATÚRNIO. Sua obra-chave: "Obras Poéticas" (1768), abertura formal do Arcadismo brasileiro. Tinha tema centrado nas paisagens mineiras.'},
  {f:'Quem é o autor do "Auto da Barca do Inferno"?',v:'GIL VICENTE (séc. XV-XVI), HUMANISMO português. Pai do teatro português. Sátira moralista alegórica: personagens (Fidalgo, Frade, Sapateiro) tentam embarcar para o Paraíso mas vão para o Inferno por seus vícios.'},
  {f:'O que distingue o BARROCO do ARCADISMO em termos de SENTIMENTO?',v:'BARROCO: dualismo conflituoso (corpo × alma, terra × céu, prazer × culpa). Sentimento de instabilidade, tudo passa. ARCADISMO: racionalidade equilibrada, idealização da vida campestre, simplicidade. Reação ao excesso barroco.'},
  {f:'Quem é o autor do "Caramuru" e a qual escola pertence?',v:'FREI SANTA RITA DURÃO. Épico publicado em 1781. ARCADISMO brasileiro. Narra a história do náufrago Diogo Álvares e a indígena Paraguaçu. Junto a "O Uraguai" de Basílio da Gama, são dois épicos árcades brasileiros.'},
  {f:'Por que Camões NÃO é Barroco?',v:'Camões viveu no séc. XVI (1524-1580), antes do Barroco (séc. XVII). Pertence ao CLASSICISMO português. Pegadinha frequente em vestibular: confundir Camões com o Barroco por sua intensidade lírica.'},
  {f:'Os 4 planos narrativos de Os Lusíadas são:',v:'(1) HISTÓRICO — viagem real de Vasco da Gama; (2) MITOLÓGICO — intervenção de deuses gregos (Vênus protege, Baco se opõe); (3) DE VIAGEM — descrições do percurso marítimo; (4) DAS CONSIDERAÇÕES DO POETA — reflexões em primeira pessoa.'},
  {f:'Cite 2 cronistas do HUMANISMO português.',v:'FERNÃO LOPES (Crônica de D. João I) — historiador oficial; GOMES EANES DE ZURARA (sucessor de Fernão Lopes). Marcam a transição da Idade Média para o Renascimento em Portugal.'}
];
function loadState(){const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);return{cartas:CARTAS_BASE.map((c,i)=>({id:i,frente:c.f,verso:c.v,ef:2.5,intervalo:0,repeticoes:0,proxima:new Date().toISOString().slice(0,10)})),criada:new Date().toISOString()}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
let state=loadState(),cartaAtual=null,sessaoFeitas=0;
function devidas(){const h=new Date().toISOString().slice(0,10);return state.cartas.filter(c=>c.proxima<=h)}
function proximaCarta(){const d=devidas();if(d.length===0){concluir();return}cartaAtual=d[Math.floor(Math.random()*d.length)];document.getElementById('frente').textContent=cartaAtual.frente;document.getElementById('verso').textContent=cartaAtual.verso;document.getElementById('card').classList.remove('flipped');document.getElementById('acoesRevisao').classList.add('hidden');stats()}
function virarCarta(){const c=document.getElementById('card');if(c.classList.contains('flipped'))return;c.classList.add('flipped');setTimeout(()=>document.getElementById('acoesRevisao').classList.remove('hidden'),350)}
function responder(q){const qm={'errei':0,'dificil':2,'bom':4,'facil':5};const quality=qm[q];let{ef,intervalo,repeticoes}=cartaAtual;if(quality<3){repeticoes=0;intervalo=1}else{if(repeticoes===0)intervalo=1;else if(repeticoes===1)intervalo=3;else intervalo=Math.round(intervalo*ef);repeticoes++;ef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)))}const pd=new Date();pd.setDate(pd.getDate()+intervalo);cartaAtual.ef=ef;cartaAtual.intervalo=intervalo;cartaAtual.repeticoes=repeticoes;cartaAtual.proxima=pd.toISOString().slice(0,10);saveState(state);sessaoFeitas++;setTimeout(()=>proximaCarta(),300)}
function stats(){const d=devidas();document.getElementById('statTotal').textContent=state.cartas.length;document.getElementById('statHoje').textContent=sessaoFeitas;document.getElementById('statRevisar').textContent=d.length;document.getElementById('statDominadas').textContent=state.cartas.filter(c=>c.repeticoes>=4&&c.ef>2.5).length}
function concluir(){document.querySelector('.card-3d-container').classList.add('hidden');document.getElementById('acoesRevisao').classList.add('hidden');document.getElementById('conclusao').classList.remove('hidden')}
proximaCarta();
</script></body></html>
