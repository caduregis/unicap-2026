<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Redação · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif}body{background:linear-gradient(135deg,#0a0e1a 0%,#131829 50%,#0a0e1a 100%);min-height:100vh;color:#e8eaf0}.glass{background:rgba(19,24,41,0.7);backdrop-filter:blur(12px);border:1px solid rgba(16,185,129,0.15)}.cyan{color:#00d4ff}.amber{color:#ffb800}.card-3d-container{perspective:1500px}.card-3d{position:relative;width:100%;height:400px;transform-style:preserve-3d;transition:transform 700ms cubic-bezier(0.22,1,0.36,1);cursor:pointer}.card-3d.flipped{transform:rotateY(180deg)}.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid rgba(16,185,129,0.25);box-shadow:0 16px 48px rgba(0,0,0,0.4)}.card-front{background:linear-gradient(135deg,rgba(19,24,41,0.95) 0%,rgba(10,14,26,0.95) 100%)}.card-back{background:linear-gradient(135deg,rgba(16,185,129,0.08) 0%,rgba(19,24,41,0.95) 100%);transform:rotateY(180deg);border-color:rgba(16,185,129,0.3)}.btn-action{transition:all 200ms ease-out;border:1px solid;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}.btn-action:hover{transform:translateY(-2px)}.btn-errei{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,0.05)}.btn-errei:hover{background:rgba(239,68,68,0.2)}.btn-dificil{color:#ffb800;border-color:#ffb800;background:rgba(255,184,0,0.05)}.btn-dificil:hover{background:rgba(255,184,0,0.2)}.btn-bom{color:#00d4ff;border-color:#00d4ff;background:rgba(0,212,255,0.05)}.btn-bom:hover{background:rgba(0,212,255,0.2)}.btn-facil{color:#10b981;border-color:#10b981;background:rgba(16,185,129,0.05)}.btn-facil:hover{background:rgba(16,185,129,0.2)}</style></head>
<body class="p-4 sm:p-8">
<header class="max-w-3xl mx-auto mb-6"><a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a><h1 class="text-2xl font-bold mt-3">🗂️ Flashcards · <span class="text-emerald-400">Redação</span></h1></header>
<section class="max-w-3xl mx-auto mb-4 glass rounded-xl p-4"><div class="grid grid-cols-4 text-center gap-2 text-xs"><div><p class="text-2xl font-bold cyan" id="statTotal">0</p><p class="text-slate-400">Total</p></div><div><p class="text-2xl font-bold amber" id="statHoje">0</p><p class="text-slate-400">Hoje</p></div><div><p class="text-2xl font-bold text-emerald-400" id="statDominadas">0</p><p class="text-slate-400">Dominadas</p></div><div><p class="text-2xl font-bold text-red-400" id="statRevisar">0</p><p class="text-slate-400">A revisar</p></div></div></section>
<section class="max-w-3xl mx-auto card-3d-container mb-6"><div id="card" class="card-3d" onclick="virarCarta()"><div class="card-face card-front"><p class="text-xs uppercase tracking-widest text-slate-400 mb-4">Pergunta</p><p id="frente" class="text-xl sm:text-2xl font-medium leading-relaxed"></p><p class="text-xs text-slate-500 mt-6">Clique para revelar</p></div><div class="card-face card-back"><p class="text-xs uppercase tracking-widest text-emerald-400 mb-4">Resposta</p><p id="verso" class="text-sm sm:text-base leading-relaxed"></p></div></div></section>
<section id="acoesRevisao" class="max-w-3xl mx-auto hidden"><div class="glass rounded-xl p-4"><p class="text-center text-xs text-slate-400 mb-3 uppercase tracking-widest">Como foi sua recordação?</p><div class="grid grid-cols-2 sm:grid-cols-4 gap-3"><button onclick="responder('errei')" class="btn-action btn-errei">😵 Errei</button><button onclick="responder('dificil')" class="btn-action btn-dificil">🤔 Difícil</button><button onclick="responder('bom')" class="btn-action btn-bom">😊 Bom</button><button onclick="responder('facil')" class="btn-action btn-facil">⚡ Fácil</button></div></div></section>
<section id="conclusao" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center"><p class="text-6xl mb-4">🎉</p><p class="text-2xl font-bold mb-2">Sessão concluída!</p><a href="../index.html" class="inline-block bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold px-6 py-3 rounded-lg">← Voltar</a></section>
<script>
const STORAGE_KEY='unicap-flashcards-redacao';
const CARTAS_BASE=[
  {f:'Qual é a estrutura clássica da redação dissertativo-argumentativa em 4-5 parágrafos?',v:'INTRODUÇÃO (contextualização + tese) → DESENVOLVIMENTO 1 (argumento + repertório) → DESENVOLVIMENTO 2 (outro argumento + outro repertório) → CONCLUSÃO (síntese OU proposta de intervenção). Total: 20-25 linhas.'},
  {f:'Quais são os 5 critérios que costumam compor a correção (mesmo sem espelho oficial)?',v:'1) Tema (aderência ao recorte), 2) Tese/Gênero dissertativo-argumentativo, 3) Argumentação consistente, 4) Repertório sociocultural pertinente, 5) Coesão e norma culta. Cada um 0-200 = 1000 total.'},
  {f:'O que ZERA automaticamente uma redação UNICAP?',v:'Fuga ao tema, fuga ao gênero proposto, folha em branco, desobediência ao limite de caracteres, desrespeito aos direitos humanos, impropérios, plágio.'},
  {f:'Nota mínima na redação para NÃO ser eliminado do vestibular UNICAP?',v:'200 pontos (escala 0-1000). Abaixo disso, o candidato é AUTOMATICAMENTE ELIMINADO, independente do desempenho nas objetivas.'},
  {f:'Cite 3 repertórios de ouro pra candidato a Direito usar na redação.',v:'(1) CF/88 — Art. 1º, III: dignidade da pessoa humana; (2) Kant — imperativo categórico, pessoa como fim em si; (3) DUDH 1948 — todos nascem livres e iguais. Outros: Rousseau (vontade geral), Bauman (modernidade líquida), Foucault (vigilância).'},
  {f:'Como introduzir a TESE com clareza?',v:'Após contextualizar, use frases como: "Diante disso, é essencial reconhecer que...", "Sob essa ótica, sustenta-se que...", "Defende-se, portanto, que...". A tese deve ser AFIRMATIVA, não pergunta retórica.'},
  {f:'Qual a diferença entre conclusão "de síntese" e "com proposta de intervenção"?',v:'SÍNTESE: retoma a tese e fecha o argumento ("Em suma, ...; assim, a sociedade que se pretende justa deve..."). PROPOSTA: define agente + ação + meio + finalidade ("Diante do exposto, cabe ao Estado X via Y para Z").'},
  {f:'Por que evitar pergunta retórica como tese?',v:'Porque tese é POSIÇÃO defendida, não dúvida lançada. "Será que devemos...?" é gênero argumentativo aberto. Substitua por "Defende-se que devemos...".'},
  {f:'Cite 4 conectivos diferentes para a função de "contrastar".',v:'Entretanto, contudo, todavia, no entanto, em contrapartida, por outro lado, ao passo que. Variar conectivos é critério importante na pontuação de coesão.'},
  {f:'Pode usar 1ª pessoa do singular ("eu acho", "na minha opinião") na redação UNICAP?',v:'EVITE. O gênero dissertativo-argumentativo pede impessoalidade. Use construções como "constata-se", "defende-se", "é essencial". Algumas bancas aceitam 1ª pessoa plural ("Vivemos um momento..."), mas o 1ª singular é mais arriscado.'},
  {f:'O que é "tangenciamento ao tema"?',v:'Quando o texto FALA do tema mas não aprofunda o RECORTE específico proposto. Ex: tema "Acesso à Justiça no Brasil" — falar genericamente sobre "justiça" no mundo é tangenciamento. Tira muitos pontos.'},
  {f:'Como abrir uma redação com REPERTÓRIO FILOSÓFICO?',v:'Modelo: "Em [obra], [filósofo] defende que [conceito]. Tal premissa revela-se [aplicação ao tema atual]. [Tese]." Ex: "Em \'Do Contrato Social\' (1762), Rousseau defende a vontade geral. No Brasil de 2026, contudo..."'},
  {f:'Quanto tempo total da prova UNICAP, e quanto separar para redação?',v:'Prova total: 4 horas. Estratégia: 90 minutos para redação (1h30) + 2h30 para 58 questões objetivas. Faça a redação ANTES — está com energia cognitiva no pico. Treine cronometrado em 90 min.'},
  {f:'Cite o Art. 1º, III, da CF/88.',v:'"A República Federativa do Brasil... constitui-se em Estado Democrático de Direito e tem como fundamentos: III - a dignidade da pessoa humana." Cite a base filosófica: Kant — pessoa nunca como meio, sempre como fim.'},
  {f:'Como evitar erro de coesão entre parágrafos?',v:'Inicie cada parágrafo com CONECTIVO que sinalize a relação com o anterior: "Além disso" (adição), "Por outro lado" (contraste), "Diante do exposto" (conclusão). NUNCA inicie 2 parágrafos com o mesmo conectivo.'}
];
function loadState(){const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);return{cartas:CARTAS_BASE.map((c,i)=>({id:i,frente:c.f,verso:c.v,ef:2.5,intervalo:0,repeticoes:0,proxima:new Date().toISOString().slice(0,10)})),criada:new Date().toISOString()}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
let state=loadState(),cartaAtual=null,sessaoFeitas=0;
function devidas(){const h=new Date().toISOString().slice(0,10);return state.cartas.filter(c=>c.proxima<=h)}
function proximaCarta(){const d=devidas();if(d.length===0){concluir();return}cartaAtual=d[Math.floor(Math.random()*d.length)];document.getElementById('frente').textContent=cartaAtual.frente;document.getElementById('verso').textContent=cartaAtual.verso;document.getElementById('card').classList.remove('flipped');document.getElementById('acoesRevisao').classList.add('hidden');stats()}
function virarCarta(){const c=document.getElementById('card');if(c.classList.contains('flipped'))return;c.classList.add('flipped');setTimeout(()=>document.getElementById('acoesRevisao').classList.remove('hidden'),350)}
function responder(q){const qm={'errei':0,'dificil':2,'bom':4,'facil':5};const quality=qm[q];let{ef,intervalo,repeticoes}=cartaAtual;if(quality<3){repeticoes=0;intervalo=1}else{if(repeticoes===0)intervalo=1;else if(repeticoes===1)intervalo=3;else intervalo=Math.round(intervalo*ef);repeticoes++;ef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)))}const pd=new Date();pd.setDate(pd.getDate()+intervalo);cartaAtual.ef=ef;cartaAtual.intervalo=intervalo;cartaAtual.repeticoes=repeticoes;cartaAtual.proxima=pd.toISOString().slice(0,10);saveState(state);sessaoFeitas++;setTimeout(()=>proximaCarta(),300)}
function stats(){const d=devidas();document.getElementById('statTotal').textContent=state.cartas.length;document.getElementById('statHoje').textContent=sessaoFeitas;document.getElementById('statRevisar').textContent=d.length;document.getElementById('statDominadas').textContent=state.cartas.filter(c=>c.repeticoes>=4&&c.ef>2.5).length}
function concluir(){document.querySelector('.card-3d-container').classList.add('hidden');document.getElementById('acoesRevisao').classList.add('hidden');document.getElementById('conclusao').classList.remove('hidden')}
proximaCarta();
</script></body></html>
