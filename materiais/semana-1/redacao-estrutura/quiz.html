<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Redação · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif}body{background:linear-gradient(135deg,#0a0e1a 0%,#131829 50%,#0a0e1a 100%);min-height:100vh;color:#e8eaf0}.glass{background:rgba(19,24,41,0.7);backdrop-filter:blur(12px);border:1px solid rgba(16,185,129,0.15)}.cyan{color:#00d4ff}.amber{color:#ffb800}.alt{transition:all 200ms;cursor:pointer;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}.alt:hover{background:rgba(16,185,129,0.08);border-color:#10b981}.alt.acerto{background:rgba(16,185,129,0.18);border-color:#10b981}.alt.erro{background:rgba(239,68,68,0.18);border-color:#ef4444}.alt.disabled{cursor:not-allowed;pointer-events:none}</style></head>
<body class="p-4 sm:p-8">
<header class="max-w-3xl mx-auto mb-6"><a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a><div class="flex items-baseline justify-between mt-3"><h1 class="text-2xl font-bold">❓ Quiz · <span class="text-emerald-400">Redação</span></h1><p class="text-xs text-slate-500" id="timer">15:00</p></div></header>
<section id="quizArea" class="max-w-3xl mx-auto"></section>
<section id="resultadoArea" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center"><p class="text-6xl mb-4">🎯</p><p class="text-2xl font-bold mb-2">Quiz finalizado!</p><p class="text-4xl font-bold cyan mb-2"><span id="acertos">0</span>/15</p><p class="text-slate-400 mb-6" id="diagnostico"></p><div class="flex gap-3 justify-center"><button onclick="reiniciar()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold px-6 py-3 rounded-lg">🔄 Refazer</button><a href="../index.html" class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-lg">← Voltar</a></div></section>
<script>
const Q=[
  {e:'Qual é a estrutura clássica do dissertativo-argumentativo?',a:['Introdução-Narrativa-Diálogo-Conclusão','Introdução-Desenvolvimento1-Desenvolvimento2-Conclusão','Apresentação-Personagens-Clímax-Desfecho','Tese-Antítese-Síntese (somente)','Descritivo-Argumentativo-Narrativo'],c:1,exp:'Estrutura clássica: 4 parágrafos. Introdução com tese, 2 desenvolvimentos com argumentos e repertórios distintos, e conclusão.'},
  {e:'Nota mínima na redação UNICAP para não ser eliminado:',a:['100','200','300','400','500'],c:1,exp:'Edital UNICAP 2026.1 (Art. 12, alínea c): nota inferior a 200 (escala 0-1000) elimina o candidato.'},
  {e:'Qual destes ZERA a redação?',a:['Letra ilegível','Apenas 18 linhas','Fuga ao tema','Citar 1ª pessoa do singular','Errar a crase'],c:2,exp:'Fuga ao tema é eliminatório (zera). Os outros tiram pontos, mas não zeram.'},
  {e:'Para iniciar um parágrafo de DESENVOLVIMENTO 2 sinalizando contraste com o 1, qual conectivo é ideal?',a:['Além disso,','Por outro lado,','Portanto,','Isto é,','Como demonstra'],c:1,exp:'"Por outro lado" indica contraste/oposição. "Além disso" é adição, "Portanto" é conclusão, "Isto é" é explicação, "Como demonstra" é exemplificação.'},
  {e:'Qual é o melhor REPERTÓRIO para o tema "Dignidade humana no sistema prisional brasileiro"?',a:['Aristóteles e a virtude do meio-termo','Kant e o imperativo categórico (humanidade como fim)','Newton e as leis da física','Camões em "Os Lusíadas"','Pitágoras e os números'],c:1,exp:'Kant: pessoa nunca como MEIO, sempre como FIM. Conecta diretamente com o Art. 1º, III, CF/88 (dignidade humana). Outros não se aplicam ao tema.'},
  {e:'Quantas linhas geralmente compõe uma boa redação UNICAP?',a:['5-10','10-15','20-30','40-50','100+'],c:2,exp:'Padrão é 20-30 linhas. Muito curta = falta de desenvolvimento. Muito longa = perde foco. Edital UNICAP não especifica mínimo/máximo fixo (varia conforme tema).'},
  {e:'Qual é o problema da frase "Será que o Brasil deveria abolir as desigualdades?" como tese?',a:['É muito longa','Usa palavras difíceis','Usa pergunta retórica em vez de afirmação','Não cita autor','Faltam dados numéricos'],c:2,exp:'Tese deve ser POSIÇÃO afirmativa. Pergunta retórica não posiciona. Use: "Defende-se que o Brasil deve adotar medidas urgentes para reduzir desigualdades."'},
  {e:'O repertório sociocultural é PRODUTIVO quando:',a:['É uma citação famosa qualquer','Está em latim','É pertinente ao tema E usado para construir argumento','Tem mais de 100 anos','Vem de autor brasileiro'],c:2,exp:'Produtividade = pertinência + funcionalidade. Citar Kant para falar de futebol é decorativo, não produtivo. Use repertório que SE LIGUE ao argumento.'},
  {e:'Estratégia recomendada para tempo de redação (em prova de 4h):',a:['10 minutos','30 minutos','60-90 minutos','3 horas','Não importa o tempo'],c:2,exp:'60-90 minutos é o padrão recomendado: 10-15 min planejamento, 50-65 min escrita, 10 min revisão. Trene cronometrado em 90 min.'},
  {e:'A frase "Em \'Modernidade Líquida\', Bauman alerta para a fluidez das relações" é boa abertura para tema de:',a:['Matemática financeira','Energia nuclear','Redes sociais e individualismo','Ciclo do carbono','Geometria espacial'],c:2,exp:'Bauman descreve a transitoriedade dos vínculos sociais — ideal para temas de redes sociais, consumo, descartabilidade, individualismo contemporâneo.'},
  {e:'Erro mais grave na pergunta retórica como tese:',a:['Não tem virgula','Está em itálico','Não posiciona o autor','Fica chiclete','É muito formal'],c:2,exp:'Tese é POSIÇÃO. Pergunta deixa em aberto. Examinador não consegue avaliar o que você defende.'},
  {e:'No último parágrafo (conclusão), qual destes é MELHOR encerramento?',a:['Em síntese, o problema é grave.','Diante do exposto, é urgente que o Estado adote políticas X via Y, para alcançar Z.','Como já mencionei várias vezes acima...','Conclui-se que tudo é relativo.','Não tenho mais o que falar.'],c:1,exp:'A opção B segue o esquema agente + ação + meio + finalidade, padrão da conclusão proposta de intervenção (estilo ENEM, igualmente útil pra UNICAP).'},
  {e:'Sobre uso de 1ª pessoa em redação UNICAP, o mais SEGURO é:',a:['Usar "eu" em todos os parágrafos','Misturar "eu" e "nós" livremente','Evitar 1ª pessoa, preferir construções impessoais','Usar só "eu" na conclusão','Usar "tu" para parecer culto'],c:2,exp:'Impessoalidade é padrão acadêmico-formal: "constata-se", "defende-se", "é essencial". 1ª pessoa plural ("Vivemos uma era de...") pode ser tolerada, mas 1ª singular reduz nota.'},
  {e:'A frase "DUDH 1948, Art. 1º: todos os seres humanos nascem livres e iguais em dignidade" é um repertório de qual área?',a:['Filosofia analítica','Direito Internacional / Direitos Humanos','Matemática','Biologia','Geografia'],c:1,exp:'A Declaração Universal dos Direitos Humanos (1948) é repertório clássico em Direitos Humanos / Direito Internacional. Encaixa em temas de igualdade, discriminação, direitos.'},
  {e:'Para tema "Desafios da liberdade de expressão na era digital", qual repertório encaixa MELHOR?',a:['Mecânica quântica de Heisenberg','Foucault (vigilância e biopoder) ou Habermas (esfera pública)','Trovadorismo medieval','Lei da gravitação universal','Cálculo diferencial'],c:1,exp:'Foucault discute vigilância e poder digital. Habermas discute esfera pública e racionalidade comunicativa. Ambos diretamente aplicáveis. Os demais não têm pertinência.'}
];
let r=new Array(Q.length).fill(null),ts=15*60,tid=null;
function render(){const a=document.getElementById('quizArea');a.innerHTML=Q.map((q,i)=>`<div class="glass rounded-xl p-5 mb-4"><p class="text-xs text-emerald-400 font-bold mb-2">Questão ${i+1}</p><p class="mb-4 leading-relaxed">${q.e}</p><div class="space-y-2">${q.a.map((alt,j)=>{let cls='alt';if(r[i]!==null){cls+=' disabled';if(j===q.c)cls+=' acerto';else if(j===r[i])cls+=' erro'}return`<div class="${cls} rounded-lg p-3 flex gap-3" onclick="resp(${i},${j})"><span class="font-bold text-emerald-400">${String.fromCharCode(65+j)})</span><span>${alt}</span></div>`}).join('')}</div>${r[i]!==null?`<p class="text-xs mt-3 ${r[i]===q.c?'text-emerald-300':'text-amber-300'}"><strong>${r[i]===q.c?'✓':'✗ Correta: '+String.fromCharCode(65+q.c)+'.'}</strong> ${q.exp}</p>`:''}</div>`).join('')+`<button onclick="fim()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-lg mt-4">Finalizar</button>`}
function resp(i,j){if(r[i]!==null)return;r[i]=j;render()}
function fim(){clearInterval(tid);const a=r.reduce((ac,rr,i)=>ac+(rr===Q[i].c?1:0),0);document.getElementById('quizArea').classList.add('hidden');document.getElementById('resultadoArea').classList.remove('hidden');document.getElementById('acertos').textContent=a;const p=(a/15)*100;let d='';if(p>=80)d='🔥 Estrutura dominada.';else if(p>=60)d='👍 Base boa, releia os erros.';else if(p>=40)d='⚠️ Gaps. Releia o resumo.';else d='🚨 Estude o resumo antes.';document.getElementById('diagnostico').textContent=d}
function reiniciar(){r=new Array(Q.length).fill(null);document.getElementById('quizArea').classList.remove('hidden');document.getElementById('resultadoArea').classList.add('hidden');render();ts=15*60;startTimer()}
function startTimer(){tid=setInterval(()=>{ts--;const m=Math.floor(ts/60),s=ts%60;document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;if(ts<=0){clearInterval(tid);fim()}},1000)}
render();startTimer();
</script></body></html>
