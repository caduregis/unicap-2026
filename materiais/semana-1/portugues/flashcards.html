<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Português · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{font-family:'Inter',sans-serif}
  body{background:linear-gradient(135deg,#0a0e1a 0%,#131829 50%,#0a0e1a 100%);min-height:100vh;color:#e8eaf0}
  .glass{background:rgba(19,24,41,0.7);backdrop-filter:blur(12px);border:1px solid rgba(0,212,255,0.1)}
  .cyan{color:#00d4ff} .amber{color:#ffb800}
  .card-3d-container{perspective:1500px}
  .card-3d{position:relative;width:100%;height:400px;transform-style:preserve-3d;transition:transform 700ms cubic-bezier(0.22,1,0.36,1);cursor:pointer}
  .card-3d.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid rgba(0,212,255,0.2);box-shadow:0 16px 48px rgba(0,0,0,0.4)}
  .card-front{background:linear-gradient(135deg,rgba(19,24,41,0.95) 0%,rgba(10,14,26,0.95) 100%)}
  .card-back{background:linear-gradient(135deg,rgba(255,184,0,0.08) 0%,rgba(19,24,41,0.95) 100%);transform:rotateY(180deg);border-color:rgba(255,184,0,0.3)}
  .btn-action{transition:all 200ms ease-out;border:1px solid;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px}
  .btn-action:hover{transform:translateY(-2px)}
  .btn-errei{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,0.05)}
  .btn-errei:hover{background:rgba(239,68,68,0.2)}
  .btn-dificil{color:#ffb800;border-color:#ffb800;background:rgba(255,184,0,0.05)}
  .btn-dificil:hover{background:rgba(255,184,0,0.2)}
  .btn-bom{color:#00d4ff;border-color:#00d4ff;background:rgba(0,212,255,0.05)}
  .btn-bom:hover{background:rgba(0,212,255,0.2)}
  .btn-facil{color:#10b981;border-color:#10b981;background:rgba(16,185,129,0.05)}
  .btn-facil:hover{background:rgba(16,185,129,0.2)}
</style></head>
<body class="p-4 sm:p-8">
<header class="max-w-3xl mx-auto mb-6">
  <a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a>
  <h1 class="text-2xl font-bold mt-3">🗂️ Flashcards · <span class="amber">Português</span></h1>
  <p class="text-xs text-slate-500">Regência · Concordância · Crase</p>
</header>
<section class="max-w-3xl mx-auto mb-4 glass rounded-xl p-4">
  <div class="grid grid-cols-4 text-center gap-2 text-xs">
    <div><p class="text-2xl font-bold cyan" id="statTotal">0</p><p class="text-slate-400">Total</p></div>
    <div><p class="text-2xl font-bold amber" id="statHoje">0</p><p class="text-slate-400">Hoje</p></div>
    <div><p class="text-2xl font-bold text-emerald-400" id="statDominadas">0</p><p class="text-slate-400">Dominadas</p></div>
    <div><p class="text-2xl font-bold text-red-400" id="statRevisar">0</p><p class="text-slate-400">A revisar</p></div>
  </div>
</section>
<section class="max-w-3xl mx-auto card-3d-container mb-6">
  <div id="card" class="card-3d" onclick="virarCarta()">
    <div class="card-face card-front"><p class="text-xs uppercase tracking-widest text-slate-400 mb-4">Pergunta</p><p id="frente" class="text-xl sm:text-2xl font-medium leading-relaxed"></p><p class="text-xs text-slate-500 mt-6">Clique para revelar</p></div>
    <div class="card-face card-back"><p class="text-xs uppercase tracking-widest amber mb-4">Resposta</p><p id="verso" class="text-base sm:text-lg leading-relaxed"></p></div>
  </div>
</section>
<section id="acoesRevisao" class="max-w-3xl mx-auto hidden">
  <div class="glass rounded-xl p-4">
    <p class="text-center text-xs text-slate-400 mb-3 uppercase tracking-widest">Como foi sua recordação?</p>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <button onclick="responder('errei')" class="btn-action btn-errei">😵 Errei</button>
      <button onclick="responder('dificil')" class="btn-action btn-dificil">🤔 Difícil</button>
      <button onclick="responder('bom')" class="btn-action btn-bom">😊 Bom</button>
      <button onclick="responder('facil')" class="btn-action btn-facil">⚡ Fácil</button>
    </div>
  </div>
</section>
<section id="conclusao" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center">
  <p class="text-6xl mb-4">🎉</p>
  <p class="text-2xl font-bold mb-2">Sessão concluída!</p>
  <p class="text-slate-400 mb-6" id="resultadoSessao"></p>
  <a href="../index.html" class="inline-block bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold px-6 py-3 rounded-lg">← Voltar</a>
</section>
<script>
const STORAGE_KEY='unicap-flashcards-port';
const CARTAS_BASE=[
  {f:'Qual é a regência correta? "Aspiro ___ um cargo público."',v:'AO cargo. ASPIRAR no sentido de "almejar" é transitivo indireto (preposição "a"). No sentido de "inalar/respirar", é direto (sem preposição).'},
  {f:'"Prefiro estudar ___ trabalhar." Complete corretamente.',v:'A trabalhar. Verbo PREFERIR rejeita "do que". Forma culta: "preferir X a Y" (preposição "a", sem advérbios reforçadores como "mais" ou "antes").'},
  {f:'"Implicar" deve ser usado com ou sem preposição "em"?',v:'SEM "em". "Implicar" no sentido de "acarretar/causar" é TRANSITIVO DIRETO: "Isso implica problemas." (não "implica em problemas"). Com "em" só quando significa "estar envolvido em".'},
  {f:'Verbo "haver" no sentido de "existir" concorda como?',v:'Sempre na 3ª pessoa do SINGULAR (impessoal): "HOUVE muitos problemas." Forma errada comum: "houveram problemas". Excet "haver de" (intenção), aí concorda normalmente.'},
  {f:'"Fazem dez anos que estudo." Está correto?',v:'NÃO. Verbo "fazer" indicando tempo é impessoal: "FAZ dez anos que estudo" (singular). Mesma regra do "haver".'},
  {f:'"Mais de um candidato se inscreveu" ou "se inscreveram"?',v:'SE INSCREVEU (singular). "Mais de um" + verbo no SINGULAR, mesmo que o resultado seja plural. Exceção rara: quando há reciprocidade ("Mais de um colega se abraçaram").'},
  {f:'Quando NÃO há crase antes de palavras?',v:'1) Antes de masculino ("vou a pé"); 2) Antes de verbos ("começo a estudar"); 3) Antes de pronomes pessoais ("refiro-me a ela"); 4) Antes de palavras no plural sem artigo ("entreguei a candidatos").'},
  {f:'"Vou à Brasília" ou "Vou a Brasília"?',v:'Vou A Brasília (sem crase). Brasília não aceita artigo. TESTE: "Voltei DE Brasília" (não "DA"). Mas "Vou À Bahia" tem crase porque "Voltei DA Bahia".'},
  {f:'"Segue anexo a planilha" ou "Segue anexa a planilha"?',v:'Segue ANEXA. "Anexo" (adjetivo) concorda em gênero e número com o substantivo (planilha = feminino). Mesma regra: "Vão anexos os documentos."'},
  {f:'"Tudo são problemas" ou "Tudo é problemas"?',v:'TUDO É (singular). O pronome indefinido "tudo" exige verbo no singular: "Tudo é provisório", "Tudo são flores" é uma exceção/coloquialismo, mas a forma culta é "Tudo é".'},
  {f:'"Visar" deve ser usado com preposição quando?',v:'Quando significa "almejar/objetivar": "Visa AO bem-estar." (TI). Quando significa "mirar" ou "dar visto", é direto: "Visou o alvo" / "Visou o passaporte".'},
  {f:'"Esquecer-me ___ chave." Complete.',v:'DA chave. Verbos pronominais (esquecer-SE, lembrar-SE, queixar-SE, arrepender-SE) sempre exigem preposição DE: "esqueci-me DE", "lembrei-me DELE".'},
  {f:'Antes de "aquele(s)", "aquela(s)", "aquilo" — há crase?',v:'SIM, quando o verbo exige preposição "a": "Refiro-me ÀQUELE caso" (a + aquele = àquele). É a fusão fonética e gráfica.'},
  {f:'A maioria dos alunos passou ou passaram?',v:'AMBOS são aceitos. A forma preferida na norma culta é o SINGULAR (PASSOU), concordando com o coletivo "maioria". O plural (PASSARAM) é admitido por concordância atrativa com "dos alunos".'},
  {f:'"Há dois meses atrás" — está correto?',v:'NÃO. Use "HÁ dois meses" (sem "atrás", redundância) OU "Faz dois meses atrás" (também redundante). E NÃO HÁ crase em "há" (verbo haver, não preposição).'},
  {f:'"Vossa Excelência foi receptiva às nossas demandas." Onde concorda o adjetivo?',v:'Com o gênero da pessoa: se for mulher, "receptiva"; se homem, "receptivo". Pronomes de tratamento como "Vossa Excelência", "Sua Senhoria" admitem concordância de gênero com a pessoa, não com a forma feminina do pronome.'},
  {f:'"Estou meio cansada" ou "Estou meia cansada"?',v:'MEIO CANSADA. "Meio" como ADVÉRBIO (= um pouco) é INVARIÁVEL. Como adjetivo (= metade de), concorda: "Comi MEIA maçã."'},
  {f:'"Obrigado" ou "obrigada"?',v:'Depende do FALANTE, não do interlocutor. Homem: OBRIGADO. Mulher: OBRIGADA. Mesmo se a mulher agradece a um homem, ela diz "obrigada".'},
  {f:'"Refiro-me a quem você sabe" — há crase?',v:'NÃO. "Quem" é pronome relativo sem artigo: "a quem" = preposição "a" + pronome (sem artigo "a"). Crase só se houver fusão de preposição + artigo, o que aqui não ocorre.'},
  {f:'"Cheguei à uma hora da manhã." A crase está correta?',v:'SIM. "Uma hora" pode ser regida pela preposição "a", e antes do numeral "uma" (artigo feminino indefinido), aceita crase em estruturas adverbiais: "Cheguei à uma" = "cheguei A + A uma".'}
];
function loadState(){const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);return{cartas:CARTAS_BASE.map((c,i)=>({id:i,frente:c.f,verso:c.v,ef:2.5,intervalo:0,repeticoes:0,proxima:new Date().toISOString().slice(0,10)})),criada:new Date().toISOString()}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
let state=loadState(),cartaAtual=null,sessaoFeitas=0;
function devidas(){const h=new Date().toISOString().slice(0,10);return state.cartas.filter(c=>c.proxima<=h)}
function proximaCarta(){const d=devidas();if(d.length===0){concluir();return}cartaAtual=d[Math.floor(Math.random()*d.length)];document.getElementById('frente').textContent=cartaAtual.frente;document.getElementById('verso').textContent=cartaAtual.verso;document.getElementById('card').classList.remove('flipped');document.getElementById('acoesRevisao').classList.add('hidden');stats()}
function virarCarta(){const c=document.getElementById('card');if(c.classList.contains('flipped'))return;c.classList.add('flipped');setTimeout(()=>document.getElementById('acoesRevisao').classList.remove('hidden'),350)}
function responder(q){const qm={'errei':0,'dificil':2,'bom':4,'facil':5};const quality=qm[q];let{ef,intervalo,repeticoes}=cartaAtual;if(quality<3){repeticoes=0;intervalo=1}else{if(repeticoes===0)intervalo=1;else if(repeticoes===1)intervalo=3;else intervalo=Math.round(intervalo*ef);repeticoes++;ef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)))}const pd=new Date();pd.setDate(pd.getDate()+intervalo);cartaAtual.ef=ef;cartaAtual.intervalo=intervalo;cartaAtual.repeticoes=repeticoes;cartaAtual.proxima=pd.toISOString().slice(0,10);saveState(state);sessaoFeitas++;setTimeout(()=>proximaCarta(),300)}
function stats(){const d=devidas();document.getElementById('statTotal').textContent=state.cartas.length;document.getElementById('statHoje').textContent=sessaoFeitas;document.getElementById('statRevisar').textContent=d.length;document.getElementById('statDominadas').textContent=state.cartas.filter(c=>c.repeticoes>=4&&c.ef>2.5).length}
function concluir(){document.querySelector('.card-3d-container').classList.add('hidden');document.getElementById('acoesRevisao').classList.add('hidden');document.getElementById('conclusao').classList.remove('hidden');document.getElementById('resultadoSessao').textContent=`Você revisou ${sessaoFeitas} cartas. Volte amanhã para a próxima rodada.`}
proximaCarta();
</script></body></html>
