<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Filosofia Política · UNICAP 2026.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  body { background: linear-gradient(135deg, #0a0e1a 0%, #131829 50%, #0a0e1a 100%); min-height: 100vh; color: #e8eaf0; }
  .glass { background: rgba(19,24,41,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0,212,255,0.1); }
  .amber { color: #ffb800; } .cyan { color: #00d4ff; }

  .card-3d-container { perspective: 1500px; }
  .card-3d {
    position: relative;
    width: 100%;
    height: 400px;
    transform-style: preserve-3d;
    transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
    cursor: pointer;
  }
  .card-3d.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 20px; padding: 32px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
    border: 1px solid rgba(0,212,255,0.2);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .card-front { background: linear-gradient(135deg, rgba(19,24,41,0.95) 0%, rgba(10,14,26,0.95) 100%); }
  .card-back { background: linear-gradient(135deg, rgba(255,184,0,0.08) 0%, rgba(19,24,41,0.95) 100%); transform: rotateY(180deg); border-color: rgba(255,184,0,0.3); }

  .btn-action {
    transition: all 200ms ease-out;
    border: 1px solid; border-radius: 10px; padding: 10px 18px;
    font-weight: 700; font-size: 13px;
  }
  .btn-action:hover { transform: translateY(-2px); }
  .btn-errei { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.05); }
  .btn-errei:hover { background: rgba(239,68,68,0.2); }
  .btn-dificil { color: #ffb800; border-color: #ffb800; background: rgba(255,184,0,0.05); }
  .btn-dificil:hover { background: rgba(255,184,0,0.2); }
  .btn-bom { color: #00d4ff; border-color: #00d4ff; background: rgba(0,212,255,0.05); }
  .btn-bom:hover { background: rgba(0,212,255,0.2); }
  .btn-facil { color: #10b981; border-color: #10b981; background: rgba(16,185,129,0.05); }
  .btn-facil:hover { background: rgba(16,185,129,0.2); }
</style>
</head>
<body class="p-4 sm:p-8">

<header class="max-w-3xl mx-auto mb-6">
  <a href="../index.html" class="text-sm cyan hover:underline">← Semana 1</a>
  <div class="flex items-baseline justify-between mt-3">
    <h1 class="text-2xl font-bold">🗂️ Flashcards · <span class="amber">Filosofia Política</span></h1>
    <p class="text-xs text-slate-500 font-mono">SM-2 · localStorage</p>
  </div>
</header>

<section class="max-w-3xl mx-auto mb-4 glass rounded-xl p-4">
  <div class="grid grid-cols-4 text-center gap-2 text-xs">
    <div><p class="text-2xl font-bold cyan" id="statTotal">0</p><p class="text-slate-400">Total</p></div>
    <div><p class="text-2xl font-bold amber" id="statHoje">0</p><p class="text-slate-400">Hoje</p></div>
    <div><p class="text-2xl font-bold text-emerald-400" id="statDominadas">0</p><p class="text-slate-400">Dominadas</p></div>
    <div><p class="text-2xl font-bold text-red-400" id="statRevisar">0</p><p class="text-slate-400">A revisar</p></div>
  </div>
</section>

<section class="max-w-3xl mx-auto card-3d-container mb-6">
  <div id="card" class="card-3d" onclick="virarCarta()">
    <div class="card-face card-front">
      <p class="text-xs uppercase tracking-widest text-slate-400 mb-4">Pergunta</p>
      <p id="frente" class="text-xl sm:text-2xl font-medium leading-relaxed"></p>
      <p class="text-xs text-slate-500 mt-6">Clique para revelar</p>
    </div>
    <div class="card-face card-back">
      <p class="text-xs uppercase tracking-widest amber mb-4">Resposta</p>
      <p id="verso" class="text-base sm:text-lg leading-relaxed"></p>
    </div>
  </div>
</section>

<section id="acoesRevisao" class="max-w-3xl mx-auto hidden">
  <div class="glass rounded-xl p-4">
    <p class="text-center text-xs text-slate-400 mb-3 uppercase tracking-widest">Como foi sua recordação?</p>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <button onclick="responder('errei')" class="btn-action btn-errei">😵 Errei</button>
      <button onclick="responder('dificil')" class="btn-action btn-dificil">🤔 Difícil</button>
      <button onclick="responder('bom')" class="btn-action btn-bom">😊 Bom</button>
      <button onclick="responder('facil')" class="btn-action btn-facil">⚡ Fácil</button>
    </div>
    <p class="text-center text-xs text-slate-500 mt-3" id="proxRevisaoEstimada">—</p>
  </div>
</section>

<section id="conclusao" class="max-w-3xl mx-auto hidden glass rounded-2xl p-8 text-center">
  <p class="text-6xl mb-4">🎉</p>
  <p class="text-2xl font-bold mb-2">Sessão concluída!</p>
  <p class="text-slate-400 mb-6" id="resultadoSessao"></p>
  <a href="../index.html" class="inline-block bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold px-6 py-3 rounded-lg">← Voltar à Semana 1</a>
</section>

<script>
const STORAGE_KEY = 'unicap-flashcards-filo';

const CARTAS_BASE = [
  { f: 'Quem disse "O homem é o lobo do homem"?', v: 'Thomas HOBBES, no Leviatã (1651). Latim: "Homo homini lupus". Descreve o estado de natureza humano como guerra de todos contra todos.' },
  { f: 'O que significa o conceito "zoon politikon"?', v: 'ARISTÓTELES: "o homem é por natureza um animal político". Não dá pra ser humano sem viver em sociedade (pólis). Quem vive isolado é "deus ou besta".' },
  { f: 'Para Hobbes, o estado de natureza é caracterizado por qual frase?', v: '"Guerra de todos contra todos" (bellum omnium contra omnes). Resultado: vida humana "solitária, pobre, sórdida, embrutecida e curta".' },
  { f: 'Quais são os três direitos naturais segundo Locke?', v: 'VIDA, LIBERDADE e PROPRIEDADE. Esses direitos existem ANTES do Estado, e o Estado é criado pra protegê-los — não pra suprimi-los.' },
  { f: 'Qual obra de Rousseau funda o conceito de "vontade geral"?', v: '"Do Contrato Social" (1762). Vontade geral ≠ vontade de todos; é o que serve ao bem comum. Cada um, ao obedecer a lei, obedece a si mesmo.' },
  { f: 'Formule o IMPERATIVO CATEGÓRICO de Kant (1ª versão).', v: '"Age só segundo aquela máxima pela qual possas querer que ela se torne lei universal." Base da ética kantiana e do princípio da universalização.' },
  { f: 'Qual é a 2ª formulação do imperativo categórico (humanidade como fim)?', v: '"Age de tal modo que uses a humanidade, tanto na tua pessoa como na pessoa de qualquer outro, sempre e simultaneamente como fim, e nunca como meio." Base da DIGNIDADE HUMANA, fundamento do Art. 1º, III, da CF/88.' },
  { f: 'O Mito da Caverna é de qual filósofo? Qual sua mensagem?', v: 'PLATÃO, em "A República". Alegoria do conhecimento: pessoas acorrentadas vendo sombras; quando uma se liberta e vê o sol, simboliza o filósofo descobrindo a Verdade.' },
  { f: 'Qual é a frase de abertura do "Do Contrato Social" de Rousseau?', v: '"O homem nasce livre e por toda parte está acorrentado." (L\'homme est né libre, et partout il est dans les fers.)' },
  { f: 'Maquiavel escreveu O Príncipe (1513). Qual sua principal contribuição pra filosofia política?', v: 'Separação da política em relação à moral cristã medieval. Política é técnica DESCRITIVA (como o poder funciona), não normativa (como deveria ser). Fundador do realismo político moderno.' },
  { f: 'Qual a diferença entre Virtù e Fortuna em Maquiavel?', v: 'VIRTÙ = capacidade, talento, decisão do líder. FORTUNA = acaso, sorte, circunstâncias incontroláveis. O bom Príncipe combina virtù pra aproveitar oportunidades trazidas pela fortuna.' },
  { f: 'Para Hobbes, qual é o motivo que leva os homens a fazer o contrato social?', v: 'MEDO DA MORTE VIOLENTA. As pessoas, vendo o caos do estado de natureza, abrem mão de seus direitos (exceto autopreservação) ao Soberano absoluto para ter SEGURANÇA.' },
  { f: 'Em Locke, em que circunstância o povo tem direito de resistência ao governo?', v: 'Quando o governo VIOLA os direitos naturais (vida, liberdade, propriedade) ou age contra a confiança do pacto. O povo pode RESISTIR e até substituir o governo. Base do direito moderno de revolução.' },
  { f: 'Compare Hobbes, Locke e Rousseau em uma linha: tipo de soberano.', v: 'HOBBES: soberano ABSOLUTO e indivisível. LOCKE: soberano LIMITADO (divisão de poderes). ROUSSEAU: o povo é soberano (vontade geral, democracia direta).' },
  { f: 'Qual a base da virtude segundo Aristóteles?', v: 'MEIO-TERMO (mesótes) entre dois extremos viciosos. Ex.: coragem = meio entre covardia (falta) e temeridade (excesso). Generosidade = entre avareza e prodigalidade.' },
  { f: 'O que significa "Conhece-te a ti mesmo"? Quem é o autor?', v: 'Inscrição do oráculo de Delfos, adotada por SÓCRATES. Significa que o autoconhecimento é o ponto de partida da filosofia — antes de questionar o mundo, questione a si mesmo.' },
  { f: 'Como o pensamento de Kant influencia o Art. 1º da CF/88?', v: 'A "dignidade da pessoa humana" (Art. 1º, III) é princípio fundador da República. Vem diretamente da 2ª formulação do imperativo categórico kantiano: pessoa nunca pode ser tratada apenas como MEIO, sempre como FIM em si.' },
  { f: 'Qual a influência direta de Rousseau na Revolução Francesa?', v: 'Sua noção de "vontade geral" e "soberania popular" justificou a derrubada do absolutismo e a Declaração dos Direitos do Homem e do Cidadão (1789). "O Contrato Social" foi a "Bíblia" dos revolucionários.' },
  { f: 'Por que Sócrates aceitou ser executado em vez de fugir?', v: 'Porque havia sido CONDENADO PELA LEI DE ATENAS. Para Sócrates, a desobediência à lei seria contradição com tudo que ele havia ensinado — a virtude é o conhecimento da justiça, e justiça inclui respeito ao Estado. Cicuta em 399 a.C.' },
  { f: 'Por que Locke é chamado de "pai do liberalismo"?', v: 'Porque defendeu: (1) direitos naturais individuais (vida, liberdade, propriedade), (2) governo LIMITADO e por consentimento, (3) tolerância religiosa, (4) divisão de poderes. Influenciou diretamente a Constituição americana (1787) e o pensamento liberal moderno.' }
];

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  const cartas = CARTAS_BASE.map((c, i) => ({
    id: i, frente: c.f, verso: c.v,
    ef: 2.5, // easiness factor
    intervalo: 0, // dias
    repeticoes: 0,
    proxima: new Date().toISOString().slice(0,10)
  }));
  return { cartas, criada: new Date().toISOString() };
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();
let cartaAtual = null;
let sessaoFeitas = 0;

function getCartasDevidas() {
  const hoje = new Date().toISOString().slice(0,10);
  return state.cartas.filter(c => c.proxima <= hoje);
}

function proximaCarta() {
  const devidas = getCartasDevidas();
  if (devidas.length === 0) {
    mostrarConclusao();
    return;
  }
  cartaAtual = devidas[Math.floor(Math.random() * devidas.length)];
  document.getElementById('frente').textContent = cartaAtual.frente;
  document.getElementById('verso').textContent = cartaAtual.verso;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('acoesRevisao').classList.add('hidden');
  atualizarStats();
}

function virarCarta() {
  const c = document.getElementById('card');
  if (c.classList.contains('flipped')) return;
  c.classList.add('flipped');
  setTimeout(() => document.getElementById('acoesRevisao').classList.remove('hidden'), 350);
}

// Algoritmo SM-2 simplificado
function responder(q) {
  const qualityMap = { 'errei': 0, 'dificil': 2, 'bom': 4, 'facil': 5 };
  const quality = qualityMap[q];
  let { ef, intervalo, repeticoes } = cartaAtual;

  if (quality < 3) {
    repeticoes = 0;
    intervalo = 1;
  } else {
    if (repeticoes === 0) intervalo = 1;
    else if (repeticoes === 1) intervalo = 3;
    else intervalo = Math.round(intervalo * ef);
    repeticoes++;
    ef = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  }

  const proxData = new Date();
  proxData.setDate(proxData.getDate() + intervalo);
  cartaAtual.ef = ef;
  cartaAtual.intervalo = intervalo;
  cartaAtual.repeticoes = repeticoes;
  cartaAtual.proxima = proxData.toISOString().slice(0,10);
  saveState(state);
  sessaoFeitas++;
  setTimeout(() => proximaCarta(), 300);
}

function atualizarStats() {
  const devidas = getCartasDevidas();
  document.getElementById('statTotal').textContent = state.cartas.length;
  document.getElementById('statHoje').textContent = sessaoFeitas;
  document.getElementById('statRevisar').textContent = devidas.length;
  document.getElementById('statDominadas').textContent = state.cartas.filter(c => c.repeticoes >= 4 && c.ef > 2.5).length;
}

function mostrarConclusao() {
  document.querySelector('.card-3d-container').classList.add('hidden');
  document.getElementById('acoesRevisao').classList.add('hidden');
  document.getElementById('conclusao').classList.remove('hidden');
  document.getElementById('resultadoSessao').textContent = `Você revisou ${sessaoFeitas} cartas. Volte amanhã para a próxima rodada de revisão espaçada.`;
}

proximaCarta();
</script>
</body>
</html>
