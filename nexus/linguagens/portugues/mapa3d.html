<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catedral da Linguagem — Português | UNICAP Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020408; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }

  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(180deg, rgba(2,4,8,0.95) 0%, rgba(2,4,8,0) 100%);
  }
  #nav a {
    color: #f59e0b; text-decoration: none; font-size: 13px; font-weight: 500;
    letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  #nav a:hover { color: #fbbf24; }
  #nav-badge {
    font-family: 'Cinzel', serif; font-size: 12px; color: #a78bfa;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  #nav-right { display: flex; gap: 16px; align-items: center; }

  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3);
    color: #c4b5fd; font-size: 12px; padding: 8px 20px; border-radius: 24px;
    letter-spacing: 0.05em; pointer-events: none;
    animation: pulse-hint 3s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
  }

  #popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
    width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
    background: linear-gradient(135deg, rgba(10,8,25,0.98) 0%, rgba(18,14,40,0.98) 100%);
    border: 1px solid rgba(167,139,250,0.4);
    border-radius: 16px; padding: 32px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 60px rgba(167,139,250,0.1);
    z-index: 200; display: none; transition: transform 0.2s, opacity 0.2s;
    scrollbar-width: thin; scrollbar-color: rgba(167,139,250,0.3) transparent;
  }
  #popup.visible { display: block; transform: translate(-50%, -50%) scale(1); }
  #popup-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: rgba(255,255,255,0.4); font-size: 22px;
    cursor: pointer; transition: color 0.2s; line-height: 1;
  }
  #popup-close:hover { color: #f59e0b; }
  #popup-title {
    font-family: 'Cinzel', serif; font-size: 18px; color: #a78bfa;
    margin-bottom: 4px; letter-spacing: 0.05em;
  }
  #popup-subtitle { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; margin-bottom: 20px; }
  #popup-desc { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.85); margin-bottom: 20px; }
  #popup-tip {
    background: rgba(245,158,11,0.08); border-left: 3px solid #f59e0b;
    padding: 14px 16px; border-radius: 0 8px 8px 0; font-size: 13px;
    color: rgba(255,255,255,0.8); line-height: 1.7;
  }
  #popup-tip strong { color: #f59e0b; }

  canvas { display: block; }
</style>
</head>
<body>

<nav id="nav">
  <a href="../../index.html">← Nexus</a>
  <span id="nav-badge">⛪ Catedral da Linguagem — Português</span>
  <div id="nav-right">
    <a href="resumo.html">Resumo</a>
    <a href="../ingles/mapa3d.html">Inglês →</a>
  </div>
</nav>

<div id="hint">Clique nos pilares para explorar os temas</div>

<div id="popup">
  <button id="popup-close">×</button>
  <div id="popup-title"></div>
  <div id="popup-subtitle">UNICAP 2026.2 — Português</div>
  <div id="popup-desc"></div>
  <div id="popup-tip"><strong>Dica UNICAP:</strong> <span id="popup-tip-text"></span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ─── SCENE SETUP ───────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x020408, 20, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x020408);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 10);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, -20);
controls.maxDistance = 35;
controls.minDistance = 2;
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.75;
camera.lookAt(0, 3, -20);

// ─── LIGHTING ──────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x04060e, 0.5);
scene.add(ambient);

const mainSpot = new THREE.SpotLight(0xffd5a0, 3, 80, Math.PI / 8, 0.4);
mainSpot.position.set(0, 25, -5);
mainSpot.target.position.set(0, 0, -35);
mainSpot.castShadow = true;
mainSpot.shadow.mapSize.width = 1024;
mainSpot.shadow.mapSize.height = 1024;
scene.add(mainSpot);
scene.add(mainSpot.target);

const entranceLight = new THREE.PointLight(0x2a1a4e, 0.6, 20);
entranceLight.position.set(0, 6, 8);
scene.add(entranceLight);

// ─── FLOOR ─────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(20, 60);
const floorMat = new THREE.MeshLambertMaterial({ color: 0x0d0d15 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, -1, -20);
floor.receiveShadow = true;
scene.add(floor);

// Grid on floor
const gridHelper = new THREE.GridHelper(60, 30, 0x1a1a28, 0x1a1a28);
gridHelper.position.set(0, -0.99, -20);
gridHelper.material.opacity = 0.3;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ─── CEILING (top of cathedral) ────────────────────────────────
const ceilGeo = new THREE.PlaneGeometry(20, 60);
const ceilMat = new THREE.MeshLambertMaterial({ color: 0x080810 });
const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(0, 15, -20);
scene.add(ceiling);

// Side walls
const wallMatL = new THREE.MeshLambertMaterial({ color: 0x0e0e1a, side: THREE.BackSide });
const wallL = new THREE.Mesh(new THREE.PlaneGeometry(60, 17), wallMatL);
wallL.rotation.y = Math.PI / 2;
wallL.position.set(-10, 7, -20);
scene.add(wallL);
const wallR = new THREE.Mesh(new THREE.PlaneGeometry(60, 17), wallMatL.clone());
wallR.rotation.y = -Math.PI / 2;
wallR.position.set(10, 7, -20);
scene.add(wallR);

// Back wall
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(20, 17), new THREE.MeshLambertMaterial({ color: 0x0b0b18 }));
backWall.position.set(0, 7, -50);
scene.add(backWall);

// ─── PILLAR DATA ────────────────────────────────────────────────
const pillars = [
  {
    x: -5, z: -5, side: 'L',
    name: 'Tipologia Textual',
    desc: 'Os 5 tipos: Narrativo (ação, personagens, narrador), Descritivo (características, adjetivos), Dissertativo-Argumentativo (tese + argumentos + conclusão), Injuntivo/Instrucional (ordens, receitas), Epistolar (cartas, e-mails). A UNICAP exige identificar a tipologia DOMINANTE de um texto — um texto pode ter elementos de vários tipos, mas um é o principal.',
    tip: 'Cai em toda prova UNICAP. Identifique: há narrador? → narrativo. Há tese e argumentos? → dissertativo. Há ordens/verbos no imperativo? → injuntivo. Aprenda a distinguir rapidamente.'
  },
  {
    x: 5, z: -5, side: 'R',
    name: 'Interpretação de Texto',
    desc: 'Leitura crítica: ideia principal vs. secundária, inferência (o que o texto IMPLICA mas não diz), intertextualidade (quando um texto dialoga com outro), distinção entre fato e opinião. A UNICAP usa textos reais: artigos jornalísticos, músicas (Luiz Gonzaga, Emicida), literatura, imagens e charges.',
    tip: 'Leia o texto INTEIRO antes das alternativas. A UNICAP frequentemente usa uma música ou poema + um artigo jornalístico na mesma questão. Identifique a linha argumentativa: qual é a tese do autor?'
  },
  {
    x: -5, z: -15, side: 'L',
    name: 'Funções da Linguagem',
    desc: '6 funções de Jakobson: REFERENCIAL (informar, foco no contexto — notícias), EXPRESSIVA (emoções do emissor — poesia lírica), APELATIVA/CONATIVA (persuadir o receptor — publicidade), POÉTICA (a forma da mensagem — literatura), FÁTICA (manter o canal — "alô?"), METALINGUÍSTICA (falar sobre a própria linguagem). Cada função tem um foco específico do ato comunicativo.',
    tip: 'A UNICAP pede a função DOMINANTE. Publicidade → apelativa. Poema lírico → expressiva ou poética. Notícia → referencial. Uma mensagem pode ter várias funções — identifique a que predomina.'
  },
  {
    x: 5, z: -15, side: 'R',
    name: 'Figuras de Linguagem',
    desc: 'Metáfora (comparação implícita), Metonímia (parte pelo todo, autor pela obra), Hipérbole (exagero), Ironia (sentido oposto), Antítese (oposição), Paradoxo (contradição aparente verdadeira), Eufemismo (suavizar), Catacrese (metáfora desgastada), Personificação (animizar inanimado), Sinestesia (mistura de sentidos).',
    tip: 'Figuras caem em textos literários e publicitários. A UNICAP pede não só identificar, mas explicar o EFEITO DE SENTIDO — por que o autor usou aquela figura? O que ela acrescenta ao texto?'
  },
  {
    x: -5, z: -25, side: 'L',
    name: 'Sintaxe e Gramática',
    desc: 'Sujeito e predicado (e suas classificações). Objeto direto e indireto. Adjunto adnominal e adverbial. Aposto e vocativo. Período simples vs. composto (coordenação e subordinação). Regência verbal: verbos que pedem preposição (assistir A, obedecer A, visar A, aspirar A) vs. verbos transitivos diretos.',
    tip: 'Sintaxe na UNICAP aparece dentro de questões de interpretação (entender uma oração subordinada muda o sentido da frase) e em questões de norma. Foco: regência dos verbos mais cobrados e pontuação.'
  },
  {
    x: 5, z: -25, side: 'R',
    name: 'Concordância e Coesão',
    desc: 'Concordância verbal (sujeito-verbo, incluindo sujeito composto, oração com SE apassivador/índice de indeterminação) e nominal (substantivo-adjetivo, artigo, numeral). Coesão: uso correto de conectivos (porém, contudo, entretanto, portanto, logo, ademais, outrossim). Coerência: unidade temática.',
    tip: 'Concordância com pronomes relativos (cujo, que, quem) é armadilha clássica. Coesão: memorize pelo menos 5 conectivos de cada tipo (adição, oposição, causa, conclusão, explicação) para a redação e para identificar nos textos.'
  }
];

// ─── STAINED GLASS COLORS ────────────────────────────────────────
const windowColors = [
  { color: 0x7c3aed, light: 0x9d5df0 },
  { color: 0xf59e0b, light: 0xfbbf24 },
  { color: 0x0891b2, light: 0x06b6d4 },
  { color: 0x10b981, light: 0x34d399 },
  { color: 0xf43f5e, light: 0xfb7185 }
];

const pillarMeshes = [];

function makeLabel(text, width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(8,6,20,0.88)';
  roundRect(ctx, 0, 0, width, height, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 2;
  roundRect(ctx, 1, 1, width - 2, height - 2, 11);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${height * 0.28}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, width / 2, height / 2);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Build pillars
pillars.forEach((p, i) => {
  const pillarGeo = new THREE.CylinderGeometry(0.7, 0.85, 16, 12);
  const pillarMat = new THREE.MeshLambertMaterial({
    color: 0x1a1c2e,
    emissive: 0x0a0b18,
    emissiveIntensity: 0.1
  });
  const pillar = new THREE.Mesh(pillarGeo, pillarMat);
  pillar.position.set(p.x, 7, p.z);
  pillar.castShadow = true;
  pillar.receiveShadow = true;
  pillar.userData = { type: 'pillar', data: p, baseEmissive: 0x0a0b18, baseIntensity: 0.1 };
  scene.add(pillar);
  pillarMeshes.push(pillar);

  // Label sprite
  const labelTex = makeLabel(p.name, 256, 64);
  const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, side: THREE.DoubleSide });
  const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 0.6), labelMat);
  labelMesh.position.set(p.x, 2.5, p.z + (p.side === 'L' ? 0.9 : -0.9));
  labelMesh.rotation.y = p.side === 'L' ? -Math.PI * 0.1 : Math.PI * 1.1;
  scene.add(labelMesh);

  // Small base platform
  const baseGeo = new THREE.CylinderGeometry(1.1, 1.2, 0.3, 12);
  const baseMat = new THREE.MeshLambertMaterial({ color: 0x14162a });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.set(p.x, -0.85, p.z);
  scene.add(base);

  // Capital (top detail)
  const capGeo = new THREE.CylinderGeometry(1.0, 0.7, 0.5, 12);
  const cap = new THREE.Mesh(capGeo, baseMat.clone());
  cap.position.set(p.x, 14.75, p.z);
  scene.add(cap);
});

// ─── STAINED GLASS WINDOWS ────────────────────────────────────────
const windowZPositions = [-2, -8, -14, -20, -26];
['left', 'right'].forEach((side, si) => {
  const xWall = side === 'left' ? -9.9 : 9.9;
  windowZPositions.forEach((wz, wi) => {
    const wColor = windowColors[wi];
    const wGeo = new THREE.PlaneGeometry(2.5, 5);
    const wMat = new THREE.MeshBasicMaterial({
      color: wColor.color, transparent: true, opacity: 0.55,
      side: THREE.DoubleSide
    });
    const win = new THREE.Mesh(wGeo, wMat);
    win.position.set(xWall, 7, wz);
    win.rotation.y = side === 'left' ? Math.PI / 2 : -Math.PI / 2;
    scene.add(win);

    // Window frame
    const frameGeo = new THREE.EdgesGeometry(wGeo);
    const frameMat = new THREE.LineBasicMaterial({ color: 0x8888aa, opacity: 0.5, transparent: true });
    const frame = new THREE.LineSegments(frameGeo, frameMat);
    frame.position.copy(win.position);
    frame.rotation.copy(win.rotation);
    scene.add(frame);

    // Glow light from window
    const wLight = new THREE.PointLight(wColor.light, 0.4, 8);
    wLight.position.set(xWall + (side === 'left' ? 1 : -1), 7, wz);
    scene.add(wLight);
  });
});

// ─── ALTAR ─────────────────────────────────────────────────────
const altarPlatform = new THREE.Mesh(
  new THREE.BoxGeometry(10, 0.8, 6),
  new THREE.MeshLambertMaterial({ color: 0x12102a })
);
altarPlatform.position.set(0, -0.6, -38);
altarPlatform.receiveShadow = true;
scene.add(altarPlatform);

const altarBlock = new THREE.Mesh(
  new THREE.BoxGeometry(3, 2, 1.2),
  new THREE.MeshLambertMaterial({ color: 0x1c1a3a })
);
altarBlock.position.set(0, 0.6, -39);
scene.add(altarBlock);

// Candles
[-1.2, 0, 1.2].forEach(cx => {
  const cBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.08, 0.8, 8),
    new THREE.MeshLambertMaterial({ color: 0xf5e6c8 })
  );
  cBase.position.set(cx, 1.4, -38.5);
  scene.add(cBase);

  const cLight = new THREE.PointLight(0xffaa44, 0.8, 5);
  cLight.position.set(cx, 2.0, -38.5);
  scene.add(cLight);

  // Flame glow
  const flame = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffcc44 })
  );
  flame.position.set(cx, 2.0, -38.5);
  scene.add(flame);
});

// Cross silhouette on back wall
const crossV = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 3, 0.1),
  new THREE.MeshBasicMaterial({ color: 0x2a2250 })
);
crossV.position.set(0, 6, -49.8);
scene.add(crossV);
const crossH = new THREE.Mesh(
  new THREE.BoxGeometry(1.8, 0.3, 0.1),
  new THREE.MeshBasicMaterial({ color: 0x2a2250 })
);
crossH.position.set(0, 6.8, -49.8);
scene.add(crossH);

// ─── ARCH DETAILS (arch shapes at top of nave) ─────────────────
for (let az = -5; az >= -35; az -= 10) {
  const archCurve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(-9, 9, az),
    new THREE.Vector3(0, 14, az),
    new THREE.Vector3(9, 9, az)
  );
  const archPoints = archCurve.getPoints(20);
  const archGeo = new THREE.BufferGeometry().setFromPoints(archPoints);
  const archLine = new THREE.Line(archGeo, new THREE.LineBasicMaterial({ color: 0x2a2860, opacity: 0.5, transparent: true }));
  scene.add(archLine);
}

// ─── FLOATING MOTES ────────────────────────────────────────────
const moteCount = 200;
const motePositions = new Float32Array(moteCount * 3);
const moteSpeeds = new Float32Array(moteCount);
const moteOffsets = new Float32Array(moteCount);
const moteOrigY = new Float32Array(moteCount);

for (let i = 0; i < moteCount; i++) {
  motePositions[i * 3] = (Math.random() - 0.5) * 14;
  motePositions[i * 3 + 1] = Math.random() * 14 - 1;
  motePositions[i * 3 + 2] = -(Math.random() * 40 + 2);
  moteSpeeds[i] = 0.003 + Math.random() * 0.005;
  moteOffsets[i] = Math.random() * Math.PI * 2;
  moteOrigY[i] = motePositions[i * 3 + 1];
}

const moteGeo = new THREE.BufferGeometry();
moteGeo.setAttribute('position', new THREE.BufferAttribute(motePositions, 3));
const moteMat = new THREE.PointsMaterial({ color: 0xffeebb, size: 0.06, transparent: true, opacity: 0.7 });
const motes = new THREE.Points(moteGeo, moteMat);
scene.add(motes);

// ─── RAYCASTER FOR INTERACTION ──────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPillar = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(pillarMeshes);
  if (hoveredPillar && (!hits.length || hits[0].object !== hoveredPillar)) {
    hoveredPillar.material.emissiveIntensity = hoveredPillar.userData.baseIntensity;
    renderer.domElement.style.cursor = 'default';
    hoveredPillar = null;
  }
  if (hits.length) {
    hoveredPillar = hits[0].object;
    hoveredPillar.material.emissiveIntensity = 0.6;
    renderer.domElement.style.cursor = 'pointer';
  }
}

function onClick(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(pillarMeshes);
  if (hits.length) {
    const d = hits[0].object.userData.data;
    document.getElementById('popup-title').textContent = d.name;
    document.getElementById('popup-desc').textContent = d.desc;
    document.getElementById('popup-tip-text').textContent = d.tip;
    const popup = document.getElementById('popup');
    popup.style.display = 'block';
    setTimeout(() => popup.classList.add('visible'), 10);
  }
}

document.addEventListener('mousemove', onMouseMove);
document.addEventListener('click', onClick);
document.getElementById('popup-close').addEventListener('click', () => {
  document.getElementById('popup').classList.remove('visible');
  setTimeout(() => { document.getElementById('popup').style.display = 'none'; }, 200);
});
document.getElementById('popup').addEventListener('click', e => { if(e.target === document.getElementById('popup')) e.currentTarget.querySelector('#popup-close').click(); });

// ─── ANIMATE ────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  // Float motes upward
  const pos = moteGeo.attributes.position.array;
  for (let i = 0; i < moteCount; i++) {
    pos[i * 3 + 1] += moteSpeeds[i];
    pos[i * 3] += Math.sin(t + moteOffsets[i]) * 0.002;
    if (pos[i * 3 + 1] > 15) {
      pos[i * 3 + 1] = -1;
    }
  }
  moteGeo.attributes.position.needsUpdate = true;

  // Flicker candle lights
  scene.children.forEach(c => {
    if (c.isPointLight && c.color.r > 0.9 && c.color.g < 0.8) {
      c.intensity = 0.7 + Math.sin(t * 5 + Math.random() * 0.5) * 0.15;
    }
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
