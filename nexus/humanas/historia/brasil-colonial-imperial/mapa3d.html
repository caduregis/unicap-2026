<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Engenho e o Trono — Brasil Colonial e Imperial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060402; font-family: 'Inter', sans-serif; overflow: hidden; color: #c8b898; }
#canvas { display: block; width: 100vw; height: 100vh; }
#navbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: linear-gradient(90deg, #0a0602ee, #180e04ee);
  border-bottom: 1px solid #3a1a0840;

  backdrop-filter: blur(8px);
}
#nav-back {
  color: #d4840a; text-decoration: none; font-size: 13px; font-weight: 500;
  padding: 6px 12px; border: 1px solid #d4840a40; border-radius: 6px;
  transition: all 0.2s;
}
#nav-back:hover { background: #d4840a20; }
#nav-badge {
  background: linear-gradient(135deg, #d4840a22, #a05c0818);
  border: 1px solid #d4840a50; border-radius: 20px;
  padding: 4px 14px; font-size: 12px; font-weight: 600; color: #e8a030;
}
#nav-title { flex: 1; font-size: 14px; font-weight: 600; color: #e8d8b8; }
#nav-link {
  color: #a07828; text-decoration: none; font-size: 12px; font-weight: 500;
  padding: 5px 12px; border: 1px solid #a0782840; border-radius: 6px;
  transition: all 0.2s;
}
#nav-link:hover { background: #a0782820; color: #d4a040; }
#tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: #0e0a04f0; border: 1px solid #d4840a60;
  border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #e8c880;
  max-width: 220px; opacity: 0; transition: opacity 0.2s;
  backdrop-filter: blur(10px);
}
#popup {
  position: fixed; z-index: 300; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.92);
  background: linear-gradient(135deg, #0e0a04, #180e06);
  border: 1px solid #d4840a70; border-radius: 14px;
  padding: 28px 32px; max-width: 540px; width: 90%;
  opacity: 0; pointer-events: none; transition: all 0.3s;
  backdrop-filter: blur(20px); box-shadow: 0 20px 60px #00000090, 0 0 40px #d4840a18;
}
#popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
#popup-title { font-size: 17px; font-weight: 700; color: #e8a030; margin-bottom: 14px; }
#popup-desc { font-size: 13px; line-height: 1.7; color: #c8b898; margin-bottom: 16px; }
#popup-tip {
  background: #d4840a18; border-left: 3px solid #d4840a;
  border-radius: 0 8px 8px 0; padding: 12px 16px;
  font-size: 12px; line-height: 1.6; color: #e8c870;
}
#popup-tip::before { content: "UNICAP "; font-weight: 700; color: #d4840a; }
#popup-close {
  position: absolute; top: 14px; right: 16px;
  background: none; border: 1px solid #d4840a40; color: #d4840a;
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
#popup-close:hover { background: #d4840a30; }
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #0a060290; border: 1px solid #d4840a30; border-radius: 20px;
  padding: 6px 18px; font-size: 11px; color: #a07828; z-index: 100;
  backdrop-filter: blur(6px);
}
#overlay { position: fixed; inset: 0; z-index: 250; pointer-events: none; opacity: 0; background: #00000060; transition: opacity 0.3s; }
#overlay.active { pointer-events: all; opacity: 1; }
</style>
</head>

<nav id="navbar">

  <button id="popup-close">✕</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const CONCEPTS = [
  {
    name: "Pacto Colonial",
    pos: [0, 1.2, 2],
    desc: "O sistema econômico que organizou o Brasil colonial: a colônia existe para enriquecer a metrópole. Monopólio comercial (exclusivismo): o Brasil só podia comercializar com Portugal. Produtos exportados: pau-brasil → cana-de-açúcar → ouro → algodão → café. O Brasil era explorado como fonte de matérias-primas, não como nação independente.",
    tip: "Questão clássica: 'O que era o pacto colonial?' → Sistema de exploração econômica em que a colônia produzia para a metrópole. O Bloqueio Continental de Napoleão QUEBROU esse pacto ao forçar a abertura dos portos em 1808."
  },
  {
    name: "Escravidão no Brasil",
    pos: [-8, 1.2, 2],
    desc: "O Brasil foi o maior importador de escravizados das Américas: ~4,9 milhões de africanos traficados (10x mais que os EUA). Escravidão durou 388 anos (1500-1888). Resistência: quilombos (Palmares, liderado por Zumbi), revoltas (Revolta dos Malês, 1835, Salvador). Lei do Ventre Livre (1871), Lei dos Sexagenários (1885), Lei Áurea (1888) — Princesa Isabel.",
    tip: "Para UNICAP: a escravidão no Brasil não foi 'suave' — foi violenta e sistemática. Questão sobre resistência: Quilombo dos Palmares é o maior exemplo. Revolta dos Malês = única revolta urbana de escravizados muçulmanos da história."
  },
  {
    name: "Ciclos Econômicos",
    pos: [8, 1.2, 2],
    desc: "Sequência dos produtos principais: PAU-BRASIL (séc. XVI, escambo com indígenas, monopólio régio) → CANA-DE-AÇÚCAR (séc. XVI-XVII, Nordeste, base da economia colonial) → MINERAÇÃO/OURO (séc. XVIII, Minas Gerais, gerou Vila Rica/Ouro Preto, Inconfidência Mineira 1789) → CAFÉ (séc. XIX-XX, São Paulo, financiou industrialização). Cada ciclo gerou uma região dominante.",
    tip: "A SEQUÊNCIA dos ciclos é cobrada diretamente. Ouro → Inconfidência Mineira (1789) = primeira grande revolta separatista. Tiradentes é símbolo — mesmo sendo enforcado, não foi o líder real (era Tomás António Gonzaga e outros)."
  },
  {
    name: "Colonização e Povos Originários",
    pos: [-4, 1.2, 5],
    desc: "Antes de 1500, estima-se 2-5 milhões de indígenas no Brasil (300+ povos diferentes). A colonização causou genocídio: doenças (varíola, sarampo), guerras e escravidão reduziram a população a ~300.000 em 1700. Jesuítas (Anchieta, Nóbrega) evangelizaram e protegeram os indígenas — conflito com colonos que queriam escravizá-los. Missões jesuíticas (reduções) foram expulsas em 1759 (Marquês de Pombal).",
    tip: "Marquês de Pombal (reformas pombalinas 1750-77): expulsou jesuítas, reformou o Estado, estimulou a economia — personagem cobrado em questões sobre reformismo iluminista na colônia."
  },
  {
    name: "Vinda da Família Real (1808)",
    pos: [4, 1.2, 5],
    desc: "Napoleão invadiu Portugal em 1807 → D. João VI veio ao Brasil com 15.000 pessoas. Transformações: abertura dos portos às nações amigas (quebrando o pacto colonial), criação do Banco do Brasil, Real Biblioteca (hoje Biblioteca Nacional), imprensa régia, academias militares. O Brasil deixou de ser colônia de fato — tornou-se sede do Império Português.",
    tip: "A abertura dos portos em 1808 = fim do exclusivismo colonial. A Inglaterra beneficiou-se mais (tratado comercial de 1810 deu à Grã-Bretanha tarifas menores que as de Portugal). A questão clássica: quem mais lucrou com a abertura dos portos? → Inglaterra."
  },
  {
    name: "Independência (1822) e Império",
    pos: [-6, 1.2, 8],
    desc: "D. Pedro I declara independência em 07/09/1822 às margens do Ipiranga. Causas: pressão da elite brasileira (mantê-los com D. Pedro), revolução liberal em Portugal queria recolonizar o Brasil. D. Pedro I abdicou em 1831 → D. Pedro II governa de 1840 a 1889. Período Imperial: Guerra do Paraguai (1864-70), Abolição (1888), Proclamação da República (1889).",
    tip: "Independência = processo gradual, não revolução popular. A questão 'de cima para baixo'. D. Pedro II foi o estadista mais bem avaliado do século XIX brasileiro — por que foi derrubado? Militares insatisfeitos + cafeicultores paulistas (antiabolicionismo) = República proclamada por Deodoro da Fonseca."
  },
  {
    name: "Proclamação da República (1889)",
    pos: [6, 1.2, 8],
    desc: "15/11/1889: Marechal Deodoro da Fonseca proclama a República. Causas: insatisfação militar (questão militar), abolição da escravidão sem indenização aos fazendeiros, influência positivista (ordem e progresso), desejo das oligarquias cafeeiras de maior autonomia. República Velha (1889-1930) = dominada pelas oligarquias do café (SP) e leite (MG) — política do 'café com leite'.",
    tip: "O positivismo de Augusto Comte (ordem e progresso no lema da bandeira) foi a filosofia da elite militar que proclamou a República. Questão: 'O que o lema Ordem e Progresso representa?' → Filosofia positivista de Comte."
  }
];

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x180a02);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0c04, 15, 60);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 18);
camera.lookAt(0, 2, -5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, -5);
controls.maxDistance = 40;
controls.minDistance = 5;
controls.maxPolarAngle = Math.PI * 0.75;

// Lighting
const sunLight = new THREE.DirectionalLight(0xff8030, 2);
sunLight.position.set(-15, 8, 5);
sunLight.castShadow = true;
scene.add(sunLight);

const ambLight = new THREE.AmbientLight(0x180806, 0.8);
scene.add(ambLight);

const chimneyGlow = new THREE.PointLight(0xff6010, 3, 20);
chimneyGlow.position.set(0, 7, -8);
scene.add(chimneyGlow);

// GROUND
const groundGeo = new THREE.PlaneGeometry(60, 60);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a0e06 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// SUGAR CANE FIELD
for (let i = 0; i < 40; i++) {
  const x = (Math.random() - 0.5) * 30;
  const z = -20 - Math.random() * 20;
  const h = 3 + Math.random() * 2;
  const stalkGeo = new THREE.CylinderGeometry(0.06, 0.1, h, 6);
  const stalkMat = new THREE.MeshLambertMaterial({ color: 0x3a4a10 });
  const stalk = new THREE.Mesh(stalkGeo, stalkMat);
  stalk.position.set(x, h / 2 - 0.5, z);
  stalk.rotation.z = (Math.random() - 0.5) * 0.3;
  scene.add(stalk);
  const topGeo = new THREE.SphereGeometry(0.25, 6, 4);
  const topMat = new THREE.MeshLambertMaterial({ color: 0x4a5a15 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.set(x, h - 0.5 + 0.25, z);
  scene.add(top);
}

// CASA GRANDE
const cgGroup = new THREE.Group();
cgGroup.position.set(-12, 0, -5);
const cgBody = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 5), new THREE.MeshLambertMaterial({ color: 0xe8e0cc }));
cgBody.position.y = 2;
cgGroup.add(cgBody);
const cgRoof1 = new THREE.Mesh(new THREE.BoxGeometry(7.5, 0.5, 2.8), new THREE.MeshLambertMaterial({ color: 0x3a1a08 }));
cgRoof1.position.set(0, 4.3, 0);
cgGroup.add(cgRoof1);
const cgRoof2 = new THREE.Mesh(new THREE.BoxGeometry(7.5, 0.5, 2.8), new THREE.MeshLambertMaterial({ color: 0x3a1a08 }));
cgRoof2.position.set(0, 4.3, 0);
cgRoof2.rotation.x = Math.PI / 12;
cgGroup.add(cgRoof2);
for (let ci = 0; ci < 4; ci++) {
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 3, 8), new THREE.MeshLambertMaterial({ color: 0xf0e8d8 }));
  col.position.set(-2.5 + ci * 1.6, 1.5, 2.6);
  cgGroup.add(col);
}
for (let wi = 0; wi < 4; wi++) {
  const win = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1, 0.1), new THREE.MeshLambertMaterial({ color: 0x0a0806 }));
  win.position.set(-2.4 + wi * 1.6, 2.2, 2.52);
  cgGroup.add(win);
}
scene.add(cgGroup);

// ENGENHO BUILDING
const enGroup = new THREE.Group();
enGroup.position.set(0, 0, -8);
const enBody = new THREE.Mesh(new THREE.BoxGeometry(8, 3, 6), new THREE.MeshLambertMaterial({ color: 0x2a1e14 }));
enBody.position.y = 1.5;
enGroup.add(enBody);
const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 6, 8), new THREE.MeshLambertMaterial({ color: 0x201608 }));
chimney.position.set(2, 5.5, 0);
enGroup.add(chimney);
const wheelGeo = new THREE.TorusGeometry(1.5, 0.15, 8, 16);
const wheel = new THREE.Mesh(wheelGeo, new THREE.MeshLambertMaterial({ color: 0x2a1408 }));
wheel.position.set(-4.5, 1.8, 0);
wheel.rotation.y = Math.PI / 2;
enGroup.add(wheel);
scene.add(enGroup);

// SMOKE PARTICLES
const smokeParts = [];
const smokeGeo = new THREE.SphereGeometry(0.18, 4, 4);
const smokeMat = new THREE.MeshLambertMaterial({ color: 0xc8b898, transparent: true, opacity: 0.5 });
for (let s = 0; s < 80; s++) {
  const sp = new THREE.Mesh(smokeGeo, smokeMat.clone());
  sp.userData.offset = Math.random() * Math.PI * 2;
  sp.userData.speed = 0.3 + Math.random() * 0.5;
  sp.userData.spread = Math.random() * 1.5;
  sp.position.set(2, 8 + (s / 80) * 6, -8);
  scene.add(sp);
  smokeParts.push(sp);
}

// SENZALA
const szGroup = new THREE.Group();
szGroup.position.set(12, 0, -5);
const szBody = new THREE.Mesh(new THREE.BoxGeometry(10, 2, 4), new THREE.MeshLambertMaterial({ color: 0x150c06 }));
szBody.position.y = 1;
szGroup.add(szBody);
const szRoof = new THREE.Mesh(new THREE.BoxGeometry(10.5, 0.3, 4.5), new THREE.MeshLambertMaterial({ color: 0x0e0804 }));
szRoof.position.y = 2.2;
szGroup.add(szRoof);
const szDoor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.1), new THREE.MeshLambertMaterial({ color: 0x080402 }));
szDoor.position.set(0, 0.7, 2.05);
szGroup.add(szDoor);
scene.add(szGroup);

// PORTUGUESE SHIP
const shipGroup = new THREE.Group();
shipGroup.position.set(20, 0, -10);
const hull = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, 2), new THREE.MeshLambertMaterial({ color: 0x2a1808 }));
hull.position.y = 0.5;
shipGroup.add(hull);
const mast1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 7, 6), new THREE.MeshLambertMaterial({ color: 0x1a1008 }));
mast1.position.set(-0.5, 4, 0);
shipGroup.add(mast1);
const mast2 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 5, 6), new THREE.MeshLambertMaterial({ color: 0x1a1008 }));
mast2.position.set(1.5, 3, 0);
shipGroup.add(mast2);
const sail = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 3), new THREE.MeshLambertMaterial({ color: 0xe8e0cc, side: THREE.DoubleSide }));
sail.position.set(-0.5, 4.5, 0.5);
shipGroup.add(sail);
const sail2 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), new THREE.MeshLambertMaterial({ color: 0xd8d0bc, side: THREE.DoubleSide }));
sail2.position.set(1.5, 3.5, 0.5);
shipGroup.add(sail2);
scene.add(shipGroup);

// CONCEPT SIGNS
const signMeshes = [];
const loader = new THREE.TextureLoader();

function makeSign(concept, idx) {
  const group = new THREE.Group();
  group.position.set(...concept.pos);

  // Stake
  const stake = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.05, 2, 6),
    new THREE.MeshLambertMaterial({ color: 0x1a0c06 })
  );
  stake.position.y = -0.2;
  group.add(stake);

  // Sign board
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#2a1808';
  ctx.fillRect(0, 0, 256, 128);
  ctx.strokeStyle = '#6a3810';
  ctx.lineWidth = 3;
  ctx.strokeRect(4, 4, 248, 120);
  ctx.fillStyle = '#e8c870';
  ctx.font = 'bold 18px serif';
  ctx.textAlign = 'center';
  const words = concept.name.split(' ');
  if (words.length <= 2) {
    ctx.fillText(concept.name, 128, 72);
  } else {
    const mid = Math.ceil(words.length / 2);
    ctx.fillText(words.slice(0, mid).join(' '), 128, 54);
    ctx.fillText(words.slice(mid).join(' '), 128, 82);
  }
  const tex = new THREE.CanvasTexture(canvas);

  const board = new THREE.Mesh(
    new THREE.BoxGeometry(2.8, 0.08, 1.5),
    [
      new THREE.MeshLambertMaterial({ color: 0x2a1808 }),
      new THREE.MeshLambertMaterial({ color: 0x2a1808 }),
      new THREE.MeshLambertMaterial({ color: 0x2a1808 }),
      new THREE.MeshLambertMaterial({ color: 0x2a1808 }),
      new THREE.MeshLambertMaterial({ map: tex }),
      new THREE.MeshLambertMaterial({ color: 0x1a0c04 }),
    ]
  );
  board.position.y = 0.9;
  board.userData.concept = concept;
  board.userData.origEmissive = 0x000000;
  group.add(board);

  scene.add(group);
  signMeshes.push(board);
  return group;
}

CONCEPTS.forEach((c, i) => makeSign(c, i));

// FIREFLIES in cane field
const fireflies = [];
for (let f = 0; f < 30; f++) {
  const ffGeo = new THREE.SphereGeometry(0.05, 4, 4);
  const ffMat = new THREE.MeshBasicMaterial({ color: 0xff8820, transparent: true, opacity: 0.7 });
  const ff = new THREE.Mesh(ffGeo, ffMat);
  const ffX = (Math.random() - 0.5) * 28;
  ff.position.set(ffX, 0.5 + Math.random() * 2, -20 - Math.random() * 18);
  ff.userData.offset = Math.random() * Math.PI * 2;
  ff.userData.baseX = ffX;
  scene.add(ff);
  fireflies.push(ff);
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredSign = null;
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');
const overlay = document.getElementById('overlay');

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(signMeshes);
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (hoveredSign !== obj) {
      if (hoveredSign) hoveredSign.material[4].emissive = new THREE.Color(0x000000);
      hoveredSign = obj;
      obj.material[4].emissive = new THREE.Color(0x3a1a00);
    }
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.textContent = obj.userData.concept.name;
    document.body.style.cursor = 'pointer';
  } else {
    if (hoveredSign) hoveredSign.material[4].emissive = new THREE.Color(0x000000);
    hoveredSign = null;
    tooltip.style.opacity = '0';
    document.body.style.cursor = 'default';
  }
}

function onMouseClick(e) {
  if (e.target.id === 'popup-close' || e.target.id === 'overlay') {
    closePopup(); return;
  }
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(signMeshes);
  if (hits.length > 0) {
    const c = hits[0].object.userData.concept;
    document.getElementById('popup-title').textContent = c.name;
    document.getElementById('popup-desc').textContent = c.desc;
    document.getElementById('popup-tip').textContent = c.tip;
    popup.classList.add('active');
    overlay.classList.add('active');
  }
}

function closePopup() {
  popup.classList.remove('active');
  overlay.classList.remove('active');
}

document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('overlay').addEventListener('click', closePopup);
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Smoke particles
  smokeParts.forEach((sp, i) => {
    const age = ((t * sp.userData.speed + sp.userData.offset) % 1);
    sp.position.y = 8 + age * 6;
    sp.position.x = 2 + Math.sin(t * 0.5 + sp.userData.offset) * sp.userData.spread * 0.5;
    sp.material.opacity = 0.5 * (1 - age);
    sp.scale.setScalar(0.8 + age * 1.5);
  });

  // Water wheel rotation
  wheel.rotation.z += 0.008;

  // Chimney glow flicker
  chimneyGlow.intensity = 2.5 + Math.sin(t * 3.7) * 0.8;

  // Fireflies
  fireflies.forEach(ff => {
    ff.position.y = 0.8 + Math.sin(t * 1.2 + ff.userData.offset) * 0.8;
    ff.position.x = ff.userData.baseX + Math.sin(t * 0.4 + ff.userData.offset) * 1.2;
    ff.material.opacity = 0.4 + Math.sin(t * 2 + ff.userData.offset) * 0.35;
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
