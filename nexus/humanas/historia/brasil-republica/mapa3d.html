<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Cintelar do Catete — República, Vargas e Ditadura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020106; font-family: 'Inter', sans-serif; overflow: hidden; color: #c8b898; }
#canvas { display: block; width: 100vw; height: 100vh; }
#navbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: linear-gradient(90deg, #020104ee, #060210ee);
  border-bottom: 1px solid #8060201a;
  display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100;
  backdrop-filter: blur(8px);
}
#nav-back { color: #d4a030; text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 12px; border: 1px solid #d4a03040; border-radius: 6px; transition: all .2s; }
#nav-back:hover { background: #d4a03020; }
#nav-badge { background: linear-gradient(135deg, #d4a03022, #80600818); border: 1px solid #d4a03050; border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 600; color: #e8b840; }
#nav-title { flex: 1; font-size: 14px; font-weight: 600; color: #e8d8b8; }
#nav-link { color: #907020; text-decoration: none; font-size: 12px; font-weight: 500; padding: 5px 12px; border: 1px solid #90702040; border-radius: 6px; transition: all .2s; }
#nav-link:hover { background: #90702020; color: #d4a030; }
#tooltip { position: fixed; pointer-events: none; z-index: 200; background: #06020ef0; border: 1px solid #d4a03060; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #e8c880; max-width: 220px; opacity: 0; transition: opacity .2s; backdrop-filter: blur(10px); }
#popup { position: fixed; z-index: 300; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.92); background: linear-gradient(135deg, #060210, #0c0420); border: 1px solid #d4a03070; border-radius: 14px; padding: 28px 32px; max-width: 540px; width: 90%; opacity: 0; pointer-events: none; transition: all .3s; backdrop-filter: blur(20px); box-shadow: 0 20px 60px #00000090, 0 0 40px #d4a03018; }
#popup.active { opacity: 1; pointer-events: all; transform: translate(-50%,-50%) scale(1); }
#popup-title { font-size: 17px; font-weight: 700; color: #e8b840; margin-bottom: 14px; }
#popup-desc { font-size: 13px; line-height: 1.7; color: #c8b898; margin-bottom: 16px; }
#popup-tip { background: #d4a03018; border-left: 3px solid #d4a030; border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 12px; line-height: 1.6; color: #e8c870; }
#popup-tip::before { content: "UNICAP "; font-weight: 700; color: #d4a030; }
#popup-close { position: absolute; top: 14px; right: 16px; background: none; border: 1px solid #d4a03040; color: #d4a030; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
#popup-close:hover { background: #d4a03030; }
#hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #04020a90; border: 1px solid #d4a03030; border-radius: 20px; padding: 6px 18px; font-size: 11px; color: #907020; z-index: 100; backdrop-filter: blur(6px); }
#overlay { position: fixed; inset: 0; z-index: 250; pointer-events: none; opacity: 0; background: #00000060; transition: opacity .3s; }
#overlay.active { pointer-events: all; opacity: 1; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<nav id="navbar">
  <a href="../../../index.html" id="nav-back">← Nexus</a>
  <span id="nav-badge">🏛️ Palácio do Catete — República Brasileira</span>
  <span id="nav-title">O Cintelar do Catete</span>
  <a href="resumo.html" id="nav-link">Resumo →</a>
</nav>
<div id="tooltip"></div>
<div id="overlay"></div>
<div id="popup">
  <button id="popup-close">✕</button>
  <div id="popup-title"></div>
  <div id="popup-desc"></div>
  <div id="popup-tip"></div>
</div>
<div id="hint">Passe o mouse sobre os documentos na mesa • Clique para estudar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const DOCS = [
  { name: "República Velha (1889-1930)", pos: [-5, 0.91, 0], desc: "O Brasil nasce republicano mas dominado pelas oligarquias. A política do 'café com leite': SP e MG se alternavam na presidência (São Paulo = café, Minas Gerais = leite). Coronelismo: fazendeiros controlavam o voto rural (voto de cabresto). Contestação: Tenentismo (revoltas 1922, 1924, Coluna Prestes 1925-27). A crise de 1929 derrubou os preços do café e solapou o regime.", tip: "Questão frequente: 'O que era o coronelismo?' → Sistema de dominação política dos coronéis (grandes fazendeiros) no interior, com controle dos votos locais. A 'Revolução de 1930' não foi uma revolução popular — foi um golpe das elites dissidentes." },
  { name: "Era Vargas (1930-1945)", pos: [-2, 0.91, -0.5], desc: "Getúlio Vargas governa por 15 anos em dois momentos: 1) Governo Provisório/Constitucional (1930-37): modernização, criação do Ministério do Trabalho. 2) Estado Novo (1937-45): ditadura. Constituição 'Polaca' (1937) — fechou o Congresso, censurou a imprensa (DIP — Departamento de Imprensa e Propaganda), perseguiu comunistas e integralistas, centralizou o poder. Apesar da ditadura, construiu a industrialização base.", tip: "Estado Novo inspirou-se no fascismo mas diferiu: não criou campo de concentração, não perseguiu sistematicamente minorias étnicas. Questão: 'O DIP servia para...' → Controlar a imprensa e promover o culto à personalidade de Vargas." },
  { name: "Trabalhismo e CLT", pos: [1, 0.91, 0], desc: "O maior legado de Vargas: a CLT (1943) consolidou direitos trabalhistas — carteira assinada, salário mínimo, férias, 8h de jornada, proteção à maternidade. Vargas foi chamado de 'pai dos pobres' pela classe trabalhadora urbana. O trabalhismo (ideologia que vê o Estado como protetor dos trabalhadores) foi construído conscientemente para ganhar apoio popular.", tip: "Ironia importante: a CLT foi criada por um ditador (Estado Novo). Não foi fruto de pressão sindical — foi concessão de cima para baixo ('outorga'). Isso diferencia o trabalhismo brasileiro do trabalhismo europeu." },
  { name: "Democracia Populista (1945-1964)", pos: [4, 0.91, 0.5], desc: "Com o fim da 2ª Guerra (democracias vencendo fascismo), a ditadura ficou insustentável. Vargas é deposto em 1945. Mas retorna eleito em 1950. Crise de 1954: militares pressionam → Vargas se suicida (24/08/1954). 'Carta Testamento': parta da vida para entrar na história. Legado: JK (50 anos em 5), Jango (reformas de base) → clima instável → 1964.", tip: "A carta-testamento de Vargas transformou o suicídio em martírio e manteve o varguismo vivo por décadas (JK, Jango, PT nasceu de sindicatos ligados ao trabalhismo). Questão: 'O que era o populismo?' → Relação direta entre líder carismático e massas urbanas, sem mediação dos partidos." },
  { name: "Ditadura Militar (1964-1985)", pos: [-4, 0.91, 0.5], desc: "31/03/1964: golpe militar contra João Goulart (Jango). AI-1 a AI-5 (atos institucionais). AI-5 (1968): o mais duro — cassou mandatos, fechou o Congresso, tortura sistemática. Presidentes: Castello Branco → Costa e Silva → Médici (anos de chumbo, 'milagre econômico' + repressão) → Geisel (abertura lenta e gradual) → Figueiredo (anistia 1979). Diretas Já (1984) → PMDB/Tancredo Neves → redemocratização.", tip: "O 'milagre econômico' (1968-73): crescimento de 10% ao ano MAS com concentração de renda e repressão política. 'Cresceu o bolo mas não dividiu' = crítica de Dom Hélder Câmara. Questão: qual ato institucional foi o mais repressivo? → AI-5 (1968)." },
  { name: "Redemocratização e Constituição 1988", pos: [5, 0.91, -0.5], desc: "Anistia (1979): presos políticos retornam. Diretas Já (1984): maior mobilização popular da história brasileira — mas emenda não passou. Tancredo Neves eleito (indireto) → morre antes de tomar posse → José Sarney. Constituição de 1988: 'Constituição Cidadã' (Ulysses Guimarães). Direitos sociais, liberdades civis, SUS, direito ao voto para analfabetos. Fernando Collor (1989): primeiro presidente eleito diretamente → impeachment 1992.", tip: "A Constituição de 1988 é a mais democrática da história brasileira. Para UNICAP/Direito: ela garante os direitos fundamentais, o estado democrático de direito e a separação dos poderes. 'Constituição Cidadã' = ênfase nos direitos sociais e individuais." }
];

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020106);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x040208, 20, 60);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 6, 16);
camera.lookAt(0, 2, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, 0);
controls.maxDistance = 30;
controls.minDistance = 5;
controls.maxPolarAngle = Math.PI * 0.75;

// Lighting
const ambLight = new THREE.AmbientLight(0x100808, 0.6);
scene.add(ambLight);

const sconceLights = [];
for (let si = 0; si < 6; si++) {
  const side = si % 2 === 0 ? -1 : 1;
  const z = -8 + (Math.floor(si / 2)) * 6;
  const sl = new THREE.PointLight(0xffa030, 1.4, 8);
  sl.position.set(side * 10, 4, z);
  scene.add(sl);
  sconceLights.push(sl);
}

const tableRimLight = new THREE.PointLight(0x2040ff, 1.5, 10);
tableRimLight.position.set(0, 0.3, 0);
scene.add(tableRimLight);

const spotLight = new THREE.SpotLight(0xffd080, 1.5, 30, Math.PI / 6, 0.4);
spotLight.position.set(0, 12, 0);
scene.add(spotLight);
const spotTarget = new THREE.Object3D();
spotTarget.position.set(0, 0, 0);
scene.add(spotTarget);
spotLight.target = spotTarget;

// FLOOR with canvas herringbone texture
const floorCanvas = document.createElement('canvas');
floorCanvas.width = 512; floorCanvas.height = 512;
const fCtx = floorCanvas.getContext('2d');
fCtx.fillStyle = '#d8cca8';
fCtx.fillRect(0, 0, 512, 512);
fCtx.strokeStyle = '#b89a70';
fCtx.lineWidth = 1;
for (let fx = 0; fx < 512; fx += 32) {
  for (let fy = 0; fy < 512; fy += 32) {
    fCtx.strokeRect(fx + 2, fy + 2, 28, 12);
    fCtx.strokeRect(fx + 16, fy + 16, 12, 28);
  }
}
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 4);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshLambertMaterial({ map: floorTex })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// CEILING & WALLS
const wallMat = new THREE.MeshLambertMaterial({ color: 0x0c0818 });
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), wallMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 12;
scene.add(ceiling);
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 14), new THREE.MeshLambertMaterial({ color: 0x0a0618 }));
backWall.position.set(0, 7, -15);
scene.add(backWall);
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 14), wallMat);
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-15, 7, 0);
scene.add(leftWall);
const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 14), wallMat);
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(15, 7, 0);
scene.add(rightWall);

// BACK WALL MURAL
const muralCanvas = document.createElement('canvas');
muralCanvas.width = 512; muralCanvas.height = 256;
const mCtx = muralCanvas.getContext('2d');
const grad = mCtx.createLinearGradient(0, 0, 512, 256);
grad.addColorStop(0, '#0a1428');
grad.addColorStop(0.5, '#142040');
grad.addColorStop(1, '#0a1428');
mCtx.fillStyle = grad;
mCtx.fillRect(0, 0, 512, 256);
mCtx.fillStyle = '#1a3810';
mCtx.ellipse(256, 128, 180, 100, 0, 0, Math.PI * 2);
mCtx.fill();
mCtx.fillStyle = '#d4b020';
mCtx.font = 'bold 24px serif';
mCtx.textAlign = 'center';
mCtx.fillText('REPÚBLICA FEDERATIVA DO BRASIL', 256, 64);
mCtx.strokeStyle = '#d4b020';
mCtx.lineWidth = 2;
mCtx.strokeRect(20, 20, 472, 216);
const muralTex = new THREE.CanvasTexture(muralCanvas);
const mural = new THREE.Mesh(new THREE.PlaneGeometry(16, 8), new THREE.MeshLambertMaterial({ map: muralTex }));
mural.position.set(0, 5, -14.9);
scene.add(mural);

// COLUMNS
const colMat = new THREE.MeshLambertMaterial({ color: 0xe8e0cc, emissive: 0x1a1008 });
const capMat = new THREE.MeshLambertMaterial({ color: 0xd4b870 });
const colPositions = [[-8, -10], [-8, -4], [-8, 2], [8, -10], [8, -4], [8, 2]];
colPositions.forEach(([cx, cz]) => {
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.52, 12, 16), colMat);
  col.position.set(cx, 6, cz);
  scene.add(col);
  const cap1 = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.48, 0.5, 12), capMat);
  cap1.position.set(cx, 12.2, cz);
  scene.add(cap1);
  const cap2 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.28, 1.4), capMat);
  cap2.position.set(cx, 12.55, cz);
  scene.add(cap2);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 12), colMat);
  base.position.set(cx, -0.01, cz);
  scene.add(base);
});

// WALL SCONCE FIXTURES
colPositions.forEach(([cx, cz], i) => {
  const wallSide = cx < 0 ? -1 : 1;
  const scGeo = new THREE.CylinderGeometry(0.12, 0.2, 0.5, 8);
  const scMesh = new THREE.Mesh(scGeo, new THREE.MeshLambertMaterial({ color: 0x806030, emissive: 0xffa020, emissiveIntensity: 0.6 }));
  scMesh.position.set(wallSide * 11.5, 4, cz);
  scMesh.rotation.z = wallSide * Math.PI / 4;
  scene.add(scMesh);
});

// CENTRAL TABLE
const tableMat = new THREE.MeshLambertMaterial({ color: 0x1a0a04 });
const table = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 3.5), tableMat);
table.position.set(0, 0.8, 0);
scene.add(table);
const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), tableMat);
legL.position.set(-6, 0.4, 0); scene.add(legL);
const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), tableMat);
legR.position.set(6, 0.4, 0); scene.add(legR);

// DOCUMENTS ON TABLE
const docMeshes = [];
DOCS.forEach((doc, i) => {
  const cvs = document.createElement('canvas');
  cvs.width = 256; cvs.height = 192;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#f0e8d0';
  ctx.fillRect(0, 0, 256, 192);
  ctx.fillStyle = '#c8a860';
  ctx.fillRect(0, 0, 256, 36);
  ctx.fillStyle = '#2a1004';
  ctx.font = 'bold 14px serif';
  ctx.textAlign = 'center';
  const words = doc.name.split(' ');
  let line = ''; let lineNum = 0;
  words.forEach(w => {
    if ((line + w).length > 22 && line.length > 0) {
      ctx.fillText(line.trim(), 128, 20 + lineNum * 18);
      line = w + ' '; lineNum++;
    } else { line += w + ' '; }
  });
  ctx.fillText(line.trim(), 128, 20 + lineNum * 18);
  ctx.fillStyle = '#4a3020';
  ctx.font = '10px sans-serif';
  const desc = doc.desc.substring(0, 120) + '...';
  const descWords = desc.split(' ');
  let dl = ''; let dn = 0;
  descWords.forEach(w => {
    if ((dl + w).length > 32 && dl.length > 0) {
      ctx.fillText(dl.trim(), 128, 50 + dn * 14);
      dl = w + ' '; dn++;
    } else { dl += w + ' '; }
  });
  const tex = new THREE.CanvasTexture(cvs);
  const docMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 1.6),
    new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide })
  );
  docMesh.position.set(doc.pos[0], doc.pos[1], doc.pos[2]);
  docMesh.rotation.x = -Math.PI / 2;
  docMesh.rotation.z = (Math.random() - 0.5) * 0.2;
  docMesh.userData.concept = doc;
  scene.add(docMesh);
  docMeshes.push(docMesh);
});

// PORTRAITS ON WALLS
[[-12, 5, -8], [-12, 5, -2], [12, 5, -8], [12, 5, -2]].forEach(([px, py, pz]) => {
  const fc = document.createElement('canvas');
  fc.width = 128; fc.height = 160;
  const fc2 = fc.getContext('2d');
  fc2.fillStyle = '#180c0a';
  fc2.fillRect(0, 0, 128, 160);
  fc2.strokeStyle = '#806030';
  fc2.lineWidth = 6;
  fc2.strokeRect(3, 3, 122, 154);
  fc2.fillStyle = '#2a1808';
  fc2.ellipse(64, 80, 35, 45, 0, 0, Math.PI * 2);
  fc2.fill();
  const portTex = new THREE.CanvasTexture(fc);
  const portrait = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 2.2), new THREE.MeshLambertMaterial({ map: portTex }));
  portrait.position.set(px, py, pz);
  portrait.rotation.y = px < 0 ? Math.PI / 2 : -Math.PI / 2;
  scene.add(portrait);
});

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredDoc = null;
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');
const overlay = document.getElementById('overlay');
const origColors = new Map();
docMeshes.forEach(d => origColors.set(d, d.material.emissive ? d.material.emissive.clone() : new THREE.Color(0)));

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(docMeshes);
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (hoveredDoc !== obj) {
      if (hoveredDoc) hoveredDoc.material.emissive = new THREE.Color(0x000000);
      hoveredDoc = obj;
      obj.material.emissive = new THREE.Color(0x2a1800);
    }
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.textContent = obj.userData.concept.name;
    document.body.style.cursor = 'pointer';
  } else {
    if (hoveredDoc) { hoveredDoc.material.emissive = new THREE.Color(0x000000); hoveredDoc = null; }
    tooltip.style.opacity = '0';
    document.body.style.cursor = 'default';
  }
}

function onMouseClick(e) {
  if (e.target.id === 'popup-close' || e.target.id === 'overlay') { closePopup(); return; }
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(docMeshes);
  if (hits.length > 0) {
    const c = hits[0].object.userData.concept;
    document.getElementById('popup-title').textContent = c.name;
    document.getElementById('popup-desc').textContent = c.desc;
    document.getElementById('popup-tip').textContent = c.tip;
    popup.classList.add('active');
    overlay.classList.add('active');
  }
}
function closePopup() { popup.classList.remove('active'); overlay.classList.remove('active'); }
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('overlay').addEventListener('click', closePopup);
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  // Column emissive pulse
  scene.children.forEach(ch => {
    if (ch.material && ch.material.color && ch.material.color.r > 0.85) {
      ch.material.emissiveIntensity = 0.05 + Math.sin(t * 0.8) * 0.03;
    }
  });
  // Sconce flicker
  sconceLights.forEach((sl, i) => {
    sl.intensity = 1.2 + Math.sin(t * 2.5 + i * 1.3) * 0.3;
  });
  // Spotlight pan
  spotTarget.position.x = Math.sin(t * 0.2) * 5;
  spotTarget.position.z = Math.cos(t * 0.15) * 3;
  // Table rim light pulse
  tableRimLight.intensity = 1.2 + Math.sin(t * 1.1) * 0.4;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
