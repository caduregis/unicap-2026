<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Jardim do Liceu — Aristóteles | UNICAP Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Inter',sans-serif; }
  #canvas-container { width:100vw; height:100vh; }
  #nav {
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px;
    background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);
    z-index:100;
  }
  #nav a {
    color:#d4a840; text-decoration:none; font-size:13px; font-weight:500;
    letter-spacing:0.04em; padding:7px 14px;
    border:1px solid rgba(212,168,64,0.35); border-radius:6px;
    transition:all 0.2s; background:rgba(0,0,0,0.45);
  }
  #nav a:hover { background:rgba(212,168,64,0.15); border-color:rgba(212,168,64,0.6); }
  #badge {
    color:#e8b840; font-size:13px; font-weight:600; letter-spacing:0.06em;
    background:rgba(0,0,0,0.5); padding:7px 16px;
    border:1px solid rgba(232,184,64,0.3); border-radius:20px;
  }
  #hint {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    color:rgba(200,160,60,0.75); font-size:12px; font-weight:400;
    letter-spacing:0.08em; text-transform:uppercase;
    background:rgba(0,0,0,0.5); padding:8px 18px; border-radius:20px;
    border:1px solid rgba(200,160,60,0.2); pointer-events:none; z-index:100;
  }
  #popup {
    display:none; position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(145deg,rgba(6,4,1,0.98),rgba(14,9,3,0.97));
    border:1px solid rgba(200,150,40,0.45);
    border-radius:16px; padding:32px 36px; max-width:520px; width:90%;
    z-index:200; box-shadow:0 20px 60px rgba(0,0,0,0.9),0 0 40px rgba(200,140,40,0.1);
  }
  #popup.active { display:block; animation:fadeUp 0.25s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translate(-50%,-48%)} to{opacity:1;transform:translate(-50%,-50%)} }
  #popup-title { font-size:18px; font-weight:700; color:#d4a020; letter-spacing:0.03em; margin-bottom:14px; border-bottom:1px solid rgba(200,150,40,0.25); padding-bottom:12px; }
  #popup-desc { font-size:14px; color:#c0a870; line-height:1.7; margin-bottom:18px; }
  #popup-tip { font-size:13px; color:#a0e090; line-height:1.65; background:rgba(60,140,60,0.08); border-left:3px solid rgba(80,180,80,0.5); padding:12px 14px; border-radius:0 8px 8px 0; margin-bottom:18px; }
  #popup-tip::before { content:"UNICAP "; font-weight:700; color:#70d060; }
  #popup-close { display:block; text-align:center; cursor:pointer; background:rgba(200,150,40,0.12); color:#c09020; border:1px solid rgba(200,150,40,0.3); border-radius:8px; padding:9px; font-size:13px; font-weight:600; letter-spacing:0.05em; transition:all 0.2s; }
  #popup-close:hover { background:rgba(200,150,40,0.22); }
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:150; }
  #overlay.active { display:block; }
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav id="nav">
  <a href="resumo.html">← Resumo Aristóteles</a>
  <div id="badge">🌿 Jardim do Liceu — Aristóteles</div>
  <a href="../../../index.html">Hub Principal</a>
</nav>
<div id="hint">Clique nos bancos de pedra para explorar os conceitos</div>
<div id="overlay"></div>
<div id="popup">
  <div id="popup-title"></div>
  <div id="popup-desc"></div>
  <div id="popup-tip"></div>
  <div id="popup-close">Fechar</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x1a0e05);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0e05, 20, 50);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 150);
camera.position.set(0, 6, 14);
camera.lookAt(0, 1, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 4;
controls.maxDistance = 30;

// Sky dome — dusk gradient
const skyGeo = new THREE.SphereGeometry(80, 32, 32);
const skyMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, vertexColors: true });
const skyColors = [];
const skyVerts = skyGeo.attributes.position;
for (let i = 0; i < skyVerts.count; i++) {
  const y = skyVerts.getY(i);
  const norm = (y + 80) / 160;
  if (norm < 0.4) {
    skyColors.push(0.8, 0.3, 0.05);
  } else if (norm < 0.6) {
    const t = (norm - 0.4) / 0.2;
    skyColors.push(0.5 - t*0.4, 0.15 + t*0.05, 0.04 + t*0.06);
  } else {
    skyColors.push(0.05, 0.04, 0.12);
  }
}
skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Lighting — setting sun from low angle
const sunLight = new THREE.DirectionalLight(0xffd070, 2.0);
sunLight.position.set(-15, 5, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 60;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const ambLight = new THREE.AmbientLight(0x2a1a08, 0.6);
scene.add(ambLight);

// Garden torches (edge lights)
const torchPositions = [[-10, 1, -8], [10, 1, -8], [-10, 1, 8], [10, 1, 8]];
const torchLights = [];
torchPositions.forEach(([x,y,z], i) => {
  const tl = new THREE.PointLight(0xff8020, 1.5, 12);
  tl.position.set(x, y+1, z);
  tl.userData.phase = i * 1.3;
  scene.add(tl);
  torchLights.push(tl);
  // Torch stick
  const stickGeo = new THREE.CylinderGeometry(0.05, 0.07, 1.5, 6);
  const stickMat = new THREE.MeshLambertMaterial({ color: 0x2a1205 });
  const stick = new THREE.Mesh(stickGeo, stickMat);
  stick.position.set(x, 0.75, z);
  scene.add(stick);
  const flameGeo = new THREE.SphereGeometry(0.15, 6, 6);
  const flameMat = new THREE.MeshBasicMaterial({ color: 0xff6010 });
  const flame = new THREE.Mesh(flameGeo, flameMat);
  flame.position.set(x, 1.65, z);
  scene.add(flame);
});

// Ground
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x0d1a08 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// Garden path
const pathGeo = new THREE.PlaneGeometry(2.5, 20);
const pathMat = new THREE.MeshLambertMaterial({ color: 0x2a2218 });
const path = new THREE.Mesh(pathGeo, pathMat);
path.rotation.x = -Math.PI / 2;
path.rotation.z = 0.25;
path.position.set(2, -0.99, 0);
scene.add(path);

// Olive trees
function makeOliveTree(x, z, scale) {
  const g = new THREE.Group();
  const s = scale || 1;
  const trunkGeo = new THREE.CylinderGeometry(0.2*s, 0.3*s, 3*s, 8);
  const trunk = new THREE.Mesh(trunkGeo, new THREE.MeshLambertMaterial({ color: 0x2a1a08 }));
  trunk.position.y = 1.5*s;
  trunk.castShadow = true;
  g.add(trunk);
  const foliageGeo = new THREE.SphereGeometry(1.5*s, 8, 8);
  const foliage = new THREE.Mesh(foliageGeo, new THREE.MeshLambertMaterial({ color: 0x1a2a0a }));
  foliage.position.y = 4.0*s;
  foliage.scale.set(1, 0.75, 1);
  foliage.castShadow = true;
  g.add(foliage);
  g.position.set(x, -1, z);
  scene.add(g);
}
makeOliveTree(-10, -5, 1.1);
makeOliveTree(10, -5, 0.9);
makeOliveTree(-12, 2, 1.0);
makeOliveTree(12, 2, 1.2);
makeOliveTree(0, -14, 0.8);

// Stone bench function
function makeBench(x, z, angle) {
  const g = new THREE.Group();
  const stoneMat = new THREE.MeshLambertMaterial({ color: 0x2a2520 });
  // Seat
  const seatGeo = new THREE.BoxGeometry(2.5, 0.2, 0.8);
  const seat = new THREE.Mesh(seatGeo, stoneMat);
  seat.position.y = 0.45;
  seat.castShadow = true;
  seat.receiveShadow = true;
  g.add(seat);
  // Legs
  [[1, 0, 0], [-1, 0, 0]].forEach(([lx]) => {
    const legGeo = new THREE.BoxGeometry(0.2, 0.45, 0.8);
    const leg = new THREE.Mesh(legGeo, stoneMat);
    leg.position.set(lx, 0.22, 0);
    leg.castShadow = true;
    g.add(leg);
  });
  // Scroll on bench
  const scrollGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.9, 8);
  const scrollMat = new THREE.MeshLambertMaterial({ color: 0xd4b87a });
  const scroll = new THREE.Mesh(scrollGeo, scrollMat);
  scroll.rotation.z = Math.PI / 2;
  scroll.position.set(0.4, 0.62, 0);
  g.add(scroll);
  const scrollCap1 = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.08, 8), scrollMat);
  scrollCap1.rotation.z = Math.PI / 2;
  scrollCap1.position.set(0.84, 0.62, 0);
  g.add(scrollCap1);
  const scrollCap2 = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.08, 8), scrollMat);
  scrollCap2.rotation.z = Math.PI / 2;
  scrollCap2.position.set(-0.04, 0.62, 0);
  g.add(scrollCap2);
  g.position.set(x, 0, z);
  if (angle) g.rotation.y = angle;
  return { group: g, seat: seat };
}

// Concept bench data
const benchData = [
  { pos: [-6, -4], angle: 0.2, title: "Lógica — Organon",
    desc: "Aristóteles criou a lógica formal. O silogismo: premissa maior + premissa menor = conclusão ('Todo homem é mortal / Sócrates é homem / Logo, Sócrates é mortal'). 'Organon' = instrumento do pensamento. 10 categorias do ser (substância, quantidade, qualidade, relação...). A lógica é FERRAMENTA para todas as ciências.",
    tip: "Aristóteles é 'o pai da Lógica'. Questão: reconhecer a estrutura do silogismo ou identificar uma falácia lógica. O erro numa premissa compromete a conclusão mesmo que a forma seja válida." },
  { pos: [6, -4], angle: -0.2, title: "Metafísica — O Ser",
    desc: "Crítica às Ideias de Platão: as Ideias (Formas) não existem separadas das coisas — são imanentes, estão NA coisa. A substância = matéria + forma (hylomorfismo). Potência (o que pode ser) vs. Ato (o que é). Movimento = passagem da potência ao ato. Deus = Ato Puro (motor imóvel — move sem ser movido).",
    tip: "Diferença Platão/Aristóteles: Platão coloca Ideias no mundo transcendente (fora do mundo). Aristóteles coloca as formas no próprio ser (imanente). UNICAP pode pedir essa distinção." },
  { pos: [-5, 3], angle: 0.15, title: "Ética — Eudaimonia",
    desc: "Eudaimonia = felicidade/florescimento humano (não prazer momentâneo). A virtude é o meio-termo (mesotes) entre dois extremos: coragem entre covardia e temeridade; generosidade entre mesquinhez e prodigalidade. A virtude se adquire por hábito (não é inata). Ética das virtudes: forma de caráter virtuoso pelo exercício repetido.",
    tip: "Ética aristotélica ≠ ética kantiana. Aristóteles: foco no caráter e no florescimento humano. Kant: foco no dever e na razão universal. Questão frequente: 'O que Aristóteles entendia por felicidade?' → Eudaimonia, não prazer sensorial." },
  { pos: [5, 3], angle: -0.15, title: "Política — Zoon Politikon",
    desc: "'O homem é um animal político (zoon politikon)' — por natureza vive em polis (cidade-estado). Fora da polis, só um deus ou uma besta. Aristóteles classifica os regimes: bons (monarquia, aristocracia, politeia) vs. degenerados (tirania, oligarquia, democracia). Preferia a politeia (governo da classe média).",
    tip: "Para Aristóteles, a democracia é um regime DEGENERADO. Questão: 'Por que Aristóteles criticava a democracia?' → Governo do demos em interesse próprio, não do bem comum." },
  { pos: [-2, 5.5], angle: 0.1, title: "Biologia e Teleologia",
    desc: "Aristóteles foi o primeiro grande biólogo sistemático: classificou mais de 500 espécies animais, descreveu anatomia de polvos, abelhas, golfinhos. Propôs a scala naturae (escada dos seres): minerais → plantas → animais → humanos → divino. A teleologia: cada ser tem uma finalidade (telos) que é sua perfeição.",
    tip: "A teleologia aristotélica (tudo tem uma finalidade) foi muito influente no pensamento medieval cristão. São Tomás de Aquino adaptou Aristóteles à teologia cristã. Questão: 'O que é teleologia?' → Cada ser tem uma finalidade que direciona seu desenvolvimento." },
  { pos: [2, 5.5], angle: -0.1, title: "Aristóteles vs. Platão",
    desc: "PLATÃO: mundo das Ideias transcendente, conhecimento por reminiscência, corpo como prisão da alma, dualismo radical. ARISTÓTELES: formas imanentes no ser, conhecimento por observação + razão, hylomorfismo (corpo e alma unidos), empirismo moderado. Ambos são grandes — mas com sistemas filosóficos opostos.",
    tip: "A pintura 'A Escola de Atenas' de Rafael: Platão aponta para cima (mundo das Ideias), Aristóteles aponta para frente/baixo (mundo concreto). Esta imagem é metáfora perfeita da distinção." }
];

const benchMeshes = [];
const benchInfo = [];

benchData.forEach(b => {
  const { group, seat } = makeBench(b.pos[0], b.pos[1], b.angle);
  scene.add(group);
  benchMeshes.push(seat);
  benchInfo.push({ group, seat, mat: seat.material, data: b, baseY: 0 });
});

// Fireflies
const fireflyCount = 50;
const fireflies = [];
for (let i = 0; i < fireflyCount; i++) {
  const fg = new THREE.SphereGeometry(0.04, 4, 4);
  const fm = new THREE.MeshBasicMaterial({ color: 0xd0ff80, transparent: true, opacity: 0.8 });
  const ff = new THREE.Mesh(fg, fm);
  ff.position.set(
    (Math.random()-0.5)*22,
    Math.random()*2,
    (Math.random()-0.5)*22
  );
  ff.userData.speed = { x:(Math.random()-0.5)*0.01, y:(Math.random()-0.5)*0.005, z:(Math.random()-0.5)*0.01 };
  ff.userData.blinkPhase = Math.random()*Math.PI*2;
  scene.add(ff);
  fireflies.push(ff);
}

// Popup logic
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = -1;
const popupEl = document.getElementById('popup');
const overlayEl = document.getElementById('overlay');
const titleEl = document.getElementById('popup-title');
const descEl = document.getElementById('popup-desc');
const tipEl = document.getElementById('popup-tip');

function showPopup(d) {
  titleEl.textContent = d.title;
  descEl.textContent = d.desc;
  tipEl.textContent = d.tip;
  overlayEl.classList.add('active');
  popupEl.classList.add('active');
}

document.getElementById('popup-close').addEventListener('click', () => {
  popupEl.classList.remove('active');
  overlayEl.classList.remove('active');
});
overlayEl.addEventListener('click', () => {
  popupEl.classList.remove('active');
  overlayEl.classList.remove('active');
});

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX/W)*2-1;
  mouse.y = -(e.clientY/H)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(benchMeshes);
  if (hits.length > 0) {
    const idx = benchMeshes.indexOf(hits[0].object);
    if (idx !== hovered) {
      if (hovered >= 0) benchInfo[hovered].mat.emissive = new THREE.Color(0);
      hovered = idx;
      benchInfo[idx].mat.emissive = new THREE.Color(0x1a1408);
      document.body.style.cursor = 'pointer';
    }
  } else {
    if (hovered >= 0) { benchInfo[hovered].mat.emissive = new THREE.Color(0); hovered = -1; }
    document.body.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX/W)*2-1;
  mouse.y = -(e.clientY/H)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(benchMeshes);
  if (hits.length > 0) {
    const idx = benchMeshes.indexOf(hits[0].object);
    showPopup(benchInfo[idx].data);
    benchInfo[idx].group.position.y = 0.2;
    setTimeout(() => { benchInfo[idx].group.position.y = 0; }, 500);
  }
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // Fireflies
  fireflies.forEach((ff, i) => {
    ff.position.x += ff.userData.speed.x;
    ff.position.y += ff.userData.speed.y;
    ff.position.z += ff.userData.speed.z;
    ff.material.opacity = 0.4 + 0.5*Math.abs(Math.sin(t*1.5 + ff.userData.blinkPhase));
    if (Math.abs(ff.position.x) > 12) ff.userData.speed.x *= -1;
    if (ff.position.y < 0 || ff.position.y > 2) ff.userData.speed.y *= -1;
    if (Math.abs(ff.position.z) > 12) ff.userData.speed.z *= -1;
  });

  // Torch flicker
  torchLights.forEach((tl, i) => {
    tl.intensity = 1.3 + Math.sin(t*3.1 + tl.userData.phase)*0.3 + Math.sin(t*7.8 + i)*0.15;
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w=window.innerWidth, h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
});
</script>
</body>
</html>
