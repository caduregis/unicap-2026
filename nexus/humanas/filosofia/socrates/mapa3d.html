<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Ágora de Atenas — Sócrates | UNICAP Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
  #canvas-container { width: 100vw; height: 100vh; }
  #nav {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 100;
  }
  #nav a {
    color: #e8d8a0; text-decoration: none; font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em;
    padding: 7px 14px; border: 1px solid rgba(232,216,160,0.35);
    border-radius: 6px; transition: all 0.2s;
    background: rgba(0,0,0,0.4);
  }
  #nav a:hover { background: rgba(232,216,160,0.15); border-color: rgba(232,216,160,0.6); }
  #badge {
    color: #f5e8b0; font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    background: rgba(0,0,0,0.5); padding: 7px 16px;
    border: 1px solid rgba(245,232,176,0.3); border-radius: 20px;
  }
  #hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    color: rgba(220,200,140,0.75); font-size: 12px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(0,0,0,0.45); padding: 8px 18px; border-radius: 20px;
    border: 1px solid rgba(220,200,140,0.2); pointer-events: none;
    z-index: 100;
  }
  #popup {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(145deg, rgba(12,10,5,0.98), rgba(20,16,8,0.97));
    border: 1px solid rgba(210,185,110,0.4);
    border-radius: 16px; padding: 32px 36px; max-width: 520px; width: 90%;
    z-index: 200; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(200,170,80,0.1);
  }
  #popup.active { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translate(-50%,-48%); } to { opacity:1; transform:translate(-50%,-50%); } }
  #popup-title {
    font-size: 18px; font-weight: 700; color: #e8d080;
    letter-spacing: 0.03em; margin-bottom: 14px; border-bottom: 1px solid rgba(210,185,110,0.25);
    padding-bottom: 12px;
  }
  #popup-desc { font-size: 14px; color: #c8bea0; line-height: 1.7; margin-bottom: 18px; }
  #popup-tip {
    font-size: 13px; color: #a8e8a0; line-height: 1.65;
    background: rgba(80,160,80,0.08); border-left: 3px solid rgba(100,200,100,0.5);
    padding: 12px 14px; border-radius: 0 8px 8px 0;
    margin-bottom: 18px;
  }
  #popup-tip::before { content: "UNICAP "; font-weight: 700; color: #80e080; }
  #popup-close {
    display: block; text-align: center; cursor: pointer;
    background: rgba(210,185,110,0.12); color: #d4b850;
    border: 1px solid rgba(210,185,110,0.3); border-radius: 8px;
    padding: 9px; font-size: 13px; font-weight: 600; letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  #popup-close:hover { background: rgba(210,185,110,0.22); }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
  #overlay.active { display: block; }
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav id="nav">
  <a href="resumo.html">← Resumo Sócrates</a>
  <div id="badge">🏛️ A Ágora — Sócrates</div>
  <a href="../../../index.html">Hub Principal</a>
</nav>
<div id="hint">Clique nos tabletes de pedra para explorar os conceitos</div>
<div id="overlay"></div>
<div id="popup">
  <div id="popup-title"></div>
  <div id="popup-desc"></div>
  <div id="popup-tip"></div>
  <div id="popup-close">Fechar</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x9ec8f0);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x9ec8f0, 30, 80);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 200);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, -5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.maxPolarAngle = Math.PI * 0.5;
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 5;
controls.maxDistance = 40;

// Lights
const sunLight = new THREE.DirectionalLight(0xfffadc, 3);
sunLight.position.set(20, 30, -20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
scene.add(sunLight);

const ambLight = new THREE.AmbientLight(0xd4c4a0, 0.5);
scene.add(ambLight);

const fillLight = new THREE.DirectionalLight(0xfff8e0, 2.5);
fillLight.position.set(-10, 15, 10);
scene.add(fillLight);

// Sun sphere
const sunGeo = new THREE.SphereGeometry(2, 16, 16);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xfffcb0 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
sunMesh.position.set(20, 30, -20);
scene.add(sunMesh);

// Marble floor
const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshLambertMaterial({ color: 0xe8e0d0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Helper function to create a Doric column
function makeColumn(x, z) {
  const group = new THREE.Group();
  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(0.7, 0.8, 12, 12);
  const marbleMat = new THREE.MeshLambertMaterial({ color: 0xf0ebe0 });
  const shaft = new THREE.Mesh(shaftGeo, marbleMat);
  shaft.position.y = 6;
  shaft.castShadow = true;
  group.add(shaft);
  // Echinus (capital top)
  const echinusGeo = new THREE.CylinderGeometry(1.2, 0.7, 0.8, 12);
  const echinus = new THREE.Mesh(echinusGeo, marbleMat);
  echinus.position.y = 12.4;
  group.add(echinus);
  // Abacus
  const abacusGeo = new THREE.BoxGeometry(2.2, 0.4, 2.2);
  const abacus = new THREE.Mesh(abacusGeo, marbleMat);
  abacus.position.y = 13.0;
  group.add(abacus);
  // Base
  const baseGeo = new THREE.CylinderGeometry(0.95, 0.95, 0.4, 12);
  const base = new THREE.Mesh(baseGeo, marbleMat);
  base.position.y = 0.2;
  group.add(base);
  group.position.set(x, 0, z);
  group.traverse(m => { if (m.isMesh) m.castShadow = true; });
  scene.add(group);
  return group;
}

// Columns — two rows flanking the agora
const columnPositions = [
  [-8, -8], [-8, -2], [-8, 4],
  [8, -8], [8, -2], [8, 4], [0, -16]
];
columnPositions.forEach(([x,z]) => makeColumn(x, z));

// Architrave connecting left columns
const archMat = new THREE.MeshLambertMaterial({ color: 0xeee8d8 });
const archGeo = new THREE.BoxGeometry(0.8, 1.0, 14);
const archL = new THREE.Mesh(archGeo, archMat);
archL.position.set(-8, 13.5, -2);
archL.castShadow = true;
scene.add(archL);
const archR = new THREE.Mesh(archGeo, archMat);
archR.position.set(8, 13.5, -2);
archR.castShadow = true;
scene.add(archR);

// Parthenon in background
function makeParthenon() {
  const g = new THREE.Group();
  const matP = new THREE.MeshLambertMaterial({ color: 0xf5f0e8 });
  // Hill base
  const hillGeo = new THREE.BoxGeometry(28, 3, 14);
  const hill = new THREE.Mesh(hillGeo, new THREE.MeshLambertMaterial({ color: 0xd4c8a0 }));
  hill.position.set(0, 1, 0);
  g.add(hill);
  // Main building base
  const baseGeo = new THREE.BoxGeometry(22, 2, 11);
  const base = new THREE.Mesh(baseGeo, matP);
  base.position.set(0, 3, 0);
  g.add(base);
  // Columns (8 across front)
  for (let i = 0; i < 8; i++) {
    const cGeo = new THREE.CylinderGeometry(0.5, 0.6, 8, 8);
    const c = new THREE.Mesh(cGeo, matP);
    c.position.set(-10.5 + i * 3, 8, 0);
    g.add(c);
  }
  // Entablature
  const entGeo = new THREE.BoxGeometry(23, 1.2, 12);
  const ent = new THREE.Mesh(entGeo, matP);
  ent.position.set(0, 12.6, 0);
  g.add(ent);
  // Pediment (roof triangle via boxes)
  const pedGeo = new THREE.BoxGeometry(23, 0.4, 12);
  const ped = new THREE.Mesh(pedGeo, matP);
  ped.position.set(0, 13.0, 0);
  g.add(ped);
  const ridgeGeo = new THREE.BoxGeometry(1.0, 3, 1.0);
  const ridge = new THREE.Mesh(ridgeGeo, matP);
  ridge.position.set(0, 14.5, 0);
  g.add(ridge);
  g.traverse(m => { if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; } });
  g.position.set(0, 4, -42);
  scene.add(g);
}
makeParthenon();

// Olive trees
function makeOliveTree(x, z) {
  const g = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 3, 8);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x2a1a08 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 1.5;
  g.add(trunk);
  const foliageGeo = new THREE.SphereGeometry(1.5, 8, 8);
  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x4a6030 });
  const foliage = new THREE.Mesh(foliageGeo, foliageMat);
  foliage.position.y = 4.0;
  foliage.scale.set(1, 0.8, 1);
  g.add(foliage);
  g.traverse(m => { if (m.isMesh) m.castShadow = true; });
  g.position.set(x, 0, z);
  scene.add(g);
}
makeOliveTree(-12, 2);
makeOliveTree(12, 2);
makeOliveTree(-14, -5);
makeOliveTree(14, -5);
makeOliveTree(0, 10);

// Central fountain
const fountainBase = new THREE.Mesh(
  new THREE.TorusGeometry(1.5, 0.3, 8, 32),
  new THREE.MeshLambertMaterial({ color: 0xd8d0c0 })
);
fountainBase.rotation.x = -Math.PI / 2;
fountainBase.position.set(-9, 0.1, 8);
scene.add(fountainBase);
const fountainColumn = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15, 0.2, 1.2, 8),
  new THREE.MeshLambertMaterial({ color: 0xd8d0c0 })
);
fountainColumn.position.set(-9, 0.7, 8);
scene.add(fountainColumn);
const fountainTop = new THREE.Mesh(
  new THREE.SphereGeometry(0.3, 8, 8),
  new THREE.MeshLambertMaterial({ color: 0xa8e8f0 })
);
fountainTop.position.set(-9, 1.5, 8);
scene.add(fountainTop);

// Fountain particles
const fontParticles = [];
for (let i = 0; i < 60; i++) {
  const pg = new THREE.SphereGeometry(0.04, 4, 4);
  const pm = new THREE.MeshBasicMaterial({ color: 0xa0d8f0, transparent: true, opacity: 0.7 });
  const p = new THREE.Mesh(pg, pm);
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.8;
  p.position.set(-9 + Math.cos(angle)*r, Math.random() * 1.5, 8 + Math.sin(angle)*r);
  p.userData.speed = 0.02 + Math.random() * 0.03;
  p.userData.angle = angle;
  p.userData.r = r;
  p.userData.initY = Math.random() * 1.5;
  scene.add(p);
  fontParticles.push(p);
}

// Concept tablets data
const tablets = [
  { pos: [0, 0.1, 0], title: "O Método Socrático",
    desc: "Ironia + Maiêutica. IRONIA: fingir ignorância para revelar a contradição do interlocutor ('Só sei que nada sei'). MAIÊUTICA (arte da parteira): por meio de perguntas, ajudar o interlocutor a 'dar à luz' a verdade que já estava em si (reminiscência). O método é DIALÓGICO — acontece no diálogo, não em textos escritos. Sócrates não escreveu nada.",
    tip: "A UNICAP diferencia ironia socrática (método) de ironia literária (figura de linguagem). 'Só sei que nada sei' = ponto de PARTIDA filosófico, não niilismo — é a humildade necessária para buscar o conhecimento." },
  { pos: [-5, 0.1, -3], title: "Sócrates vs. Sofistas",
    desc: "Sofistas (Protágoras, Górgias, Trasímaco): relativismo ('o homem é a medida de todas as coisas'), retórica para persuadir, ensinavam mediante pagamento, não buscavam verdade universal. Sócrates: busca de verdade universal, recusava pagamento, acreditava que a virtude é conhecimento (intelectualismo moral), valor ético absoluto.",
    tip: "Questão clássica: 'Qual a diferença entre Sócrates e os sofistas?' Resposta direta: Sócrates busca a verdade universal; sofistas defendem o relativismo e a persuasão." },
  { pos: [5, 0.1, -3], title: "A Virtude como Conhecimento",
    desc: "Intelectualismo Moral: ninguém age mal voluntariamente. Quem pratica o mal, pratica por ignorância — porque não conhece o Bem verdadeiro. O conhecimento do Bem inevitavelmente leva à prática do Bem. Por isso, filosofia (busca do conhecimento) é o caminho para a virtude.",
    tip: "Para UNICAP: 'Segundo Sócrates, por que as pessoas fazem o mal?' → Por ignorância, não por maldade. Ação má = ausência de conhecimento. Base para entender o intelectualismo moral de Platão." },
  { pos: [-4, 0.1, 4], title: "O Julgamento e a Morte",
    desc: "399 a.C.: Sócrates julgado por corromper a juventude e não reconhecer os deuses de Atenas. Condenado por 501 juízes. Recusou o exílio — preferiu a morte à renúncia de sua missão filosófica. Tomou cicuta. A morte de Sócrates = liberdade de consciência vs. Estado.",
    tip: "A morte de Sócrates é frequente em questões sobre liberdade de pensamento, censura e relação indivíduo-Estado. Platão ficou traumatizado e escreveu 'Apologia de Sócrates'." },
  { pos: [4, 0.1, 4], title: "O Problema Socrático",
    desc: "Sócrates não escreveu nada. Fontes: Platão (diálogos filosóficos — mais rico, porém confunde Sócrates com ideias do próprio Platão), Xenofonte (pragmático, Sócrates mais simples), Aristófanes (cômica, parodia em 'As Nuvens'). Isso cria o 'problema socrático': qual é o Sócrates histórico vs. o Sócrates literário de Platão?",
    tip: "Se uma questão pede a fonte MAIS importante sobre Sócrates → Platão. Se pede a MAIS cômica ou crítica → Aristófanes ('As Nuvens')." },
  { pos: [0, 0.1, 7], title: "Daemon e Missão Filosófica",
    desc: "Sócrates afirmava ter um 'daemon' (voz interior, não um deus, mas uma força orientadora) que o guiava, impedindo-o de fazer o errado. Acreditava ter uma missão divina: despertar os atenienses de sua ignorância moral, como um 'moscardo' (gadfly) que impede o cavalo de dormir.",
    tip: "O 'daemon' socrático é uma força espiritual interior — não é o demônio cristão. A metáfora do 'moscardo' = incomoda quem está acomodado. Sócrates aceita isso como missão mesmo sabendo que custará a vida." }
];

const tabletMeshes = [];
const tabletData = [];

tablets.forEach((t, i) => {
  const g = new THREE.Group();
  // Stone tablet surface
  const tabGeo = new THREE.BoxGeometry(3, 0.18, 2);
  const tabMat = new THREE.MeshLambertMaterial({ color: 0xd4c8a8 });
  const tab = new THREE.Mesh(tabGeo, tabMat);
  tab.receiveShadow = true;
  tab.castShadow = true;
  g.add(tab);
  // Label plane with canvas texture
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#c4b898';
  ctx.fillRect(0, 0, 256, 128);
  ctx.fillStyle = '#3a2808';
  ctx.font = 'bold 18px serif';
  ctx.textAlign = 'center';
  const words = t.title.split(' ');
  let line = '', lines = [];
  words.forEach(w => {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > 220 && line) { lines.push(line.trim()); line = w + ' '; }
    else line = test;
  });
  if (line) lines.push(line.trim());
  const startY = 64 - (lines.length - 1) * 12;
  lines.forEach((l, li) => ctx.fillText(l, 128, startY + li * 24));
  const tex = new THREE.CanvasTexture(canvas);
  const labelGeo = new THREE.PlaneGeometry(2.8, 1.8);
  const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.rotation.x = -Math.PI / 2;
  label.position.y = 0.1;
  g.add(label);
  g.position.set(t.pos[0], t.pos[1], t.pos[2]);
  scene.add(g);
  tabletMeshes.push(tab);
  tabletData.push({ group: g, data: t, baseY: t.pos[1], mat: tabMat });
});

// Raycaster for interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredIdx = -1;

const popupEl = document.getElementById('popup');
const overlayEl = document.getElementById('overlay');
const titleEl = document.getElementById('popup-title');
const descEl = document.getElementById('popup-desc');
const tipEl = document.getElementById('popup-tip');

function showPopup(d) {
  titleEl.textContent = d.title;
  descEl.textContent = d.desc;
  tipEl.textContent = d.tip;
  overlayEl.classList.add('active');
  popupEl.classList.add('active');
}

document.getElementById('popup-close').addEventListener('click', () => {
  popupEl.classList.remove('active');
  overlayEl.classList.remove('active');
});
overlayEl.addEventListener('click', () => {
  popupEl.classList.remove('active');
  overlayEl.classList.remove('active');
});

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / W) * 2 - 1;
  mouse.y = -(e.clientY / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(tabletMeshes);
  if (hits.length > 0) {
    const idx = tabletMeshes.indexOf(hits[0].object);
    if (idx !== hoveredIdx) {
      if (hoveredIdx >= 0) tabletData[hoveredIdx].mat.emissive = new THREE.Color(0);
      hoveredIdx = idx;
      tabletData[idx].mat.emissive = new THREE.Color(0x2a2010);
      document.body.style.cursor = 'pointer';
    }
  } else {
    if (hoveredIdx >= 0) { tabletData[hoveredIdx].mat.emissive = new THREE.Color(0); hoveredIdx = -1; }
    document.body.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX / W) * 2 - 1;
  mouse.y = -(e.clientY / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(tabletMeshes);
  if (hits.length > 0) {
    const idx = tabletMeshes.indexOf(hits[0].object);
    showPopup(tabletData[idx].data);
    tabletData[idx].group.position.y = tabletData[idx].baseY + 0.3;
    setTimeout(() => { tabletData[idx].group.position.y = tabletData[idx].baseY; }, 600);
  }
});

// Distant hill/landscape
const hillGeo = new THREE.SphereGeometry(30, 16, 8);
const hillMat = new THREE.MeshLambertMaterial({ color: 0x8a9a70, side: THREE.BackSide });
const hillMesh = new THREE.Mesh(hillGeo, hillMat);
hillMesh.position.set(0, -20, 0);
scene.add(hillMesh);

// Clock
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();
  // Fountain particles
  fontParticles.forEach((p, i) => {
    p.position.y += p.userData.speed;
    p.material.opacity = 0.7 - (p.position.y / 2.5);
    if (p.position.y > 2.5) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * 0.8;
      p.position.set(-9 + Math.cos(angle)*r, 0, 8 + Math.sin(angle)*r);
      p.material.opacity = 0.7;
    }
  });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
