<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Contador do Tempo — UNICAP Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Inter',sans-serif; }
canvas { display:block; }
#nav { position:fixed; top:16px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
#nav-back, #nav-resumo {
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6); text-decoration:none; font-size:12px; font-weight:500;
  padding:8px 16px; border-radius:8px; backdrop-filter:blur(10px); transition:all 0.2s;
}
#nav-back:hover, #nav-resumo:hover { background:rgba(255,255,255,0.1); color:#fff; }
#nav-title {
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.4); font-size:11px; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; padding:8px 16px; border-radius:8px; backdrop-filter:blur(10px);
}
#popup {
  display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:rgba(8,6,18,0.97); border:1px solid rgba(255,255,255,0.12);
  border-radius:16px; padding:24px 28px; max-width:480px; width:90%; z-index:200;
  box-shadow:0 20px 60px rgba(0,0,0,0.8); backdrop-filter:blur(20px);
}
#popup-title { font-size:16px; font-weight:700; color:#e0d8f8; margin-bottom:10px; }
#popup-body { font-size:13px; color:#9080a8; line-height:1.6; margin-bottom:14px; }
#popup-tip {
  font-size:11px; color:#7060a8; background:rgba(124,96,232,0.08);
  border:1px solid rgba(124,96,232,0.2); border-radius:8px; padding:10px 14px;
  margin-bottom:14px; line-height:1.5;
}
#popup-tip strong { color:#a090d8; }
#popup-close {
  background:none; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.4);
  font-size:12px; padding:6px 16px; border-radius:6px; cursor:pointer; transition:all 0.2s;
}
#popup-close:hover { background:rgba(255,255,255,0.08); color:#fff; }
#hint {
  position:fixed; bottom:24px; right:24px; font-size:11px; color:rgba(255,255,255,0.2);
  font-family:'Inter',sans-serif; letter-spacing:0.05em;
}
</style>
</head>
<body>
<div id="nav">
  <a href="../../index.html" id="nav-back">← Nexus</a>
  <span id="nav-title">O Contador do Tempo</span>
  <a href="resumo.html" id="nav-resumo">Resumo →</a>
</div>
<div id="popup">
  <div id="popup-title"></div>
  <div id="popup-body"></div>
  <div id="popup-tip"></div>
  <button id="popup-close" onclick="document.getElementById('popup').style.display='none'">Fechar</button>
</div>
<div id="hint">Clique nos elementos para estudar</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020701);
scene.fog = new THREE.FogExp2(0x020701, 0.022);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 120);
camera.position.set(0, 8, 16);
camera.lookAt(0, 2, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(0, 2, 0);
controls.minDistance = 4;
controls.maxDistance = 35;

// Ambient lighting — dark green
const ambientLight = new THREE.AmbientLight(0x041408, 0.9);
scene.add(ambientLight);

// Candle lights — warm golden, intensities will flicker
const candles = [];
const candlePositions = [
  [-6, 4, 4], [6, 4, 4], [-5, 4, -5], [5, 4, -5], [0, 6, -6]
];
candlePositions.forEach(([x,y,z]) => {
  const light = new THREE.PointLight(0xffcc44, 1.4, 18);
  light.position.set(x, y, z);
  light.castShadow = true;
  candles.push(light);
  scene.add(light);
  // Visual candle stub
  const stub = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 0.4, 8),
    new THREE.MeshStandardMaterial({ color: 0xeeeedd, emissive: 0xffaa22, emissiveIntensity: 0.6 })
  );
  stub.position.set(x, y - 2.2, z);
  scene.add(stub);
});

// Floor — dark stone
const floorGeo = new THREE.PlaneGeometry(36, 36);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x060d04, roughness: 0.95, metalness: 0.02 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// Vaulted ceiling hint (arched top)
const ceilGeo = new THREE.CylinderGeometry(12, 12, 14, 24, 1, true);
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x030802, side: THREE.BackSide, roughness: 1 });
scene.add(new THREE.Mesh(ceilGeo, ceilMat));

// Walls (dark stone)
const wallMat = new THREE.MeshStandardMaterial({ color: 0x050d03, roughness: 0.95 });
function makeWallPlane(w, h, px, py, pz, ry) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,h), wallMat);
  m.position.set(px,py,pz); m.rotation.y=ry; m.receiveShadow=true; scene.add(m);
}
makeWallPlane(28, 14, 0, 6.5, -12, 0);
makeWallPlane(24, 14, -12, 6.5, 0, Math.PI/2);
makeWallPlane(24, 14, 12, 6.5, 0, -Math.PI/2);

// Fibonacci numbers as floating sprites on back wall
const fibNumbers = [1, 1, 2, 3, 5, 8, 13, 21];
fibNumbers.forEach((num, i) => {
  const spriteCanvas = document.createElement('canvas');
  spriteCanvas.width = 128; spriteCanvas.height = 128;
  const ctx = spriteCanvas.getContext('2d');
  ctx.clearRect(0,0,128,128);
  ctx.fillStyle = 'rgba(100,220,100,0.9)';
  ctx.font = 'bold 52px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), 64, 64);
  const tex = new THREE.CanvasTexture(spriteCanvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  const col = i % 4;
  const row = Math.floor(i / 4);
  sprite.position.set(-4.5 + col * 3, 7 - row * 2.5, -11.5);
  sprite.scale.set(1.6, 1.6, 1.6);
  scene.add(sprite);
});

// Central dark wooden table
const tableMat = new THREE.MeshStandardMaterial({ color: 0x1a0a03, roughness:0.85, metalness:0.05 });
const tableTop = new THREE.Mesh(new THREE.BoxGeometry(7, 0.2, 4), tableMat);
tableTop.position.set(0, 0.55, 1);
tableTop.castShadow = true;
scene.add(tableTop);
for(const [x,z] of [[-3,2.5],[3,2.5],[-3,-0.5],[3,-0.5]]) {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.1, 0.25), tableMat);
  leg.position.set(x, -0.02, z);
  scene.add(leg);
}

// PA visual — 6 equidistant green spheres in a line
const paSpheres = [];
const paLinePts = [];
for(let i=0; i<6; i++) {
  const x = -5 + i*2;
  const paSphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x44ff88, emissive: 0x226644, emissiveIntensity: 0.7 })
  );
  paSphere.position.set(x, 0.9, 3.5);
  scene.add(paSphere);
  paSpheres.push(paSphere);
  paLinePts.push(new THREE.Vector3(x, 0.9, 3.5));
}
const paLineGeo = new THREE.BufferGeometry().setFromPoints(paLinePts);
scene.add(new THREE.Line(paLineGeo, new THREE.LineBasicMaterial({ color: 0x44ff88, transparent:true, opacity:0.5 })));

// PG visual — 5 spheres with increasing scale, golden, ascending curve
const pgSpheres = [];
const pgLinePts = [];
for(let i=0; i<5; i++) {
  const x = -4 + i*2;
  const scale = 0.15 * Math.pow(1.5, i);
  const y = 0.9 + i * 0.35;
  const pgSphere = new THREE.Mesh(
    new THREE.SphereGeometry(scale, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xffcc44, emissive: 0xaa8822, emissiveIntensity: 0.7 })
  );
  pgSphere.position.set(x, y, -2.5);
  scene.add(pgSphere);
  pgSpheres.push(pgSphere);
  pgLinePts.push(new THREE.Vector3(x, y, -2.5));
}
const pgLineGeo = new THREE.BufferGeometry().setFromPoints(pgLinePts);
scene.add(new THREE.Line(pgLineGeo, new THREE.LineBasicMaterial({ color: 0xffcc44, transparent:true, opacity:0.5 })));

// Labels
function makeLabel(text, x, y, z, color) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color || 'rgba(100,255,150,0.9)';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true }));
  sp.position.set(x,y,z);
  sp.scale.set(2.4,0.6,1);
  scene.add(sp);
}
makeLabel('PA — Progressão Aritmética', 0, 1.5, 4.2, 'rgba(100,255,150,0.8)');
makeLabel('PG — Progressão Geométrica', 0, 1.5, -3.3, 'rgba(255,200,80,0.8)');

// Study nodes — luminous spheres
function makeNode(x, y, z, color, emissive) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 12, 12),
    new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: 0.8, roughness:0.25, metalness:0.3 })
  );
  m.position.set(x, y, z);
  scene.add(m);
  return m;
}

const n1 = makeNode(-6, 3.5, 4, 0x44ff88, 0x225544);   // PA
const n2 = makeNode(-6, 3.5, -4, 0xffcc44, 0x886622);  // PG
const n3 = makeNode(6, 3.5, 4, 0xff8844, 0x883322);    // Porcentagem
const n4 = makeNode(0, 5.0, 0, 0x44aaff, 0x224488);    // Juros simples
const n5 = makeNode(6, 3.5, -4, 0xdd44ff, 0x661188);   // Juros compostos
const n6 = makeNode(0, 4.0, -7, 0xff4488, 0x882244);   // MMC/MDC

const nodes = [
  {
    mesh: n1,
    title: 'Progressão Aritmética (PA)',
    body: 'PA: a diferença r entre termos consecutivos é constante. Termo geral: aₙ=a₁+(n-1)r. Soma dos n primeiros termos: Sₙ=n(a₁+aₙ)/2. Média aritmética: M=(a₁+aₙ)/2.',
    tip: '<strong>UNICAP:</strong> Encontrar o 10º termo e a soma dos 20 primeiros termos de uma PA. Cai frequentemente.'
  },
  {
    mesh: n2,
    title: 'Progressão Geométrica (PG)',
    body: 'PG: a razão q entre termos consecutivos é constante. Termo geral: aₙ=a₁·q^(n-1). Soma finita: Sₙ=a₁(qⁿ-1)/(q-1) para q≠1. Soma infinita (|q|<1): S=a₁/(1-q).',
    tip: '<strong>UNICAP:</strong> PG infinita com |q|<1 (série geométrica). Dívida/desconto em parcelas usa PG.'
  },
  {
    mesh: n3,
    title: 'Porcentagem',
    body: 'p% de N = N×p/100. Acréscimo de p%: N×(1+p/100). Desconto de p%: N×(1-p/100). Variação percentual: Δ%=(Vf-Vi)/Vi×100. Porcentagem inversa: se ficou 80% = desconto de 20%.',
    tip: '<strong>UNICAP:</strong> Descontos encadeados, aumento seguido de desconto, variação percentual total.'
  },
  {
    mesh: n4,
    title: 'Juros Simples',
    body: 'Juro simples: J=C·i·t. Montante: M=C(1+i·t). C=capital, i=taxa, t=tempo. Taxa deve estar na mesma unidade do tempo. Juros simples: linear — cresce uniformemente.',
    tip: '<strong>UNICAP:</strong> Calcular juros de um empréstimo com taxa mensal e prazo em meses.'
  },
  {
    mesh: n5,
    title: 'Juros Compostos',
    body: 'Montante: M=C(1+i)^t. Juros compostos: crescimento exponencial. Fórmula do valor presente: C=M/(1+i)^t. Mais realista para financiamentos. Capitalização mensal vs anual: mesma taxa nominal ≠ mesmo resultado.',
    tip: '<strong>UNICAP:</strong> M=C(1+i)^t é a fórmula mais cobrada. Calcular M dado C=1000, i=10%, t=3 anos.'
  },
  {
    mesh: n6,
    title: 'MMC, MDC e Divisibilidade',
    body: 'MMC (Mínimo Múltiplo Comum): usado em períodos, reencontros. MDC (Máximo Divisor Comum): usado em divisões iguais. Critérios de divisibilidade: /2 (último par), /3 (soma dígitos), /5 (final 0 ou 5), /9 (soma=9k). Números primos: divisores 1 e si mesmo.',
    tip: '<strong>UNICAP:</strong> Problemas de reencontro de ônibus/atletas usam MMC. Distribuição em grupos iguais usa MDC.'
  }
];

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
});

window.addEventListener('click', e => {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes.map(n=>n.mesh));
  if(hits.length) {
    const nd = nodes.find(n=>n.mesh===hits[0].object);
    if(nd){
      document.getElementById('popup-title').textContent = nd.title;
      document.getElementById('popup-body').textContent = nd.body;
      document.getElementById('popup-tip').innerHTML = nd.tip;
      document.getElementById('popup').style.display = 'block';
    }
  }
});

const candleOffsets = candles.map((_,i) => Math.random() * Math.PI * 2);

function animate(){
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;

  // Candle flickering
  candles.forEach((light, i) => {
    light.intensity = 1.2 + Math.sin(t*3.1+candleOffsets[i])*0.35 + Math.sin(t*7.7+i)*0.15;
  });

  // PA spheres pulse
  paSpheres.forEach((s, i) => {
    s.material.emissiveIntensity = 0.5 + Math.sin(t * 1.5 + i * 0.8) * 0.3;
    s.position.y = 0.9 + Math.sin(t * 0.8 + i * 0.5) * 0.12;
  });

  // PG spheres pulse
  pgSpheres.forEach((s, i) => {
    s.material.emissiveIntensity = 0.5 + Math.sin(t * 1.2 + i * 1.0) * 0.3;
    const baseY = 0.9 + i * 0.35;
    s.position.y = baseY + Math.sin(t * 0.7 + i * 0.6) * 0.1;
  });

  // Node float
  if(!nodes[0].mesh.userData.baseY) {
    nodes.forEach(nd => nd.mesh.userData.baseY = nd.mesh.position.y);
  }
  nodes.forEach((nd, i) => {
    nd.mesh.position.y = nd.mesh.userData.baseY + Math.sin(t*0.6+i*1.4)*0.25;
  });

  // Hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes.map(n=>n.mesh));
  nodes.forEach(nd => {
    const isHit = hits.length && hits[0].object === nd.mesh;
    const target = isHit ? 1.35 : 1.0;
    nd.mesh.scale.lerp(new THREE.Vector3(target,target,target), 0.12);
    nd.mesh.material.emissiveIntensity = isHit ? 1.5 : 0.8;
  });
  document.body.style.cursor = hits.length ? 'pointer' : 'default';

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
