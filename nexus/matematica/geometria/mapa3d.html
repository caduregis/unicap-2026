<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Ateliê de Euclides — UNICAP Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Inter',sans-serif; }
canvas { display:block; }
#nav { position:fixed; top:16px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
#nav-back, #nav-resumo {
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6); text-decoration:none; font-size:12px; font-weight:500;
  padding:8px 16px; border-radius:8px; backdrop-filter:blur(10px); transition:all 0.2s;
}
#nav-back:hover, #nav-resumo:hover { background:rgba(255,255,255,0.1); color:#fff; }
#nav-title {
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.4); font-size:11px; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; padding:8px 16px; border-radius:8px; backdrop-filter:blur(10px);
}
#popup {
  display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:rgba(8,6,18,0.97); border:1px solid rgba(255,255,255,0.12);
  border-radius:16px; padding:24px 28px; max-width:480px; width:90%; z-index:200;
  box-shadow:0 20px 60px rgba(0,0,0,0.8); backdrop-filter:blur(20px);
}
#popup-title { font-size:16px; font-weight:700; color:#e0d8f8; margin-bottom:10px; }
#popup-body { font-size:13px; color:#9080a8; line-height:1.6; margin-bottom:14px; }
#popup-tip {
  font-size:11px; color:#7060a8; background:rgba(124,96,232,0.08);
  border:1px solid rgba(124,96,232,0.2); border-radius:8px; padding:10px 14px;
  margin-bottom:14px; line-height:1.5;
}
#popup-tip strong { color:#a090d8; }
#popup-close {
  background:none; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.4);
  font-size:12px; padding:6px 16px; border-radius:6px; cursor:pointer; transition:all 0.2s;
}
#popup-close:hover { background:rgba(255,255,255,0.08); color:#fff; }
#hint {
  position:fixed; bottom:24px; right:24px; font-size:11px; color:rgba(255,255,255,0.2);
  font-family:'Inter',sans-serif; letter-spacing:0.05em;
}
</style>
</head>
<body>
<div id="nav">
  <a href="../../index.html" id="nav-back">← Nexus</a>
  <span id="nav-title">O Ateliê de Euclides</span>
  <a href="resumo.html" id="nav-resumo">Resumo →</a>
</div>
<div id="popup">
  <div id="popup-title"></div>
  <div id="popup-body"></div>
  <div id="popup-tip"></div>
  <button id="popup-close" onclick="document.getElementById('popup').style.display='none'">Fechar</button>
</div>
<div id="hint">Clique nos elementos para estudar</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// Scene setup
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050303);
scene.fog = new THREE.Fog(0x050303, 20, 50);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 10, 14);
camera.lookAt(0, 2, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(0, 2, -1);
controls.minDistance = 5;
controls.maxDistance = 35;

// Lighting — warm golden workshop feel
const ambientLight = new THREE.AmbientLight(0x2a1a0a, 1.2);
scene.add(ambientLight);
const mainLight = new THREE.PointLight(0xffaa44, 2.0, 40);
mainLight.position.set(0, 8, 0);
mainLight.castShadow = true;
scene.add(mainLight);
const sideLight1 = new THREE.PointLight(0xff8822, 1.2, 25);
sideLight1.position.set(-8, 5, 4);
scene.add(sideLight1);
const sideLight2 = new THREE.PointLight(0xffcc66, 0.8, 20);
sideLight2.position.set(6, 4, -6);
scene.add(sideLight2);

// Checkerboard floor via canvas texture
const floorCanvas = document.createElement('canvas');
floorCanvas.width = 512; floorCanvas.height = 512;
const fctx = floorCanvas.getContext('2d');
const tileSize = 64;
for(let row=0; row<8; row++) {
  for(let col=0; col<8; col++) {
    fctx.fillStyle = (row+col)%2===0 ? '#1a0e06' : '#0f0803';
    fctx.fillRect(col*tileSize, row*tileSize, tileSize, tileSize);
  }
}
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 4);
const floorGeo = new THREE.PlaneGeometry(32, 32);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness:0.9, metalness:0.05 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// Stone walls with geometric drawings
function makeWall(w, h, px, py, pz, ry, drawFn) {
  const wallCanvas = document.createElement('canvas');
  wallCanvas.width = 512; wallCanvas.height = 256;
  const ctx = wallCanvas.getContext('2d');
  ctx.fillStyle = '#0f0905';
  ctx.fillRect(0,0,512,256);
  // stone texture lines
  ctx.strokeStyle = 'rgba(80,50,20,0.3)';
  ctx.lineWidth = 1;
  for(let i=0;i<256;i+=32) ctx.strokeRect(0,i,512,32);
  for(let i=0;i<512;i+=64) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,256); ctx.stroke(); }
  if(drawFn) drawFn(ctx);
  const wallTex = new THREE.CanvasTexture(wallCanvas);
  const wallGeo = new THREE.PlaneGeometry(w, h);
  const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness:0.95, metalness:0.0 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.set(px, py, pz);
  wall.rotation.y = ry;
  wall.receiveShadow = true;
  scene.add(wall);
  return wall;
}
// Back wall with triangle drawing
makeWall(24, 10, 0, 4.5, -10, 0, (ctx) => {
  ctx.strokeStyle = 'rgba(255,200,100,0.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(200,220); ctx.lineTo(312,220); ctx.lineTo(200,60); ctx.closePath(); ctx.stroke();
  // right angle mark
  ctx.strokeStyle = 'rgba(255,200,100,0.4)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(200,204,16,16);
  // Labels
  ctx.fillStyle = 'rgba(255,200,100,0.6)'; ctx.font = '14px sans-serif';
  ctx.fillText('a', 245, 235); ctx.fillText('b', 190, 145); ctx.fillText('c', 265, 140);
  // Circle on right side
  ctx.strokeStyle = 'rgba(100,180,255,0.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(400, 140, 50, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(400,140); ctx.lineTo(450,140); ctx.stroke();
  ctx.fillStyle='rgba(100,180,255,0.5)'; ctx.font='12px sans-serif'; ctx.fillText('r',426,135);
});
// Left wall
makeWall(10, 10, -12, 4.5, 0, Math.PI/2, null);
// Right wall
makeWall(10, 10, 12, 4.5, 0, -Math.PI/2, null);

// Central wooden table
const tableTop = new THREE.Mesh(
  new THREE.BoxGeometry(6, 0.18, 3.5),
  new THREE.MeshStandardMaterial({ color: 0x3d1f06, roughness:0.85, metalness:0.05 })
);
tableTop.position.set(0, 0.65, 1);
tableTop.castShadow = true;
scene.add(tableTop);
// Table legs
const legMat = new THREE.MeshStandardMaterial({ color: 0x2d1504, roughness:0.9 });
[[2.5,1],[-2.5,1],[2.5,-0.8],[-2.5,-0.8]].forEach(([x,z]) => {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.3, 0.2), legMat);
  leg.position.set(x, -0.02, z);
  leg.castShadow = true;
  scene.add(leg);
});

// Floating / rotating 3D solids
// 1. Wireframe cube — cyan
const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
const cubeEdges = new THREE.EdgesGeometry(cubeGeo);
const cubeLine = new THREE.LineSegments(cubeEdges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
cubeLine.position.set(-4, 2, 0);
scene.add(cubeLine);

// 2. Wireframe sphere — magenta
const sphereGeo = new THREE.SphereGeometry(1.2, 16, 16);
const sphereWire = new THREE.Mesh(
  new THREE.SphereGeometry(1.2, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xff44ff, wireframe: true })
);
sphereWire.position.set(4, 2, 0);
scene.add(sphereWire);

// 3. Cylinder — solid orange
const cylinder = new THREE.Mesh(
  new THREE.CylinderGeometry(0.8, 0.8, 2, 16),
  new THREE.MeshStandardMaterial({ color: 0xff6622, roughness:0.5, metalness:0.2 })
);
cylinder.position.set(0, 2, -4);
cylinder.castShadow = true;
scene.add(cylinder);

// 4. Cone — green
const cone = new THREE.Mesh(
  new THREE.ConeGeometry(1, 2, 12),
  new THREE.MeshStandardMaterial({ color: 0x22cc55, roughness:0.5, metalness:0.2 })
);
cone.position.set(-4, 2, -4);
cone.castShadow = true;
scene.add(cone);

// 5. Triangular pyramid (3-sided cone) — golden
const pyramid = new THREE.Mesh(
  new THREE.ConeGeometry(1.2, 2, 3),
  new THREE.MeshStandardMaterial({ color: 0xddaa22, roughness:0.4, metalness:0.4 })
);
pyramid.position.set(4, 2, -4);
pyramid.castShadow = true;
scene.add(pyramid);

// Ambient particles (dust)
const dustCount = 300;
const dustPos = new Float32Array(dustCount * 3);
for(let i=0; i<dustCount; i++) {
  dustPos[i*3] = (Math.random()-0.5)*24;
  dustPos[i*3+1] = Math.random()*10;
  dustPos[i*3+2] = (Math.random()-0.5)*20;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.04, transparent:true, opacity:0.4 });
scene.add(new THREE.Points(dustGeo, dustMat));

// Study nodes — golden yellow spheres
const nodeColor = 0xffcc44;
const nodeEmissive = 0xaa8822;
function makeNode(x, y, z) {
  const mat = new THREE.MeshStandardMaterial({
    color: nodeColor, emissive: nodeEmissive, emissiveIntensity: 0.7,
    roughness: 0.3, metalness: 0.4
  });
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), mat);
  m.position.set(x, y, z);
  scene.add(m);
  return m;
}

const n1 = makeNode(-7, 3.5, 2);
const n2 = makeNode(7, 3.0, 1);
const n3 = makeNode(-5, 4.5, -6);
const n4 = makeNode(5, 4.0, -6);
const n5 = makeNode(0, 5.5, -7);
const n6 = makeNode(-2, 3.5, 4);

const nodes = [
  {
    mesh: n1,
    title: 'Triângulos',
    body: 'Soma dos ângulos internos = 180°. Tipos: equilátero (3 lados iguais), isósceles (2 iguais), escaleno. Área = base×altura/2. Teorema de Pitágoras: c²=a²+b² no triângulo retângulo. Triângulo equilátero: A=L²√3/4.',
    tip: '<strong>UNICAP:</strong> Calcular área de triângulo dado base e altura, ou usar Pitágoras. Sempre cai.'
  },
  {
    mesh: n2,
    title: 'Quadriláteros',
    body: 'Quadrado: A=L². Retângulo: A=b×h. Losango: A=D×d/2. Trapézio: A=(B+b)×h/2. Paralelogramo: A=b×h. Soma ângulos internos=360°. Diagonal do quadrado: d=L√2.',
    tip: '<strong>UNICAP:</strong> Área de trapézio com bases e altura dadas. Também: diagonal de retângulo via Pitágoras.'
  },
  {
    mesh: n3,
    title: 'Círculo e Circunferência',
    body: 'Circunferência (perímetro): C=2πr. Área do círculo: A=πr². Arco: s=r·θ (θ em radianos). Setor circular: A=πr²·(θ/360°). Segmento. Inscrição e circunscrição de polígonos.',
    tip: '<strong>UNICAP:</strong> Área e comprimento de setor circular dado ângulo e raio. π≈3,14 ou 22/7.'
  },
  {
    mesh: n4,
    title: 'Prismas e Pirâmides',
    body: 'Prisma: V=A_base×altura; A_lateral=perímetro_base×altura. Pirâmide: V=A_base×altura/3. Tronco de pirâmide: V=h/3·(A₁+A₂+√(A₁A₂)). Prisma reto: faces laterais são retângulos.',
    tip: '<strong>UNICAP:</strong> Volume de prisma reto e pirâmide regular. Memorize as fórmulas de volume.'
  },
  {
    mesh: n5,
    title: 'Cilindro, Cone e Esfera',
    body: 'Cilindro: V=πr²h; A_lateral=2πrh; A_total=2πr(r+h). Cone: V=πr²h/3; A_lateral=πrl (l=geratriz=√(r²+h²)). Esfera: V=4πr³/3; A=4πr².',
    tip: '<strong>UNICAP:</strong> Cone inscrito em cilindro, ou esfera inscrita em cubo. Relação entre dimensões.'
  },
  {
    mesh: n6,
    title: 'Geometria Analítica',
    body: 'Distância entre pontos: d=√((x₂-x₁)²+(y₂-y₁)²). Ponto médio: M=((x₁+x₂)/2,(y₁+y₂)/2). Equação da reta: y=ax+b ou ax+by+c=0. Equação da circunferência: (x-a)²+(y-b)²=r².',
    tip: '<strong>UNICAP:</strong> Equação da circunferência dado centro e raio, ou encontrar centro de circunferência dada equação.'
  }
];

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
});

window.addEventListener('click', e => {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes.map(n=>n.mesh));
  if(hits.length) {
    const nd = nodes.find(n=>n.mesh===hits[0].object);
    if(nd){
      document.getElementById('popup-title').textContent = nd.title;
      document.getElementById('popup-body').textContent = nd.body;
      document.getElementById('popup-tip').innerHTML = nd.tip;
      document.getElementById('popup').style.display = 'block';
    }
  }
});

function animate(){
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;

  // Rotate solids
  cubeLine.rotation.y += 0.005;
  cubeLine.rotation.x += 0.002;
  sphereWire.rotation.x += 0.004;
  sphereWire.rotation.z += 0.003;
  cylinder.rotation.y += 0.006;
  cone.rotation.y -= 0.007;
  pyramid.rotation.y += 0.005;

  // Gentle float
  const floatOffset = [0, 0.3, 0.7, 1.1, 1.5];
  [cubeLine, sphereWire, cylinder, cone, pyramid].forEach((s, i) => {
    s.position.y = 2 + Math.sin(t * 0.5 + floatOffset[i]) * 0.25;
  });

  // Main light flicker (candle-like)
  mainLight.intensity = 1.8 + Math.sin(t * 3.1) * 0.25 + Math.sin(t * 7.3) * 0.1;
  sideLight1.intensity = 1.0 + Math.sin(t * 2.4 + 1) * 0.2;

  // Node floating
  if(!nodes[0].mesh.userData.baseY) {
    nodes.forEach(nd => nd.mesh.userData.baseY = nd.mesh.position.y);
  }
  nodes.forEach((nd, i) => {
    nd.mesh.position.y = nd.mesh.userData.baseY + Math.sin(t*0.7+i*1.3)*0.2;
  });

  // Hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes.map(n=>n.mesh));
  nodes.forEach(nd => {
    const isHit = hits.length && hits[0].object === nd.mesh;
    const target = isHit ? 1.3 : 1.0;
    nd.mesh.scale.lerp(new THREE.Vector3(target,target,target), 0.12);
    nd.mesh.material.emissiveIntensity = isHit ? 1.4 : 0.7;
  });
  document.body.style.cursor = hits.length ? 'pointer' : 'default';

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
